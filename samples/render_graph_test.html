<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Crafty — Render Graph Test</title>
  <style>
    html, body { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background: #000; color: #fff; font-family: ui-monospace, monospace; }
    canvas { display: block; width: 100%; height: 100%; }
    #config-select { position: fixed; top: 12px; left: 12px; z-index: 10; }
    #config-select select {
      padding: 6px 10px; font-size: 13px; border-radius: 4px;
      background: rgba(0,0,0,0.7); color: #ddd; border: 1px solid rgba(255,255,255,0.2);
      font-family: ui-monospace, monospace; cursor: pointer;
    }
    #config-select select:focus { outline: none; border-color: rgba(100,200,255,0.6); }
    #stats { position: fixed; top: 12px; right: 12px; z-index: 10; font-size: 12px; color: #aaa; background: rgba(0,0,0,0.5); padding: 4px 8px; border-radius: 4px; pointer-events: none; }
    #desc { position: fixed; bottom: 12px; left: 12px; right: 12px; z-index: 10; font-size: 11px; color: rgba(255,255,255,0.5); text-align: center; pointer-events: none; }
  </style>
</head>
<body>
  <canvas id="canvas"></canvas>
  <div id="config-select"><select id="combo"></select></div>
  <div id="stats"></div>
  <div id="desc"></div>
  <script type="module" src="./render_graph_test.ts"></script>
</body>
</html>
