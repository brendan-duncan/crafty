<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 920 510" font-family="system-ui, -apple-system, sans-serif" font-size="13">
  <rect width="920" height="510" fill="#ffffff"/>
  <text x="460" y="26" text-anchor="middle" font-size="16" font-weight="600" fill="#111827">PCF with a Poisson Disk: 16 Samples → Soft Shadow Edge</text>

  <!-- ===== LEFT: regular grid (banding) ===== -->
  <g transform="translate(40, 60)">
    <text x="170" y="0" text-anchor="middle" font-weight="700" fill="#111827">Regular 4×4 grid → banded edges</text>

    <!-- Texel grid 8×8, each cell 30px = 240×240 -->
    <rect x="20" y="18" width="240" height="240" fill="#f3f4f6" stroke="#9ca3af" stroke-width="1.2"/>
    <g stroke="#d1d5db" stroke-width="0.6">
      <line x1="20"  y1="48"  x2="260" y2="48"/>
      <line x1="20"  y1="78"  x2="260" y2="78"/>
      <line x1="20"  y1="108" x2="260" y2="108"/>
      <line x1="20"  y1="138" x2="260" y2="138"/>
      <line x1="20"  y1="168" x2="260" y2="168"/>
      <line x1="20"  y1="198" x2="260" y2="198"/>
      <line x1="20"  y1="228" x2="260" y2="228"/>
      <line x1="50"  y1="18"  x2="50"  y2="258"/>
      <line x1="80"  y1="18"  x2="80"  y2="258"/>
      <line x1="110" y1="18"  x2="110" y2="258"/>
      <line x1="140" y1="18"  x2="140" y2="258"/>
      <line x1="170" y1="18"  x2="170" y2="258"/>
      <line x1="200" y1="18"  x2="200" y2="258"/>
      <line x1="230" y1="18"  x2="230" y2="258"/>
    </g>

    <!-- Shadow boundary diagonal -->
    <polygon points="20,258 260,258 260,108 20,228" fill="#1e293b" opacity="0.55"/>

    <!-- 4×4 regular samples around center (140, 138) — spacing 24 -->
    <g>
      <!-- Lit samples (above the diagonal) -->
      <g fill="#fde047" stroke="#7f1d1d" stroke-width="0.8">
        <circle cx="104" cy="102" r="4"/>
        <circle cx="128" cy="102" r="4"/>
        <circle cx="152" cy="102" r="4"/>
        <circle cx="176" cy="102" r="4"/>
        <circle cx="104" cy="126" r="4"/>
        <circle cx="128" cy="126" r="4"/>
        <circle cx="152" cy="126" r="4"/>
        <circle cx="176" cy="126" r="4"/>
        <circle cx="104" cy="150" r="4"/>
        <circle cx="128" cy="150" r="4"/>
      </g>
      <!-- Shadowed samples (below the diagonal) -->
      <g fill="#1f2937" stroke="#fee2e2" stroke-width="0.8">
        <circle cx="152" cy="150" r="4"/>
        <circle cx="176" cy="150" r="4"/>
        <circle cx="104" cy="174" r="4"/>
        <circle cx="128" cy="174" r="4"/>
        <circle cx="152" cy="174" r="4"/>
        <circle cx="176" cy="174" r="4"/>
      </g>
    </g>

    <text x="140" y="282" text-anchor="middle" font-size="11" font-style="italic" fill="#6b7280">aligned grid → visible quantization stairsteps</text>
  </g>

  <!-- ===== RIGHT: Poisson disk ===== -->
  <g transform="translate(460, 60)">
    <text x="170" y="0" text-anchor="middle" font-weight="700" fill="#111827">Poisson disk (16 taps) → smooth penumbra</text>

    <rect x="20" y="18" width="240" height="240" fill="#f3f4f6" stroke="#9ca3af" stroke-width="1.2"/>
    <g stroke="#d1d5db" stroke-width="0.6">
      <line x1="20"  y1="48"  x2="260" y2="48"/>
      <line x1="20"  y1="78"  x2="260" y2="78"/>
      <line x1="20"  y1="108" x2="260" y2="108"/>
      <line x1="20"  y1="138" x2="260" y2="138"/>
      <line x1="20"  y1="168" x2="260" y2="168"/>
      <line x1="20"  y1="198" x2="260" y2="198"/>
      <line x1="20"  y1="228" x2="260" y2="228"/>
      <line x1="50"  y1="18"  x2="50"  y2="258"/>
      <line x1="80"  y1="18"  x2="80"  y2="258"/>
      <line x1="110" y1="18"  x2="110" y2="258"/>
      <line x1="140" y1="18"  x2="140" y2="258"/>
      <line x1="170" y1="18"  x2="170" y2="258"/>
      <line x1="200" y1="18"  x2="200" y2="258"/>
      <line x1="230" y1="18"  x2="230" y2="258"/>
    </g>

    <polygon points="20,258 260,258 260,108 20,228" fill="#1e293b" opacity="0.55"/>

    <!-- Filter radius circle (centered at 140, 138, r 60) -->
    <circle cx="140" cy="138" r="60" fill="none" stroke="#dc2626" stroke-width="1.4" stroke-dasharray="4,3"/>
    <text x="140" y="74" text-anchor="middle" font-size="10" fill="#dc2626" font-weight="700">filter radius</text>

    <!-- 16 jittered Poisson samples within radius 60 -->
    <!-- Lit (above the diagonal y < 228 - (260-x)*120/240 = 228 - (260-x)*0.5) -->
    <g>
      <!-- Lit samples -->
      <g fill="#fde047" stroke="#7f1d1d" stroke-width="0.8">
        <circle cx="120" cy="98"  r="4"/>
        <circle cx="156" cy="92"  r="4"/>
        <circle cx="178" cy="118" r="4"/>
        <circle cx="98"  cy="120" r="4"/>
        <circle cx="138" cy="126" r="4"/>
        <circle cx="92"  cy="148" r="4"/>
        <circle cx="118" cy="142" r="4"/>
        <circle cx="166" cy="140" r="4"/>
        <circle cx="186" cy="156" r="4"/>
      </g>
      <!-- Shadowed samples -->
      <g fill="#1f2937" stroke="#fee2e2" stroke-width="0.8">
        <circle cx="142" cy="158" r="4"/>
        <circle cx="108" cy="172" r="4"/>
        <circle cx="148" cy="180" r="4"/>
        <circle cx="178" cy="186" r="4"/>
        <circle cx="124" cy="186" r="4"/>
        <circle cx="100" cy="190" r="4"/>
        <circle cx="160" cy="170" r="4"/>
      </g>
    </g>

    <text x="140" y="282" text-anchor="middle" font-size="11" font-style="italic" fill="#6b7280">9 of 16 lit → shadow ≈ 0.56 (gradient instead of step)</text>
  </g>

  <!-- ===== BOTTOM: legend + code ===== -->
  <g transform="translate(40, 360)">
    <rect width="840" height="140" fill="#f9fafb" stroke="#9ca3af" stroke-width="1" rx="6"/>

    <!-- Legend on the left -->
    <g transform="translate(14, 22)">
      <circle cx="6" cy="0" r="5" fill="#fde047" stroke="#7f1d1d" stroke-width="0.8"/>
      <text x="18" y="4" font-size="11" fill="#374151">passes test (lit)</text>
      <circle cx="146" cy="0" r="5" fill="#1f2937" stroke="#fee2e2" stroke-width="0.8"/>
      <text x="158" y="4" font-size="11" fill="#374151">fails test (shadowed)</text>
    </g>

    <g font-family="ui-monospace, Consolas, monospace" font-size="11" fill="#374151" transform="translate(14, 32)">
      <text x="0" y="14">let s = 0.0;</text>
      <text x="0" y="32">for (var i = 0u; i &lt; 16u; i++) {</text>
      <text x="0" y="50">  s += textureSampleCompare(shadowMap, cmp, uv + poissonDisk[i] * texel * softness, depth);</text>
      <text x="0" y="68">} <tspan fill="#dc2626">// shadow = s / 16</tspan></text>
    </g>
  </g>
</svg>
