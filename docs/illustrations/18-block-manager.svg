<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 920 460" font-family="system-ui, -apple-system, sans-serif" font-size="13">
  <rect width="920" height="460" fill="#ffffff"/>
  <text x="460" y="26" text-anchor="middle" font-size="16" font-weight="600" fill="#111827">Block Manager: Categorised Grid That Feeds the Hotbar</text>

  <defs>
    <marker id="bmArr" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="9" markerHeight="9" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#fde68a"/>
    </marker>
  </defs>

  <!-- ===== LEFT: block manager grid ===== -->
  <g transform="translate(40, 60)">
    <text x="240" y="0" text-anchor="middle" font-weight="700" fill="#111827">Block manager (E)</text>

    <rect x="0" y="14" width="480" height="320" fill="#1f2937" stroke="#374151" stroke-width="1.4" rx="6"/>

    <!-- Category tabs -->
    <g font-size="11" font-weight="700">
      <rect x="14" y="28" width="100" height="26" fill="#374151" stroke="#fde68a" stroke-width="1.4" rx="3"/>
      <text x="64" y="46" text-anchor="middle" fill="#fde68a">Natural</text>

      <rect x="120" y="28" width="100" height="26" fill="#1f2937" stroke="#475569" stroke-width="1" rx="3"/>
      <text x="170" y="46" text-anchor="middle" fill="#94a3b8">Stone</text>

      <rect x="226" y="28" width="100" height="26" fill="#1f2937" stroke="#475569" stroke-width="1" rx="3"/>
      <text x="276" y="46" text-anchor="middle" fill="#94a3b8">Wood</text>

      <rect x="332" y="28" width="100" height="26" fill="#1f2937" stroke="#475569" stroke-width="1" rx="3"/>
      <text x="382" y="46" text-anchor="middle" fill="#94a3b8">Decor</text>
    </g>

    <!-- Grid of blocks (6 cols × 4 rows) -->
    <g>
      <!-- Each cell 70×56, gap 8. 6*70 + 5*8 = 460 wide. Start x=14 -->
      <!-- Cell positions: x=14, 92, 170, 248, 326, 404; y=70, 134, 198, 262 -->

      <!-- Row 1 -->
      <g>
        <rect x="14"  y="70" width="70" height="56" fill="#374151" stroke="#475569" stroke-width="1"/>
        <rect x="22"  y="78" width="54" height="40" fill="#84cc16"/>
        <text x="49"  y="116" text-anchor="middle" font-size="9" fill="#cbd5e1">grass</text>

        <rect x="92"  y="70" width="70" height="56" fill="#374151" stroke="#475569" stroke-width="1"/>
        <rect x="100" y="78" width="54" height="40" fill="#a16207"/>
        <text x="127" y="116" text-anchor="middle" font-size="9" fill="#cbd5e1">dirt</text>

        <rect x="170" y="70" width="70" height="56" fill="#374151" stroke="#475569" stroke-width="1"/>
        <rect x="178" y="78" width="54" height="40" fill="#fde68a"/>
        <text x="205" y="116" text-anchor="middle" font-size="9" fill="#cbd5e1">sand</text>

        <rect x="248" y="70" width="70" height="56" fill="#374151" stroke="#475569" stroke-width="1"/>
        <rect x="256" y="78" width="54" height="40" fill="#0891b2"/>
        <text x="283" y="116" text-anchor="middle" font-size="9" fill="#cbd5e1">water</text>

        <rect x="326" y="70" width="70" height="56" fill="#374151" stroke="#475569" stroke-width="1"/>
        <rect x="334" y="78" width="54" height="40" fill="#f3f4f6"/>
        <text x="361" y="116" text-anchor="middle" font-size="9" fill="#cbd5e1">snow</text>

        <rect x="404" y="70" width="70" height="56" fill="#374151" stroke="#475569" stroke-width="1"/>
        <rect x="412" y="78" width="54" height="40" fill="#16a34a"/>
        <text x="439" y="116" text-anchor="middle" font-size="9" fill="#cbd5e1">leaves</text>
      </g>

      <!-- Row 2 -->
      <g>
        <rect x="14"  y="134" width="70" height="56" fill="#374151" stroke="#475569" stroke-width="1"/>
        <rect x="22"  y="142" width="54" height="40" fill="#a1a1aa"/>
        <text x="49"  y="180" text-anchor="middle" font-size="9" fill="#cbd5e1">stone</text>

        <rect x="92"  y="134" width="70" height="56" fill="#374151" stroke="#475569" stroke-width="1"/>
        <rect x="100" y="142" width="54" height="40" fill="#52525b"/>
        <text x="127" y="180" text-anchor="middle" font-size="9" fill="#cbd5e1">basalt</text>

        <rect x="170" y="134" width="70" height="56" fill="#374151" stroke="#475569" stroke-width="1"/>
        <rect x="178" y="142" width="54" height="40" fill="#9ca3af"/>
        <text x="205" y="180" text-anchor="middle" font-size="9" fill="#cbd5e1">cobble</text>

        <rect x="248" y="134" width="70" height="56" fill="#374151" stroke="#475569" stroke-width="1"/>
        <rect x="256" y="142" width="54" height="40" fill="#7c3aed"/>
        <text x="283" y="180" text-anchor="middle" font-size="9" fill="#cbd5e1">amethyst</text>

        <!-- Selected slot — yellow border -->
        <rect x="326" y="134" width="70" height="56" fill="#374151" stroke="#fde68a" stroke-width="2.4"/>
        <rect x="334" y="142" width="54" height="40" fill="#dc2626"/>
        <text x="361" y="180" text-anchor="middle" font-size="9" font-weight="700" fill="#fde68a">magma</text>

        <rect x="404" y="134" width="70" height="56" fill="#374151" stroke="#475569" stroke-width="1"/>
        <rect x="412" y="142" width="54" height="40" fill="#fcd34d"/>
        <text x="439" y="180" text-anchor="middle" font-size="9" fill="#cbd5e1">glow</text>
      </g>

      <!-- Row 3 (placeholder) -->
      <g opacity="0.5">
        <rect x="14"  y="198" width="70" height="56" fill="#374151" stroke="#475569" stroke-width="1" stroke-dasharray="3,2"/>
        <rect x="92"  y="198" width="70" height="56" fill="#374151" stroke="#475569" stroke-width="1" stroke-dasharray="3,2"/>
        <rect x="170" y="198" width="70" height="56" fill="#374151" stroke="#475569" stroke-width="1" stroke-dasharray="3,2"/>
        <text x="205" y="232" text-anchor="middle" font-size="11" fill="#94a3b8" font-style="italic">…</text>
      </g>

      <!-- Hint footer -->
      <text x="240" y="290" text-anchor="middle" font-size="11" font-style="italic" fill="#cbd5e1">click a block, then 1–9 to assign to a hotbar slot</text>
      <text x="240" y="306" text-anchor="middle" font-size="10" font-style="italic" fill="#94a3b8">creative: all blocks shown · survival: only collected</text>
    </g>
  </g>

  <!-- Arrow from selected → hotbar slot -->
  <line x1="528" y1="160" x2="568" y2="160" stroke="#fde68a" stroke-width="2" marker-end="url(#bmArr)"/>
  <text x="548" y="152" text-anchor="middle" font-size="10" font-style="italic" fill="#a16207">assigns</text>

  <!-- ===== RIGHT: hotbar slot detail ===== -->
  <g transform="translate(580, 60)">
    <text x="160" y="0" text-anchor="middle" font-weight="700" fill="#111827">Hotbar (active slot)</text>

    <rect x="0" y="14" width="320" height="320" fill="#f9fafb" stroke="#9ca3af" stroke-width="1" rx="6"/>

    <!-- Single highlighted slot enlarged -->
    <g transform="translate(110, 80)">
      <rect x="0" y="0" width="100" height="100" fill="#374151" stroke="#fde68a" stroke-width="3" rx="4"/>
      <rect x="14" y="14" width="72" height="72" fill="#dc2626"/>
      <text x="50" y="124" text-anchor="middle" font-size="11" font-weight="700" fill="#7f1d1d">magma</text>
    </g>

    <!-- Slot index -->
    <text x="160" y="78" text-anchor="middle" font-size="11" font-family="ui-monospace, Consolas, monospace" font-weight="700" fill="#fde68a">slot 4</text>

    <g font-size="11" fill="#374151" transform="translate(20, 220)">
      <text x="0" y="0" font-weight="700" fill="#111827">on right-click in world:</text>
      <text x="0" y="20">place selectedBlock at hit + normal</text>

      <text x="0" y="48" font-weight="700" fill="#111827">on slot key (1–9 or scroll):</text>
      <text x="0" y="68">selectedSlot = index;</text>
      <text x="0" y="84">hotbarUI.setSelectedSlot(index)</text>
    </g>
  </g>
</svg>
