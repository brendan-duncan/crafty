<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 460" font-family="system-ui, -apple-system, sans-serif" font-size="13">
  <rect width="720" height="460" fill="#ffffff"/>
  <text x="360" y="26" text-anchor="middle" font-size="16" font-weight="600" fill="#111827">Biome Classification: Temperature × Humidity</text>

  <!-- Plot area: 360 wide × 320 tall, at (80, 60) -->
  <!-- X = temperature (cold → hot)
       Y = humidity   (dry top → wet bottom)
       Each axis 0..1 mapped to plot pixels -->

  <g transform="translate(80, 60)">
    <!-- Axis frame -->
    <rect width="360" height="320" fill="#ffffff" stroke="#374151" stroke-width="1.5"/>

    <!-- Biome regions: 4 quadrants split by mid-temperature and mid-humidity, with a 5th central "plains" zone -->
    <!-- Top-left (cold, dry): tundra -->
    <rect x="0" y="0" width="180" height="160" fill="#f3f4f6" stroke="none"/>
    <!-- Top-right (hot, dry): desert -->
    <rect x="180" y="0" width="180" height="160" fill="#fde68a" stroke="none"/>
    <!-- Bottom-left (cold, wet): snowy mountains -->
    <rect x="0" y="160" width="180" height="160" fill="#dbeafe" stroke="none"/>
    <!-- Bottom-right (hot, wet): jungle -->
    <rect x="180" y="160" width="180" height="160" fill="#86efac" stroke="none"/>

    <!-- Central "plains" oval blending the corners -->
    <ellipse cx="180" cy="160" rx="100" ry="68" fill="#a3e635" stroke="none" opacity="0.85"/>

    <!-- Quadrant divider lines -->
    <g stroke="#9ca3af" stroke-width="1" stroke-dasharray="4,3">
      <line x1="180" y1="0" x2="180" y2="320"/>
      <line x1="0" y1="160" x2="360" y2="160"/>
    </g>

    <!-- Biome region labels — placed in their respective regions, centered, in clear space -->
    <g font-weight="700" text-anchor="middle">
      <text x="90"  y="58"  fill="#374151" font-size="13">TUNDRA</text>
      <text x="90"  y="74"  fill="#6b7280" font-size="10" font-style="italic">cold + dry</text>

      <text x="270" y="58"  fill="#92400e" font-size="13">DESERT</text>
      <text x="270" y="74"  fill="#a16207" font-size="10" font-style="italic">hot + dry</text>

      <text x="90"  y="240" fill="#1e40af" font-size="13">SNOWY MTN</text>
      <text x="90"  y="256" fill="#1e40af" font-size="10" font-style="italic">cold + wet</text>

      <text x="270" y="240" fill="#15803d" font-size="13">JUNGLE</text>
      <text x="270" y="256" fill="#166534" font-size="10" font-style="italic">hot + wet</text>

      <text x="180" y="156" fill="#365314" font-size="13">PLAINS</text>
      <text x="180" y="172" fill="#3f6212" font-size="10" font-style="italic">temperate</text>
    </g>

    <!-- Axis tick labels OUTSIDE the plot area -->
    <g font-size="11" fill="#374151">
      <!-- X axis (temperature) below -->
      <text x="0"   y="338" text-anchor="start">cold</text>
      <text x="180" y="338" text-anchor="middle" font-style="italic">temperate</text>
      <text x="360" y="338" text-anchor="end">hot</text>
      <text x="180" y="358" text-anchor="middle" font-weight="700">temperature →</text>

      <!-- Y axis (humidity) on left, rotated -->
      <text x="-340" y="-12" text-anchor="end" transform="rotate(-90)" font-weight="700">← humidity</text>
      <text x="-12"  y="6"   text-anchor="end">dry</text>
      <text x="-12"  y="324" text-anchor="end">wet</text>
    </g>
  </g>

  <!-- Right-side caption -->
  <g transform="translate(480, 80)">
    <rect width="220" height="280" fill="#f9fafb" stroke="#9ca3af" stroke-width="1" rx="6"/>
    <text x="14" y="22" font-weight="700" fill="#111827">Biome lookup</text>

    <g font-family="ui-monospace, Consolas, monospace" font-size="11" fill="#374151" transform="translate(14, 0)">
      <text x="0" y="48">temperature =</text>
      <text x="0" y="62">  perlinNoise3(x·0.002,</text>
      <text x="0" y="76">                z·0.002, 42)</text>

      <text x="0" y="100">humidity =</text>
      <text x="0" y="114">  perlinNoise3(x·0.002,</text>
      <text x="0" y="128">                z·0.002, 99)</text>
    </g>

    <g transform="translate(14, 158)" font-size="11" fill="#374151">
      <text x="0" y="0" font-weight="700" fill="#111827">Different seeds (42 vs 99)</text>
      <text x="0" y="16">decorrelate the two fields,</text>
      <text x="0" y="30">so temperature and humidity</text>
      <text x="0" y="44">vary independently.</text>
    </g>

    <g transform="translate(14, 218)" font-size="11" fill="#6b7280" font-style="italic">
      <text x="0" y="0">Biome boundaries blend</text>
      <text x="0" y="14">smoothly — no hard edges</text>
      <text x="0" y="28">when crossing regions.</text>
    </g>
  </g>

  <!-- Bottom note -->
  <text x="360" y="436" text-anchor="middle" font-size="11" fill="#6b7280" font-style="italic">Each biome chooses its own surface block, tree rules, grass tint, and weather distribution.</text>
</svg>
