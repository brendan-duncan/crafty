<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 920 460" font-family="system-ui, -apple-system, sans-serif" font-size="13">
  <rect width="920" height="460" fill="#ffffff"/>
  <text x="460" y="26" text-anchor="middle" font-size="16" font-weight="600" fill="#111827">Precipitation Control: Cheap Intensity Tweak vs Full Rebuild</text>

  <defs>
    <marker id="pcArr" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="9" markerHeight="9" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#374151"/>
    </marker>
  </defs>

  <!-- ===== Top: incoming event ===== -->
  <g transform="translate(360, 60)">
    <rect x="0" y="0" width="200" height="56" fill="#eff6ff" stroke="#2563eb" stroke-width="1.4" rx="6"/>
    <text x="100" y="22" text-anchor="middle" font-weight="700" fill="#1e3a8a">weather changed</text>
    <text x="100" y="40" text-anchor="middle" font-size="10" font-style="italic" fill="#1e3a8a">e.g. LightRain → HeavyRain</text>
  </g>

  <line x1="460" y1="116" x2="460" y2="146" stroke="#374151" stroke-width="1.6" marker-end="url(#pcArr)"/>

  <!-- ===== Decision diamond ===== -->
  <g transform="translate(360, 150)">
    <polygon points="100,0 200,40 100,80 0,40" fill="#fef3c7" stroke="#a16207" stroke-width="1.6"/>
    <text x="100" y="34" text-anchor="middle" font-weight="700" fill="#713f12">effect changed?</text>
    <text x="100" y="50" text-anchor="middle" font-size="10" font-family="ui-monospace, Consolas, monospace" fill="#713f12">None / Rain / Snow</text>
  </g>

  <!-- Branches -->
  <!-- YES branch: down-left to REBUILD -->
  <line x1="380" y1="200" x2="220" y2="260" stroke="#374151" stroke-width="1.6" marker-end="url(#pcArr)"/>
  <text x="284" y="222" font-size="11" font-weight="700" fill="#dc2626">YES</text>

  <!-- NO branch: down-right to setSpawnRate -->
  <line x1="540" y1="200" x2="700" y2="260" stroke="#374151" stroke-width="1.6" marker-end="url(#pcArr)"/>
  <text x="624" y="222" font-size="11" font-weight="700" fill="#16a34a">NO</text>

  <!-- ===== LEFT outcome: REBUILD ===== -->
  <g transform="translate(40, 270)">
    <rect x="0" y="0" width="360" height="130" fill="#fef2f2" stroke="#dc2626" stroke-width="1.4" rx="6"/>
    <rect x="0" y="0" width="360" height="28" fill="#fee2e2"/>
    <text x="180" y="20" text-anchor="middle" font-weight="700" fill="#7f1d1d">await rebuildRenderTargets()</text>

    <text x="14" y="50" font-size="11" font-weight="700" fill="#7f1d1d">cost</text>
    <text x="14" y="68" font-size="11" fill="#7f1d1d">· destroys every render pass</text>
    <text x="14" y="84" font-size="11" fill="#7f1d1d">· reallocates all GPU resources</text>
    <text x="14" y="100" font-size="11" fill="#7f1d1d">· builds particle pipelines from config</text>

    <text x="14" y="120" font-size="11" font-style="italic" fill="#7f1d1d">⏱ tens of milliseconds — visible hitch</text>
  </g>

  <!-- ===== RIGHT outcome: setSpawnRate ===== -->
  <g transform="translate(520, 270)">
    <rect x="0" y="0" width="360" height="130" fill="#f0fdf4" stroke="#15803d" stroke-width="1.4" rx="6"/>
    <rect x="0" y="0" width="360" height="28" fill="#dcfce7"/>
    <text x="180" y="20" text-anchor="middle" font-weight="700" fill="#14532d">particlePass.setSpawnRate(rate)</text>

    <text x="14" y="50" font-size="11" font-weight="700" fill="#14532d">cost</text>
    <text x="14" y="68" font-size="11" fill="#14532d">· write one float in config object</text>
    <text x="14" y="84" font-size="11" fill="#14532d">· no shader regen, no pipeline rebuild</text>
    <text x="14" y="100" font-size="11" fill="#14532d">· takes effect on next frame's spawn</text>

    <text x="14" y="120" font-size="11" font-style="italic" fill="#14532d">⏱ &lt; 1 µs — invisible</text>
  </g>

  <!-- ===== Bottom: transition examples (two halves) ===== -->
  <g transform="translate(40, 416)">
    <rect x="0"   y="0" width="416" height="36" fill="#f0fdf4" stroke="#15803d" stroke-width="1" rx="4"/>
    <text x="14"  y="22" font-size="11" fill="#14532d">
      <tspan font-weight="700">setSpawnRate:</tspan> LightRain ↔ HeavyRain, LightSnow ↔ HeavySnow
    </text>

    <rect x="424" y="0" width="416" height="36" fill="#fef2f2" stroke="#dc2626" stroke-width="1" rx="4"/>
    <text x="438" y="22" font-size="11" fill="#7f1d1d">
      <tspan font-weight="700">REBUILD:</tspan> any change crossing None / Rain / Snow
    </text>
  </g>
</svg>
