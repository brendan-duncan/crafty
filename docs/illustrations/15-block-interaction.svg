<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 920 480" font-family="system-ui, -apple-system, sans-serif" font-size="13">
  <rect width="920" height="480" fill="#ffffff"/>
  <text x="460" y="26" text-anchor="middle" font-size="16" font-weight="600" fill="#111827">Block Interaction: Progressive Break · Adjacent-Face Place</text>

  <defs>
    <marker id="biArr" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="9" markerHeight="9" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#dc2626"/>
    </marker>
    <marker id="biArrG" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="9" markerHeight="9" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#16a34a"/>
    </marker>
  </defs>

  <!-- ===== LEFT: progressive break ===== -->
  <g transform="translate(40, 60)">
    <text x="200" y="0" text-anchor="middle" font-weight="700" fill="#111827">Progressive break (crack stages 0 → 9)</text>

    <rect x="0" y="14" width="400" height="240" fill="#f9fafb" stroke="#9ca3af" stroke-width="1" rx="6"/>

    <!-- 5 sample frames showing crack progression. Each block 60×60, gap 16. -->
    <!-- 5*60 + 4*16 = 364, centered in 400 → start at x=18 -->
    <g>
      <!-- Frame 1: 0% (clean stone) -->
      <rect x="18"  y="40" width="60" height="60" fill="#a1a1aa" stroke="#52525b" stroke-width="1.4"/>
      <text x="48"  y="116" text-anchor="middle" font-size="11" font-family="ui-monospace, Consolas, monospace" fill="#374151">0 ms</text>
      <text x="48"  y="130" text-anchor="middle" font-size="10" font-style="italic" fill="#6b7280">stage 0</text>

      <!-- Frame 2: 25% — light cracks -->
      <rect x="94"  y="40" width="60" height="60" fill="#a1a1aa" stroke="#52525b" stroke-width="1.4"/>
      <g stroke="#27272a" stroke-width="0.8" fill="none">
        <line x1="100" y1="50" x2="118" y2="64"/>
        <line x1="142" y1="78" x2="148" y2="90"/>
      </g>
      <text x="124" y="116" text-anchor="middle" font-size="11" font-family="ui-monospace, Consolas, monospace" fill="#374151">375 ms</text>
      <text x="124" y="130" text-anchor="middle" font-size="10" font-style="italic" fill="#6b7280">stage 2</text>

      <!-- Frame 3: 50% — moderate cracks -->
      <rect x="170" y="40" width="60" height="60" fill="#a1a1aa" stroke="#52525b" stroke-width="1.4"/>
      <g stroke="#18181b" stroke-width="1.0" fill="none">
        <line x1="176" y1="50" x2="200" y2="74"/>
        <line x1="200" y1="74" x2="220" y2="60"/>
        <line x1="200" y1="74" x2="200" y2="98"/>
        <line x1="180" y1="92" x2="195" y2="80"/>
      </g>
      <text x="200" y="116" text-anchor="middle" font-size="11" font-family="ui-monospace, Consolas, monospace" fill="#374151">750 ms</text>
      <text x="200" y="130" text-anchor="middle" font-size="10" font-style="italic" fill="#6b7280">stage 5</text>

      <!-- Frame 4: 75% — heavy cracks -->
      <rect x="246" y="40" width="60" height="60" fill="#a1a1aa" stroke="#52525b" stroke-width="1.4"/>
      <g stroke="#000" stroke-width="1.2" fill="none">
        <line x1="250" y1="46" x2="276" y2="74"/>
        <line x1="276" y1="74" x2="302" y2="58"/>
        <line x1="276" y1="74" x2="276" y2="98"/>
        <line x1="252" y1="92" x2="276" y2="74"/>
        <line x1="276" y1="74" x2="298" y2="92"/>
        <line x1="262" y1="60" x2="276" y2="74"/>
      </g>
      <text x="276" y="116" text-anchor="middle" font-size="11" font-family="ui-monospace, Consolas, monospace" fill="#374151">1125 ms</text>
      <text x="276" y="130" text-anchor="middle" font-size="10" font-style="italic" fill="#6b7280">stage 7</text>

      <!-- Frame 5: 100% — broken (replaced by air) -->
      <rect x="322" y="40" width="60" height="60" fill="#fff" stroke="#52525b" stroke-width="1.2" stroke-dasharray="4,3"/>
      <text x="352" y="76" text-anchor="middle" font-size="11" font-style="italic" fill="#6b7280">air</text>
      <text x="352" y="116" text-anchor="middle" font-size="11" font-family="ui-monospace, Consolas, monospace" fill="#dc2626">1500 ms</text>
      <text x="352" y="130" text-anchor="middle" font-size="10" font-style="italic" fill="#dc2626">setBlock(Air)</text>
    </g>

    <!-- Time arrow under frames -->
    <line x1="18" y1="156" x2="382" y2="156" stroke="#374151" stroke-width="1" marker-end="url(#biArr)"/>
    <text x="200" y="178" text-anchor="middle" font-size="11" font-style="italic" fill="#374151">breakTime = blockHardness · 1500 ms (stone ≈ 1.5 s)</text>

    <!-- Mini hardness table -->
    <g font-size="11" fill="#374151" transform="translate(18, 200)">
      <text x="0" y="0" font-weight="700" fill="#111827">hardness × 1500 ms:</text>
      <text x="0" y="18">dirt 0.2 → 300 ms · stone 1.0 → 1500 ms · obsidian 4.0 → 6000 ms</text>
    </g>
  </g>

  <!-- ===== RIGHT: place adjacent ===== -->
  <g transform="translate(480, 60)">
    <text x="200" y="0" text-anchor="middle" font-weight="700" fill="#111827">Place: hit block + face normal = new cell</text>

    <rect x="0" y="14" width="400" height="240" fill="#f9fafb" stroke="#9ca3af" stroke-width="1" rx="6"/>

    <!-- Hit block: stone with red border highlighting -->
    <rect x="120" y="100" width="80" height="80" fill="#a1a1aa" stroke="#dc2626" stroke-width="2.4"/>
    <text x="160" y="146" text-anchor="middle" font-size="11" font-weight="700" fill="#fff">hit</text>

    <!-- Face normal arrow pointing up from top face -->
    <line x1="160" y1="100" x2="160" y2="60" stroke="#dc2626" stroke-width="2" marker-end="url(#biArr)"/>
    <text x="170" y="78" font-size="10" font-weight="700" fill="#dc2626">normal (0, 1, 0)</text>

    <!-- New block placed above (adjacent on the +Y face) -->
    <rect x="120" y="20" width="80" height="80" fill="#86efac" stroke="#15803d" stroke-width="2.4" stroke-dasharray="4,3"/>
    <text x="160" y="56" text-anchor="middle" font-size="11" font-weight="700" fill="#14532d">new block</text>
    <text x="160" y="72" text-anchor="middle" font-size="10" font-style="italic" fill="#14532d">at hit + normal</text>

    <!-- Code annotation -->
    <g font-family="ui-monospace, Consolas, monospace" font-size="11" fill="#14532d" transform="translate(40, 200)">
      <text x="0" y="0" font-weight="700">place at hit + normal:</text>
      <text x="0" y="18">nx = hit.x + normal.x</text>
      <text x="0" y="34">ny = hit.y + normal.y</text>
      <text x="0" y="50">nz = hit.z + normal.z</text>
    </g>
  </g>

  <!-- ===== Bottom: code summary ===== -->
  <g transform="translate(40, 332)">
    <rect width="840" height="130" fill="#f9fafb" stroke="#9ca3af" stroke-width="1" rx="6"/>

    <text x="14" y="22" font-weight="700" fill="#111827">Per-frame, while button held</text>

    <g font-family="ui-monospace, Consolas, monospace" font-size="12" fill="#374151" transform="translate(14, 0)">
      <text x="0" y="48">if (mouseHeld === 0 &amp;&amp; targetBlock) {                   <tspan fill="#dc2626">// left = mine</tspan></text>
      <text x="0" y="66">  breakProgress += dt * 1000;</text>
      <text x="0" y="84">  if (breakProgress &gt;= breakTime) world.mineBlock(...);</text>
      <text x="0" y="102">}</text>
      <text x="0" y="120" fill="#6b7280" font-style="italic">// right-click is one-shot — fires doBlockAction immediately, no progress accumulator.</text>
    </g>
  </g>
</svg>
