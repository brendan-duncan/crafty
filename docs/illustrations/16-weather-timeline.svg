<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 920 480" font-family="system-ui, -apple-system, sans-serif" font-size="13">
  <rect width="920" height="480" fill="#ffffff"/>
  <text x="460" y="26" text-anchor="middle" font-size="16" font-weight="600" fill="#111827">Weather Timeline: A 5-Minute GrassyPlains Day</text>

  <defs>
    <marker id="tlArr" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="9" markerHeight="9" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#374151"/>
    </marker>
  </defs>

  <!-- Time scale: 0..300 s mapped to x=0..840.
       2.8 px/s. Sample boundaries at: 0, 80, 170, 240, 300 s → x=0, 224, 476, 672, 840 -->

  <g transform="translate(40, 70)">
    <text x="0" y="0" font-weight="700" fill="#111827">Bands = current weather · vertical markers = transitions chosen by the timer</text>

    <!-- ===== Transition markers (above the band) ===== -->
    <!-- Each marker has: a small triangle at the top of the band x position, vertical line, and a label box above -->

    <!-- Marker 1: t=80 s, Sunny → Cloudy (setSpawnRate, no rebuild) -->
    <g>
      <line x1="224" y1="36" x2="224" y2="76" stroke="#16a34a" stroke-width="1.4" stroke-dasharray="3,2"/>
      <rect x="146" y="20" width="156" height="28" fill="#dcfce7" stroke="#16a34a" stroke-width="1" rx="3"/>
      <text x="224" y="38" text-anchor="middle" font-size="11" font-weight="700" fill="#14532d">cheap (no effect change)</text>
    </g>

    <!-- Marker 2: t=170 s, Cloudy → LightRain (REBUILD: effect None → Rain) -->
    <g>
      <line x1="476" y1="36" x2="476" y2="76" stroke="#dc2626" stroke-width="1.6"/>
      <rect x="394" y="20" width="164" height="28" fill="#fee2e2" stroke="#dc2626" stroke-width="1" rx="3"/>
      <text x="476" y="38" text-anchor="middle" font-size="11" font-weight="700" fill="#7f1d1d">REBUILD (None → Rain)</text>
    </g>

    <!-- Marker 3: t=240 s, LightRain → HeavyRain (setSpawnRate within Rain) -->
    <g>
      <line x1="672" y1="36" x2="672" y2="76" stroke="#16a34a" stroke-width="1.4" stroke-dasharray="3,2"/>
      <rect x="586" y="20" width="172" height="28" fill="#dcfce7" stroke="#16a34a" stroke-width="1" rx="3"/>
      <text x="672" y="38" text-anchor="middle" font-size="11" font-weight="700" fill="#14532d">setSpawnRate (intensity)</text>
    </g>

    <!-- ===== Timeline band ===== -->
    <g>
      <rect x="0"   y="78" width="224" height="60" fill="#fef3c7" stroke="#ca8a04" stroke-width="1.2"/>
      <rect x="224" y="78" width="252" height="60" fill="#e5e7eb" stroke="#6b7280" stroke-width="1.2"/>
      <rect x="476" y="78" width="196" height="60" fill="#bfdbfe" stroke="#2563eb" stroke-width="1.2"/>
      <rect x="672" y="78" width="168" height="60" fill="#60a5fa" stroke="#1e3a8a" stroke-width="1.2"/>
    </g>

    <!-- Weather labels inside bands -->
    <g font-weight="700" text-anchor="middle">
      <text x="112" y="106" fill="#713f12">Sunny</text>
      <text x="112" y="124" font-size="10" font-family="ui-monospace, Consolas, monospace" fill="#713f12">80 s</text>

      <text x="350" y="106" fill="#374151">Cloudy</text>
      <text x="350" y="124" font-size="10" font-family="ui-monospace, Consolas, monospace" fill="#374151">90 s</text>

      <text x="574" y="106" fill="#1e3a8a">LightRain</text>
      <text x="574" y="124" font-size="10" font-family="ui-monospace, Consolas, monospace" fill="#1e3a8a">70 s</text>

      <text x="756" y="106" fill="#fff">HeavyRain</text>
      <text x="756" y="124" font-size="10" font-family="ui-monospace, Consolas, monospace" fill="#fff">60 s</text>
    </g>

    <!-- ===== Time axis (below band) ===== -->
    <line x1="0" y1="146" x2="840" y2="146" stroke="#6b7280" stroke-width="0.8"/>

    <!-- Tick marks every 30 s -->
    <g stroke="#6b7280" stroke-width="0.8">
      <line x1="0"   y1="146" x2="0"   y2="152"/>
      <line x1="84"  y1="146" x2="84"  y2="152"/>
      <line x1="168" y1="146" x2="168" y2="152"/>
      <line x1="252" y1="146" x2="252" y2="152"/>
      <line x1="336" y1="146" x2="336" y2="152"/>
      <line x1="420" y1="146" x2="420" y2="152"/>
      <line x1="504" y1="146" x2="504" y2="152"/>
      <line x1="588" y1="146" x2="588" y2="152"/>
      <line x1="672" y1="146" x2="672" y2="152"/>
      <line x1="756" y1="146" x2="756" y2="152"/>
      <line x1="840" y1="146" x2="840" y2="152"/>
    </g>

    <!-- Time labels -->
    <g font-size="10" font-family="ui-monospace, Consolas, monospace" fill="#374151" text-anchor="middle">
      <text x="0"   y="166">0</text>
      <text x="84"  y="166">30</text>
      <text x="168" y="166">60</text>
      <text x="252" y="166">90</text>
      <text x="336" y="166">120</text>
      <text x="420" y="166">150</text>
      <text x="504" y="166">180</text>
      <text x="588" y="166">210</text>
      <text x="672" y="166">240</text>
      <text x="756" y="166">270</text>
      <text x="840" y="166">300</text>
    </g>
    <text x="420" y="186" text-anchor="middle" font-size="11" font-style="italic" fill="#6b7280">seconds</text>
  </g>

  <!-- ===== Cloud coverage trace (below timeline) ===== -->
  <g transform="translate(40, 290)">
    <text x="0" y="0" font-weight="700" fill="#111827">cloudCoverage smoothly chases each weather's target (τ ≈ 3.3 s)</text>

    <rect x="0" y="14" width="840" height="100" fill="#f9fafb" stroke="#9ca3af" stroke-width="1"/>

    <!-- Plot inner: x=0..840, y=24..104 (80 high). cov in [0, 1]. y_cov(c) = 104 - c*80. -->
    <!-- Targets: Sunny 0.10 (y=96), Cloudy 0.55 (y=60), LightRain 0.70 (y=48), HeavyRain 0.90 (y=32) -->

    <!-- Reference target dashed lines per segment (same colors as bands) -->
    <g stroke-width="1" stroke-dasharray="3,2" opacity="0.6">
      <line x1="0"   y1="96" x2="224" y2="96" stroke="#ca8a04"/>
      <line x1="224" y1="60" x2="476" y2="60" stroke="#6b7280"/>
      <line x1="476" y1="48" x2="672" y2="48" stroke="#2563eb"/>
      <line x1="672" y1="32" x2="840" y2="32" stroke="#1e3a8a"/>
    </g>

    <!-- Smoothed coverage curve approaching each target -->
    <!-- Approach time tau ≈ 3.3 s (vs band widths >= 60 s) so each band reaches target quickly -->
    <path d="M 0 96
             L 224 96
             Q 240 60, 280 60
             L 476 60
             Q 488 48, 516 48
             L 672 48
             Q 686 32, 712 32
             L 840 32"
          fill="none" stroke="#dc2626" stroke-width="2.4"/>

    <!-- Y axis labels -->
    <g font-size="10" font-family="ui-monospace, Consolas, monospace" fill="#6b7280">
      <text x="-6" y="28"  text-anchor="end">1.0</text>
      <text x="-6" y="68"  text-anchor="end">0.5</text>
      <text x="-6" y="108" text-anchor="end">0</text>
    </g>
  </g>

  <!-- ===== Bottom legend ===== -->
  <g transform="translate(40, 416)">
    <rect width="840" height="50" fill="#f9fafb" stroke="#9ca3af" stroke-width="1" rx="6"/>
    <text x="14" y="22" font-weight="700" fill="#111827">Read across: weather changes ↔ band edges. Read the curve: cloud coverage trails by ~3 s.</text>
    <text x="14" y="40" font-size="11" fill="#374151">Each interval is an independent random draw in [30, 120] s — bands are not all the same width.</text>
  </g>
</svg>
