<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 840 480" font-family="system-ui, -apple-system, sans-serif" font-size="13">
  <rect width="840" height="480" fill="#ffffff"/>
  <text x="420" y="26" text-anchor="middle" font-size="16" font-weight="600" fill="#111827">Padded Block Grid: Chunk + One Layer of Neighbor Data</text>

  <defs>
    <marker id="arrRight" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M0,1 L9,5 L0,9 z" fill="#374151"/>
    </marker>
    <marker id="arrDown" viewBox="0 0 10 10" refX="5" refY="9" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M1,0 L5,9 L9,0 z" fill="#374151"/>
    </marker>
    <marker id="arrDiag" viewBox="0 0 10 10" refX="9" refY="9" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M0,0 L9,9 L0,9 z" fill="#374151"/>
    </marker>
  </defs>

  <!-- ===== CENTER: Padded grid diagram ===== -->
  <!-- We show a 4×4 chunk interior with 1-cell padding → 6×6 total grid -->
  <!-- Cell size: 32px. Grid: 6×6 = 192×192 -->
  <!-- Origin at (124, 60) -->
  <g transform="translate(124, 60)">
    <text x="96" y="-10" text-anchor="middle" font-weight="700" fill="#111827">Padded grid (W+2) × (H+2)</text>

    <!-- Draw the full 6×6 padded grid cells -->
    <!-- Padding cells (outer ring) have dashed border -->
    <!-- Chunk interior cells (4×4) have solid border -->

    <!-- Padding ring: row 0 and row 5 -->
    <g fill="#e0f2fe" stroke="#7dd3fc" stroke-width="1.2" stroke-dasharray="3,2">
      <!-- Row 0 (top padding) -->
      <rect x="0"   y="0"   width="32" height="32" rx="1"/>
      <rect x="32"  y="0"   width="32" height="32" rx="1"/>
      <rect x="64"  y="0"   width="32" height="32" rx="1"/>
      <rect x="96"  y="0"   width="32" height="32" rx="1"/>
      <rect x="128" y="0"   width="32" height="32" rx="1"/>
      <rect x="160" y="0"   width="32" height="32" rx="1"/>
      <!-- Row 5 (bottom padding) -->
      <rect x="0"   y="160" width="32" height="32" rx="1"/>
      <rect x="32"  y="160" width="32" height="32" rx="1"/>
      <rect x="64"  y="160" width="32" height="32" rx="1"/>
      <rect x="96"  y="160" width="32" height="32" rx="1"/>
      <rect x="128" y="160" width="32" height="32" rx="1"/>
      <rect x="160" y="160" width="32" height="32" rx="1"/>
      <!-- Col 0 (left padding, rows 1-4) -->
      <rect x="0"   y="32"  width="32" height="32" rx="1"/>
      <rect x="0"   y="64"  width="32" height="32" rx="1"/>
      <rect x="0"   y="96"  width="32" height="32" rx="1"/>
      <rect x="0"   y="128" width="32" height="32" rx="1"/>
      <!-- Col 5 (right padding, rows 1-4) -->
      <rect x="160" y="32"  width="32" height="32" rx="1"/>
      <rect x="160" y="64"  width="32" height="32" rx="1"/>
      <rect x="160" y="96"  width="32" height="32" rx="1"/>
      <rect x="160" y="128" width="32" height="32" rx="1"/>
    </g>

    <!-- Chunk interior (4×4) cells — solid border -->
    <g fill="#fef3c7" stroke="#92400e" stroke-width="1.5">
      <rect x="32"  y="32"  width="32" height="32" rx="1"/>
      <rect x="64"  y="32"  width="32" height="32" rx="1"/>
      <rect x="96"  y="32"  width="32" height="32" rx="1"/>
      <rect x="128" y="32"  width="32" height="32" rx="1"/>
      <rect x="32"  y="64"  width="32" height="32" rx="1"/>
      <rect x="64"  y="64"  width="32" height="32" rx="1"/>
      <rect x="96"  y="64"  width="32" height="32" rx="1"/>
      <rect x="128" y="64"  width="32" height="32" rx="1"/>
      <rect x="32"  y="96"  width="32" height="32" rx="1"/>
      <rect x="64"  y="96"  width="32" height="32" rx="1"/>
      <rect x="96"  y="96"  width="32" height="32" rx="1"/>
      <rect x="128" y="96"  width="32" height="32" rx="1"/>
      <rect x="32"  y="128" width="32" height="32" rx="1"/>
      <rect x="64"  y="128" width="32" height="32" rx="1"/>
      <rect x="96"  y="128" width="32" height="32" rx="1"/>
      <rect x="128" y="128" width="32" height="32" rx="1"/>
    </g>

    <!-- Inner boundary highlight (separates padding from interior) -->
    <rect x="32" y="32" width="128" height="128" fill="none" stroke="#92400e" stroke-width="2" stroke-dasharray="6,3" rx="2"/>

    <!-- Label: "Chunk blocks (4×4)" inside the interior -->
    <g transform="translate(96, 96)">
      <rect x="-52" y="-18" width="104" height="36" fill="#ffffff" fill-opacity="0.85" rx="4"/>
      <text x="0" y="-2" text-anchor="middle" font-size="11" font-weight="700" fill="#92400e">Chunk blocks</text>
      <text x="0" y="14" text-anchor="middle" font-size="10" fill="#92400e">4 × 4 interior</text>
    </g>

    <!-- Label: "Padding" on top-left padding area -->
    <g transform="translate(16, 16)">
      <text x="0" y="0" text-anchor="middle" font-size="9" font-weight="600" fill="#0284c7">Padding</text>
    </g>

    <!-- Coordinate annotations for the padded array index formula -->
    <!-- Show padded coords for a sample cell -->
    <!-- offset text showing padded indexing -->
    <g transform="translate(96, 25)">
      <text x="0" y="0" font-size="10" font-family="ui-monospace, Consolas, monospace" font-weight="700" fill="#1e40af">
        padded[x+1][y+1]
      </text>
    </g>
  </g>

  <!-- ===== RIGHT: Diagram annotations ===== -->

  <!-- Annotation box 1: How padding works -->
  <g transform="translate(380, 60)">
    <rect width="420" height="136" fill="#f0f9ff" stroke="#7dd3fc" stroke-width="1.2" rx="6"/>
    <text x="14" y="22" font-weight="700" fill="#0369a1">How the padded grid works</text>

    <g transform="translate(14, 0)" font-size="12" fill="#374151">
      <text x="0" y="40">1. A copy is made with <tspan font-weight="700">+2 on every axis</tspan></text>
      <text x="0" y="58">   — the interior block array is placed at</text>
      <text x="16" y="74" font-family="ui-monospace, monospace" font-size="11">padded[(x+1) + (y+1)·PW + (z+1)·PWPH]</text>

      <text x="0" y="98">2. The six outer padding layers are filled from</text>
      <text x="16" y="114" font-family="ui-monospace, monospace" font-size="11">ChunkNeighbors { negX, posX, negY, posY, negZ, posZ }</text>
    </g>
  </g>

  <!-- Annotation box 2: Neighbor data sources -->
  <g transform="translate(380, 216)">
    <rect width="420" height="124" fill="#fef2f2" stroke="#fca5a5" stroke-width="1.2" rx="6"/>
    <text x="14" y="22" font-weight="700" fill="#dc2626">Neighbor data sources</text>

    <g transform="translate(14, 0)" font-size="12" fill="#374151">
      <text x="0" y="42">When a neighbor chunk <tspan font-weight="700">exists</tspan>: its facing layer of</text>
      <text x="0" y="58">blocks is copied into the corresponding padding face.</text>

      <text x="0" y="82">When a neighbor <tspan font-weight="700">does not exist</tspan> (world boundary):</text>
      <text x="0" y="98">the padding remains <tspan font-family="ui-monospace, monospace" font-weight="600">BlockType.NONE</tspan>.</text>
    </g>
  </g>

  <!-- Annotation box 3: Performance benefit -->
  <g transform="translate(380, 360)">
    <rect width="420" height="120" fill="#f0fdf4" stroke="#86efac" stroke-width="1.2" rx="6"/>
    <text x="14" y="22" font-weight="700" fill="#16a34a">Why this matters</text>

    <g transform="translate(14, 0)" font-size="12" fill="#374151">
      <text x="0" y="42">Without padding, every face-direction lookup needs to</text>
      <text x="0" y="58">check <tspan font-weight="600">whether the neighbor coordinate is in-bounds</tspan></text>
      <text x="0" y="74">and conditionally dispatch to a neighbor chunk.</text>
      <text x="0" y="96">With padding, the mesher loop has <tspan font-weight="700">zero branches</tspan></text>
      <text x="0" y="112">— all lookups are a single array index.</text>
    </g>
  </g>
</svg>
