<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 920 320" font-family="system-ui, -apple-system, sans-serif" font-size="13">
  <rect width="920" height="320" fill="#ffffff"/>
  <text x="460" y="26" text-anchor="middle" font-size="16" font-weight="600" fill="#111827">The Modern GPU Graphics Pipeline (WebGPU subset highlighted)</text>

  <defs>
    <marker id="pArr" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="9" markerHeight="9" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#374151"/>
    </marker>
  </defs>

  <!-- Stage box style: programmable=solid blue; fixed-function=gray; not-in-WebGPU=dashed gray -->
  <!-- 7 stages, but Tessellation and Geometry are dashed (not in WebGPU) -->

  <!-- Vertex buffers (input) -->
  <g transform="translate(20, 110)">
    <rect width="100" height="60" fill="#fef3c7" stroke="#92400e" stroke-width="1.4" rx="4"/>
    <text x="50" y="24" text-anchor="middle" font-weight="700" fill="#92400e" font-size="12">Vertex</text>
    <text x="50" y="40" text-anchor="middle" fill="#92400e" font-size="11">buffers</text>
    <text x="50" y="54" text-anchor="middle" fill="#92400e" font-size="10" font-style="italic">positions, UVs…</text>
  </g>

  <line x1="120" y1="140" x2="142" y2="140" stroke="#374151" stroke-width="1.5" marker-end="url(#pArr)"/>

  <!-- Vertex shader (programmable, in WebGPU) -->
  <g transform="translate(144, 110)">
    <rect width="110" height="60" fill="#dbeafe" stroke="#1e40af" stroke-width="1.6" rx="4"/>
    <text x="55" y="22" text-anchor="middle" font-weight="700" fill="#1e40af" font-size="12">Vertex</text>
    <text x="55" y="36" text-anchor="middle" font-weight="700" fill="#1e40af" font-size="12">Shader</text>
    <text x="55" y="52" text-anchor="middle" fill="#1e40af" font-size="10" font-style="italic">programmable</text>
  </g>

  <line x1="254" y1="140" x2="276" y2="140" stroke="#374151" stroke-width="1.5" marker-end="url(#pArr)"/>

  <!-- Tessellation (NOT in WebGPU) -->
  <g transform="translate(278, 110)">
    <rect width="100" height="60" fill="#f9fafb" stroke="#9ca3af" stroke-width="1.4" stroke-dasharray="5,4" rx="4"/>
    <text x="50" y="24" text-anchor="middle" font-weight="600" fill="#6b7280" font-size="12">Tessellation</text>
    <text x="50" y="40" text-anchor="middle" fill="#6b7280" font-size="10" font-style="italic">optional —</text>
    <text x="50" y="54" text-anchor="middle" fill="#6b7280" font-size="10" font-style="italic">not in WebGPU</text>
  </g>

  <line x1="378" y1="140" x2="400" y2="140" stroke="#374151" stroke-width="1.5" marker-end="url(#pArr)"/>

  <!-- Geometry shader (NOT in WebGPU) -->
  <g transform="translate(402, 110)">
    <rect width="100" height="60" fill="#f9fafb" stroke="#9ca3af" stroke-width="1.4" stroke-dasharray="5,4" rx="4"/>
    <text x="50" y="24" text-anchor="middle" font-weight="600" fill="#6b7280" font-size="12">Geometry</text>
    <text x="50" y="40" text-anchor="middle" font-weight="600" fill="#6b7280" font-size="12">Shader</text>
    <text x="50" y="54" text-anchor="middle" fill="#6b7280" font-size="10" font-style="italic">not in WebGPU</text>
  </g>

  <line x1="502" y1="140" x2="524" y2="140" stroke="#374151" stroke-width="1.5" marker-end="url(#pArr)"/>

  <!-- Rasterisation (fixed function, in WebGPU) -->
  <g transform="translate(526, 110)">
    <rect width="100" height="60" fill="#e5e7eb" stroke="#374151" stroke-width="1.4" rx="4"/>
    <text x="50" y="22" text-anchor="middle" font-weight="700" fill="#374151" font-size="12">Rasterisation</text>
    <text x="50" y="38" text-anchor="middle" fill="#374151" font-size="10" font-style="italic">fixed-function</text>
    <text x="50" y="52" text-anchor="middle" fill="#374151" font-size="10" font-style="italic">→ fragments</text>
  </g>

  <line x1="626" y1="140" x2="648" y2="140" stroke="#374151" stroke-width="1.5" marker-end="url(#pArr)"/>

  <!-- Fragment shader (programmable, in WebGPU) -->
  <g transform="translate(650, 110)">
    <rect width="110" height="60" fill="#dbeafe" stroke="#1e40af" stroke-width="1.6" rx="4"/>
    <text x="55" y="22" text-anchor="middle" font-weight="700" fill="#1e40af" font-size="12">Fragment</text>
    <text x="55" y="36" text-anchor="middle" font-weight="700" fill="#1e40af" font-size="12">Shader</text>
    <text x="55" y="52" text-anchor="middle" fill="#1e40af" font-size="10" font-style="italic">programmable</text>
  </g>

  <line x1="760" y1="140" x2="782" y2="140" stroke="#374151" stroke-width="1.5" marker-end="url(#pArr)"/>

  <!-- Output merger (fixed function) -->
  <g transform="translate(784, 110)">
    <rect width="120" height="60" fill="#e5e7eb" stroke="#374151" stroke-width="1.4" rx="4"/>
    <text x="60" y="22" text-anchor="middle" font-weight="700" fill="#374151" font-size="12">Depth/Blend</text>
    <text x="60" y="36" text-anchor="middle" font-weight="700" fill="#374151" font-size="12">+ Output</text>
    <text x="60" y="52" text-anchor="middle" fill="#374151" font-size="10" font-style="italic">→ render target</text>
  </g>

  <!-- Compute pipeline as separate side annotation -->
  <g transform="translate(20, 220)">
    <rect width="884" height="64" fill="#ede9fe" stroke="#5b21b6" stroke-width="1.4" rx="6"/>
    <text x="20" y="24" font-weight="700" fill="#5b21b6">Compute pipeline (separate path):</text>
    <text x="240" y="24" fill="#5b21b6">Compute Shader → Storage buffers / textures</text>
    <text x="20" y="46" font-size="11" fill="#5b21b6" font-style="italic">General-purpose programmable stage on its own pipeline.</text>
    <text x="20" y="60" font-size="11" fill="#5b21b6" font-style="italic">Crafty uses it for: GPU particles, auto-exposure histogram, temporal SSGI.</text>
  </g>

  <!-- Legend -->
  <g transform="translate(20, 60)" font-size="11">
    <rect x="0"   y="0" width="14" height="14" fill="#dbeafe" stroke="#1e40af" stroke-width="1.4"/>
    <text x="20" y="11" fill="#374151">Programmable (WGSL)</text>

    <rect x="170" y="0" width="14" height="14" fill="#e5e7eb" stroke="#374151" stroke-width="1.4"/>
    <text x="190" y="11" fill="#374151">Fixed-function</text>

    <rect x="290" y="0" width="14" height="14" fill="#f9fafb" stroke="#9ca3af" stroke-width="1.4" stroke-dasharray="3,2"/>
    <text x="310" y="11" fill="#374151">Stage absent in WebGPU</text>

    <rect x="490" y="0" width="14" height="14" fill="#fef3c7" stroke="#92400e" stroke-width="1.4"/>
    <text x="510" y="11" fill="#374151">Input data</text>
  </g>
</svg>
