<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 920 480" font-family="system-ui, -apple-system, sans-serif" font-size="13">
  <rect width="920" height="480" fill="#ffffff"/>
  <text x="460" y="26" text-anchor="middle" font-size="16" font-weight="600" fill="#111827">Forward vs Deferred Shading</text>

  <defs>
    <marker id="dfArr" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="9" markerHeight="9" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#374151"/>
    </marker>
  </defs>

  <!-- ===== LEFT: FORWARD ===== -->
  <g transform="translate(40, 60)">
    <text x="200" y="0" text-anchor="middle" font-weight="700" fill="#dc2626">Forward shading — lighting inside geometry pass</text>

    <!-- Frame -->
    <rect x="0" y="14" width="400" height="280" fill="#fef2f2" stroke="#fca5a5" stroke-width="1" rx="6"/>

    <!-- Geometry block -->
    <rect x="20" y="40" width="120" height="60" fill="#fff" stroke="#dc2626" stroke-width="1.4" rx="4"/>
    <text x="80" y="64" text-anchor="middle" font-weight="700" fill="#7f1d1d">geometry</text>
    <text x="80" y="82" text-anchor="middle" font-size="10" fill="#7f1d1d">3 meshes, overdraw = 2.5</text>

    <!-- Lights block -->
    <rect x="20" y="130" width="120" height="60" fill="#fff" stroke="#dc2626" stroke-width="1.4" rx="4"/>
    <text x="80" y="154" text-anchor="middle" font-weight="700" fill="#7f1d1d">lights (N)</text>
    <text x="80" y="172" text-anchor="middle" font-size="10" fill="#7f1d1d">all bound per draw</text>

    <!-- Combiner: fragment shader -->
    <rect x="200" y="80" width="180" height="80" fill="#fee2e2" stroke="#dc2626" stroke-width="1.6" rx="4"/>
    <text x="290" y="104" text-anchor="middle" font-weight="700" fill="#7f1d1d">fragment shader</text>
    <text x="290" y="122" text-anchor="middle" font-size="10" fill="#7f1d1d">for each light: shade</text>
    <text x="290" y="138" text-anchor="middle" font-size="10" fill="#7f1d1d">(lit fragments × N)</text>

    <!-- Arrows from geometry and lights into shader -->
    <line x1="140" y1="70"  x2="200" y2="100" stroke="#dc2626" stroke-width="1.4" marker-end="url(#dfArr)"/>
    <line x1="140" y1="160" x2="200" y2="140" stroke="#dc2626" stroke-width="1.4" marker-end="url(#dfArr)"/>

    <!-- Arrow to framebuffer -->
    <line x1="290" y1="160" x2="290" y2="220" stroke="#dc2626" stroke-width="1.4" marker-end="url(#dfArr)"/>

    <!-- Framebuffer -->
    <rect x="220" y="220" width="140" height="50" fill="#fef3c7" stroke="#a16207" stroke-width="1.4" rx="4"/>
    <text x="290" y="242" text-anchor="middle" font-weight="700" fill="#713f12">framebuffer</text>
    <text x="290" y="258" text-anchor="middle" font-size="10" fill="#713f12">one final color</text>

    <!-- Cost banner below frame -->
    <text x="200" y="318" text-anchor="middle" font-size="11" font-style="italic" fill="#7f1d1d">cost = visible_fragments × lights</text>
    <text x="200" y="334" text-anchor="middle" font-size="11" font-style="italic" fill="#7f1d1d">overdrawn fragments shaded multiple times</text>
  </g>

  <!-- ===== RIGHT: DEFERRED ===== -->
  <g transform="translate(480, 60)">
    <text x="200" y="0" text-anchor="middle" font-weight="700" fill="#15803d">Deferred shading — lighting after geometry</text>

    <!-- Frame -->
    <rect x="0" y="14" width="400" height="280" fill="#f0fdf4" stroke="#86efac" stroke-width="1" rx="6"/>

    <!-- Pass 1: Geometry → G-buffer -->
    <text x="200" y="38" text-anchor="middle" font-size="11" font-weight="700" fill="#14532d">Pass 1 · fill</text>

    <rect x="20" y="50" width="120" height="44" fill="#fff" stroke="#15803d" stroke-width="1.4" rx="4"/>
    <text x="80" y="70" text-anchor="middle" font-weight="700" fill="#14532d">geometry</text>
    <text x="80" y="86" text-anchor="middle" font-size="10" fill="#14532d">no lighting</text>

    <line x1="140" y1="72" x2="200" y2="72" stroke="#15803d" stroke-width="1.4" marker-end="url(#dfArr)"/>

    <rect x="200" y="50" width="180" height="44" fill="#fef3c7" stroke="#a16207" stroke-width="1.4" rx="4"/>
    <text x="290" y="70" text-anchor="middle" font-weight="700" fill="#713f12">G-buffer</text>
    <text x="290" y="86" text-anchor="middle" font-size="10" fill="#713f12">albedo · normal · depth</text>

    <!-- Pass 2: G-buffer + lights → HDR -->
    <text x="200" y="138" text-anchor="middle" font-size="11" font-weight="700" fill="#14532d">Pass 2 · light</text>

    <rect x="20" y="150" width="120" height="50" fill="#fff" stroke="#15803d" stroke-width="1.4" rx="4"/>
    <text x="80" y="172" text-anchor="middle" font-weight="700" fill="#14532d">lights (N)</text>
    <text x="80" y="188" text-anchor="middle" font-size="10" fill="#14532d">in uniform list</text>

    <!-- Arrows: G-buffer (top-right) and lights (left) into lighting shader -->
    <line x1="290" y1="94"  x2="290" y2="150" stroke="#15803d" stroke-width="1.4" marker-end="url(#dfArr)"/>
    <line x1="140" y1="175" x2="200" y2="175" stroke="#15803d" stroke-width="1.4" marker-end="url(#dfArr)"/>

    <rect x="200" y="150" width="180" height="50" fill="#dcfce7" stroke="#15803d" stroke-width="1.6" rx="4"/>
    <text x="290" y="172" text-anchor="middle" font-weight="700" fill="#14532d">lighting shader</text>
    <text x="290" y="188" text-anchor="middle" font-size="10" fill="#14532d">one shade per pixel</text>

    <line x1="290" y1="200" x2="290" y2="234" stroke="#15803d" stroke-width="1.4" marker-end="url(#dfArr)"/>

    <rect x="220" y="234" width="140" height="44" fill="#fef3c7" stroke="#a16207" stroke-width="1.4" rx="4"/>
    <text x="290" y="254" text-anchor="middle" font-weight="700" fill="#713f12">HDR target</text>
    <text x="290" y="270" text-anchor="middle" font-size="10" fill="#713f12">final lit color</text>

    <!-- Cost banner below frame -->
    <text x="200" y="318" text-anchor="middle" font-size="11" font-style="italic" fill="#14532d">cost = screen_pixels × lights  (geometry decoupled)</text>
    <text x="200" y="334" text-anchor="middle" font-size="11" font-style="italic" fill="#14532d">overdraw doesn't multiply lighting cost</text>
  </g>

  <!-- ===== Bottom shared notes ===== -->
  <g transform="translate(40, 408)">
    <rect width="840" height="56" fill="#f9fafb" stroke="#9ca3af" stroke-width="1" rx="6"/>
    <text x="14" y="22" font-weight="700" fill="#111827">Crafty: deferred for opaque geometry, forward for transparent (Water, Particles, Forward pass)</text>
    <text x="14" y="42" font-size="11" fill="#374151">Transparent surfaces can't share a single G-buffer cell — they need per-pixel lighting at draw time, like forward.</text>
  </g>
</svg>
