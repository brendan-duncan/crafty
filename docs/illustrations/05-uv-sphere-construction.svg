<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 440" font-family="system-ui, -apple-system, sans-serif" font-size="13">
  <rect width="880" height="440" fill="#ffffff"/>
  <text x="440" y="26" text-anchor="middle" font-size="16" font-weight="600" fill="#111827">UV Sphere: Latitude / Longitude Rings → Quads → Triangles</text>

  <!-- ===== LEFT: sphere with lat/lon grid ===== -->
  <g transform="translate(60, 60)">
    <text x="180" y="0" text-anchor="middle" font-weight="700" fill="#111827">UV sphere with lat/lon rings</text>

    <!-- Sphere outer circle -->
    <circle cx="180" cy="180" r="140" fill="#f9fafb" stroke="#374151" stroke-width="1.5"/>

    <!-- Equator (horizontal ellipse) -->
    <ellipse cx="180" cy="180" rx="140" ry="36" fill="none" stroke="#1e40af" stroke-width="1.4"/>

    <!-- Latitude rings (front-facing arcs) at -60°, -30°, +30°, +60° -->
    <!-- For a sphere viewed from front, ring at latitude lat°: y = 180 - 140*sin(lat), rx = 140*cos(lat), ry = 36*cos(lat) -->
    <ellipse cx="180" cy="60" rx="70" ry="18" fill="none" stroke="#1e40af" stroke-width="1" opacity="0.7"/>   <!-- +60 -->
    <ellipse cx="180" cy="110" rx="121" ry="31" fill="none" stroke="#1e40af" stroke-width="1" opacity="0.7"/> <!-- +30 -->
    <ellipse cx="180" cy="250" rx="121" ry="31" fill="none" stroke="#1e40af" stroke-width="1" opacity="0.7"/> <!-- -30 -->
    <ellipse cx="180" cy="300" rx="70" ry="18" fill="none" stroke="#1e40af" stroke-width="1" opacity="0.7"/>  <!-- -60 -->

    <!-- Longitude meridians (front-facing arcs through both poles) -->
    <!-- For a meridian at longitude phi (from front), draw an ellipse with cx=180, cy=180, rx=140*sin(phi), ry=140 -->
    <!-- Approximations -->
    <ellipse cx="180" cy="180" rx="36" ry="140" fill="none" stroke="#dc2626" stroke-width="1" opacity="0.7"/>  <!-- 75°/255° -->
    <ellipse cx="180" cy="180" rx="80" ry="140" fill="none" stroke="#dc2626" stroke-width="1" opacity="0.7"/>  <!-- 60°/240° -->
    <ellipse cx="180" cy="180" rx="120" ry="140" fill="none" stroke="#dc2626" stroke-width="1" opacity="0.7"/> <!-- 30°/210° -->
    <!-- Vertical meridian (180° plane) -->
    <line x1="180" y1="40" x2="180" y2="320" stroke="#dc2626" stroke-width="1" opacity="0.7"/>

    <!-- Pole points -->
    <circle cx="180" cy="40" r="4" fill="#111827"/>
    <text x="188" y="38" font-size="11" fill="#111827" font-weight="600">north pole (v = 1)</text>

    <circle cx="180" cy="320" r="4" fill="#111827"/>
    <text x="188" y="338" font-size="11" fill="#111827" font-weight="600">south pole (v = 0)</text>

    <!-- Equator label -->
    <text x="328" y="184" font-size="11" fill="#1e40af" font-weight="600">equator (v = 0.5)</text>

    <!-- Legend -->
    <g transform="translate(0, 360)" font-size="11">
      <line x1="0"  y1="0" x2="20" y2="0" stroke="#1e40af" stroke-width="1.4"/>
      <text x="26" y="4" fill="#374151">latitude (lat) — v coord</text>

      <line x1="180" y1="0" x2="200" y2="0" stroke="#dc2626" stroke-width="1.4"/>
      <text x="206" y="4" fill="#374151">longitude (lon) — u coord</text>
    </g>
  </g>

  <!-- ===== RIGHT: indexing diagram for one quad ===== -->
  <g transform="translate(500, 60)">
    <text x="170" y="0" text-anchor="middle" font-weight="700" fill="#111827">Indexing one quad → 2 triangles</text>

    <!-- The quad with vertices labeled a, a+1, b, b+1 -->
    <g transform="translate(40, 80)">
      <!-- Quad outline -->
      <polygon points="0,0 240,0 240,180 0,180" fill="#f9fafb" stroke="#374151" stroke-width="1.5"/>

      <!-- Diagonal splitting it into 2 triangles -->
      <line x1="0" y1="0" x2="240" y2="180" stroke="#7c3aed" stroke-width="1.5" stroke-dasharray="5,3"/>

      <!-- Triangle fills (faint) -->
      <polygon points="0,0 240,0 240,180" fill="#dbeafe" opacity="0.5"/>
      <polygon points="0,0 240,180 0,180" fill="#dcfce7" opacity="0.5"/>

      <!-- Vertex circles + labels -->
      <g font-family="ui-monospace, Consolas, monospace" font-size="13">
        <!-- a (top-left) -->
        <circle cx="0" cy="0" r="8" fill="#dc2626"/>
        <text x="-8" y="-8" text-anchor="end" font-weight="700" fill="#dc2626">a</text>

        <!-- a+1 (top-right) -->
        <circle cx="240" cy="0" r="8" fill="#ea580c"/>
        <text x="248" y="-8" font-weight="700" fill="#ea580c">a + 1</text>

        <!-- b (bottom-left) -->
        <circle cx="0" cy="180" r="8" fill="#16a34a"/>
        <text x="-8" y="196" text-anchor="end" font-weight="700" fill="#16a34a">b</text>

        <!-- b+1 (bottom-right) -->
        <circle cx="240" cy="180" r="8" fill="#2563eb"/>
        <text x="248" y="196" font-weight="700" fill="#2563eb">b + 1</text>
      </g>

      <!-- Triangle labels -->
      <text x="160" y="60" font-size="12" fill="#1e40af" font-weight="600">tri 1</text>
      <text x="80" y="140" font-size="12" fill="#166534" font-weight="600">tri 2</text>
    </g>

    <!-- Index formula box -->
    <g transform="translate(40, 290)">
      <rect width="320" height="98" fill="#f9fafb" stroke="#9ca3af" stroke-width="1" rx="4"/>
      <text x="14" y="22" font-weight="700" fill="#111827">Per quad emit 6 indices:</text>
      <g font-family="ui-monospace, Consolas, monospace" font-size="12">
        <text x="14" y="44" fill="#1e40af">tri 1: a, a+1, b</text>
        <text x="14" y="64" fill="#166534">tri 2: a+1, b+1, b</text>
        <text x="14" y="86" fill="#374151"><tspan font-style="italic">(CCW from outside the sphere)</tspan></text>
      </g>
    </g>
  </g>
</svg>
