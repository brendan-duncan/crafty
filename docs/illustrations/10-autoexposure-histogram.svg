<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 380" font-family="system-ui, -apple-system, sans-serif" font-size="13">
  <rect width="760" height="380" fill="#ffffff"/>
  <text x="380" y="26" text-anchor="middle" font-size="16" font-weight="600" fill="#111827">Auto-Exposure: Luminance Histogram → Adaptive Exposure</text>

  <!-- Histogram area -->
  <g transform="translate(60, 60)">
    <text x="320" y="0" text-anchor="middle" font-weight="700" fill="#111827">Per-frame log-luminance histogram</text>

    <!-- Plot box -->
    <rect x="0" y="20" width="640" height="200" fill="#f9fafb" stroke="#374151" stroke-width="1.2"/>

    <!-- Histogram bars (32 buckets, varying heights). Base at y=220, top of plot at y=20 -->
    <!-- Each bucket 18 wide, gap 2 -->
    <g fill="#1e40af">
      <rect x="6"   y="200" width="18" height="20"/>
      <rect x="26"  y="190" width="18" height="30"/>
      <rect x="46"  y="180" width="18" height="40"/>
      <rect x="66"  y="170" width="18" height="50"/>
      <rect x="86"  y="155" width="18" height="65"/>
      <rect x="106" y="135" width="18" height="85"/>
      <rect x="126" y="110" width="18" height="110"/>
      <rect x="146" y="80"  width="18" height="140"/>
      <rect x="166" y="60"  width="18" height="160"/>
      <rect x="186" y="50"  width="18" height="170"/>
      <rect x="206" y="46"  width="18" height="174"/>
      <rect x="226" y="50"  width="18" height="170"/>
      <rect x="246" y="60"  width="18" height="160"/>
      <rect x="266" y="80"  width="18" height="140"/>
      <rect x="286" y="100" width="18" height="120"/>
      <rect x="306" y="120" width="18" height="100"/>
      <rect x="326" y="140" width="18" height="80"/>
      <rect x="346" y="155" width="18" height="65"/>
      <rect x="366" y="170" width="18" height="50"/>
      <rect x="386" y="180" width="18" height="40"/>
      <rect x="406" y="186" width="18" height="34"/>
      <rect x="426" y="192" width="18" height="28"/>
      <rect x="446" y="196" width="18" height="24"/>
      <rect x="466" y="200" width="18" height="20"/>
      <rect x="486" y="204" width="18" height="16"/>
      <rect x="506" y="206" width="18" height="14"/>
      <rect x="526" y="208" width="18" height="12"/>
      <rect x="546" y="210" width="18" height="10"/>
      <rect x="566" y="212" width="18" height="8"/>
      <rect x="586" y="214" width="18" height="6"/>
      <rect x="606" y="216" width="18" height="4"/>
      <rect x="626" y="218" width="18" height="2"/>
    </g>

    <!-- Average marker (vertical red line) — around bucket 11 (x ~215) -->
    <line x1="215" y1="20" x2="215" y2="220" stroke="#dc2626" stroke-width="2.5"/>
    <text x="215" y="14" text-anchor="middle" font-weight="700" fill="#dc2626" font-size="11">avg log-luminance</text>

    <!-- X axis labels -->
    <g font-size="11" fill="#6b7280">
      <text x="0"   y="240">dark</text>
      <text x="630" y="240" text-anchor="end">bright</text>
      <text x="320" y="254" text-anchor="middle" font-style="italic">log-luminance buckets (compute shader: atomicAdd per pixel)</text>
    </g>

    <text x="-12" y="120" text-anchor="end" font-size="11" fill="#6b7280" transform="rotate(-90, -12, 120)" font-style="italic">pixel count</text>
  </g>

  <!-- Bottom: temporal smoothing + exposure formula -->
  <g transform="translate(60, 320)">
    <rect width="640" height="48" fill="#fef3c7" stroke="#92400e" stroke-width="1" rx="4"/>
    <text x="14" y="20" font-size="12" font-family="ui-monospace, Consolas, monospace" fill="#92400e">adapted = lerp(adapted, current, 1 − exp(−Δt · adaptSpeed))</text>
    <text x="14" y="40" font-size="12" font-family="ui-monospace, Consolas, monospace" fill="#92400e">exposure = 1 / max(adapted, 0.001)        →  hdrColor *= exposure</text>
  </g>
</svg>
