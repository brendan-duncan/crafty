<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 920 460" font-family="system-ui, -apple-system, sans-serif" font-size="13">
  <rect width="920" height="460" fill="#ffffff"/>
  <text x="460" y="26" text-anchor="middle" font-size="16" font-weight="600" fill="#111827">Name Labels: World Position → Screen Pixel via Camera Projection</text>

  <defs>
    <marker id="nlArr" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="9" markerHeight="9" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#374151"/>
    </marker>
  </defs>

  <!-- ===== LEFT: 3D side view (camera + remote players) ===== -->
  <g transform="translate(40, 60)">
    <text x="200" y="0" text-anchor="middle" font-weight="700" fill="#111827">3D scene (top-down)</text>

    <rect x="0" y="14" width="400" height="280" fill="#0f172a" stroke="#374151" stroke-width="1.4" rx="6"/>

    <!-- Camera at left -->
    <g transform="translate(40, 154)">
      <polygon points="-12,-10 12,-10 14,4 -14,4" fill="#60a5fa" stroke="#bfdbfe" stroke-width="1.4"/>
      <ellipse cx="0" cy="6" rx="10" ry="3" fill="#fef3c7" stroke="#bfdbfe" stroke-width="1"/>
      <text x="0" y="-22" text-anchor="middle" font-size="10" font-weight="700" fill="#bfdbfe">camera</text>
    </g>

    <!-- View frustum lines -->
    <g stroke="#fbbf24" stroke-width="1" stroke-dasharray="3,3" opacity="0.5">
      <line x1="40" y1="160" x2="380" y2="40"/>
      <line x1="40" y1="160" x2="380" y2="280"/>
    </g>

    <!-- Remote player A (in front, visible) -->
    <g transform="translate(220, 160)">
      <ellipse cx="0" cy="0" rx="12" ry="20" fill="#16a34a" stroke="#fff" stroke-width="1.4"/>
      <circle cx="0" cy="-22" r="8" fill="#fcd34d" stroke="#fff" stroke-width="1.2"/>
      <text x="22" y="-20" font-size="10" font-weight="700" fill="#bbf7d0">"Alex"</text>
      <text x="22" y="-6" font-size="9" fill="#bbf7d0">visible · screenPos.z &gt; 0</text>
    </g>

    <!-- Remote player B (far in distance, faded) -->
    <g transform="translate(330, 90)" opacity="0.55">
      <ellipse cx="0" cy="0" rx="6" ry="10" fill="#16a34a" stroke="#fff" stroke-width="1"/>
      <circle cx="0" cy="-12" r="4" fill="#fcd34d" stroke="#fff" stroke-width="0.8"/>
      <text x="10" y="-12" font-size="9" font-weight="700" fill="#bbf7d0">"Sam"</text>
      <text x="10" y="-2" font-size="8" fill="#bbf7d0">faded by distance</text>
    </g>

    <!-- Remote player C (behind camera, hidden) -->
    <g transform="translate(20, 210)" opacity="0.4">
      <ellipse cx="0" cy="0" rx="10" ry="16" fill="#52525b" stroke="#94a3b8" stroke-width="1.2" stroke-dasharray="2,2"/>
      <circle cx="0" cy="-18" r="6" fill="#52525b" stroke="#94a3b8" stroke-width="1" stroke-dasharray="2,2"/>
      <text x="-12" y="14" text-anchor="end" font-size="9" font-weight="700" fill="#94a3b8">"Robin"</text>
      <text x="-12" y="26" text-anchor="end" font-size="8" fill="#94a3b8">behind camera · hidden</text>
    </g>

    <text x="200" y="316" text-anchor="middle" font-size="11" font-style="italic" fill="#6b7280">label position = head world-pos + (0, 0.4, 0)</text>
  </g>

  <!-- ===== RIGHT: screen-space rendering ===== -->
  <g transform="translate(480, 60)">
    <text x="200" y="0" text-anchor="middle" font-weight="700" fill="#111827">Screen pixels (DOM labels)</text>

    <!-- Game canvas frame -->
    <rect x="0" y="14" width="400" height="280" fill="#1e3a8a" stroke="#374151" stroke-width="1.4" rx="6"/>

    <!-- Sky/horizon decoration -->
    <rect x="0" y="184" width="400" height="110" fill="#0c4a6e" rx="0"/>
    <polygon points="0,200 100,180 200,190 300,182 400,200 400,294 0,294" fill="#1c1917" opacity="0.7"/>

    <!-- Crosshair -->
    <g transform="translate(200, 154)">
      <line x1="-8" y1="0" x2="8" y2="0" stroke="#fff" stroke-width="1.6"/>
      <line x1="0" y1="-8" x2="0" y2="8" stroke="#fff" stroke-width="1.6"/>
    </g>

    <!-- Alex label (close, large) -->
    <g transform="translate(200, 100)">
      <rect x="-32" y="-14" width="64" height="22" fill="#000" fill-opacity="0.65" rx="4"/>
      <text x="0" y="2" text-anchor="middle" font-size="11" font-weight="700" fill="#bbf7d0">Alex</text>
    </g>

    <!-- Sam label (far, small + faded) -->
    <g transform="translate(290, 134)" opacity="0.55">
      <rect x="-22" y="-10" width="44" height="16" fill="#000" fill-opacity="0.55" rx="3"/>
      <text x="0" y="2" text-anchor="middle" font-size="9" font-weight="700" fill="#bbf7d0">Sam</text>
    </g>

    <!-- Robin: not rendered (behind camera). Show with strikethrough hint -->
    <g transform="translate(60, 250)">
      <text x="0" y="0" font-size="10" font-style="italic" fill="#94a3b8">Robin: display = none</text>
    </g>

    <text x="200" y="316" text-anchor="middle" font-size="11" font-style="italic" fill="#6b7280">DOM &lt;div&gt; per remote player · style.left/top updated each frame</text>
  </g>

  <!-- ===== Bottom: math ===== -->
  <g transform="translate(40, 386)">
    <rect width="840" height="64" fill="#f9fafb" stroke="#9ca3af" stroke-width="1" rx="6"/>
    <text x="14" y="22" font-weight="700" fill="#111827">Projection</text>
    <g font-family="ui-monospace, Consolas, monospace" font-size="11" fill="#374151" transform="translate(14, 0)">
      <text x="0" y="42">screenPos = camera.worldToScreen(headWorldPos)   // returns { x, y, z }</text>
      <text x="0" y="58">label.style.left = `${screenPos.x}px`;  label.style.display = screenPos.z &gt; 0 ? 'block' : 'none';</text>
    </g>
  </g>
</svg>
