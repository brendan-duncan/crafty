<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 920 460" font-family="system-ui, -apple-system, sans-serif" font-size="13">
  <rect width="920" height="460" fill="#ffffff"/>
  <text x="460" y="26" text-anchor="middle" font-size="16" font-weight="600" fill="#111827">Resource Handle Versioning: each write returns a new version</text>

  <defs>
    <marker id="hvArr" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="9" markerHeight="9" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#374151"/>
    </marker>
    <marker id="hvRed" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="9" markerHeight="9" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#dc2626"/>
    </marker>
  </defs>

  <!-- Subtitle -->
  <text x="460" y="50" text-anchor="middle" font-size="12" fill="#6b7280">One virtual texture · id = 7 · three passes that touch it</text>

  <!-- ===== Timeline axis ===== -->
  <line x1="60" y1="220" x2="860" y2="220" stroke="#374151" stroke-width="2"/>
  <text x="60" y="246" font-size="11" font-weight="700" fill="#374151">declaration order →</text>

  <!-- ===== Handle bubbles along the timeline ===== -->
  <!-- v0 (initial), v1 (after pass A), v2 (after pass B). Pass C only reads v2. -->
  <g font-family="ui-monospace, Consolas, monospace" font-size="11">
    <!-- v0 -->
    <circle cx="110" cy="220" r="22" fill="#fef3c7" stroke="#a16207" stroke-width="1.8"/>
    <text x="110" y="217" text-anchor="middle" fill="#713f12">{id: 7,</text>
    <text x="110" y="231" text-anchor="middle" fill="#713f12">v: 0}</text>
    <text x="110" y="262" text-anchor="middle" font-family="system-ui" font-size="10" fill="#a16207">initial</text>

    <!-- v1 -->
    <circle cx="370" cy="220" r="22" fill="#fef3c7" stroke="#a16207" stroke-width="1.8"/>
    <text x="370" y="217" text-anchor="middle" fill="#713f12">{id: 7,</text>
    <text x="370" y="231" text-anchor="middle" fill="#713f12">v: 1}</text>
    <text x="370" y="262" text-anchor="middle" font-family="system-ui" font-size="10" fill="#a16207">after A.write</text>

    <!-- v2 -->
    <circle cx="630" cy="220" r="22" fill="#fef3c7" stroke="#a16207" stroke-width="1.8"/>
    <text x="630" y="217" text-anchor="middle" fill="#713f12">{id: 7,</text>
    <text x="630" y="231" text-anchor="middle" fill="#713f12">v: 2}</text>
    <text x="630" y="262" text-anchor="middle" font-family="system-ui" font-size="10" fill="#a16207">after B.write</text>
  </g>

  <!-- ===== Pass boxes above the timeline ===== -->
  <!-- Pass A: write v0 → v1 -->
  <g transform="translate(180, 90)">
    <rect width="180" height="100" fill="#fee2e2" stroke="#dc2626" stroke-width="1.4" rx="6"/>
    <text x="90" y="22" text-anchor="middle" font-weight="700" fill="#7f1d1d">Pass A (clear)</text>
    <g font-family="ui-monospace, Consolas, monospace" font-size="10" fill="#7f1d1d" transform="translate(10, 0)">
      <text x="0" y="42">// loadOp: 'clear'</text>
      <text x="0" y="58">b.write(h, 'attachment',</text>
      <text x="0" y="74">  { loadOp: 'clear' });</text>
      <text x="0" y="92" font-style="italic">returns {v: 1}</text>
    </g>
  </g>

  <!-- Pass B: read v1, write v2 -->
  <g transform="translate(440, 90)">
    <rect width="180" height="100" fill="#dbeafe" stroke="#2563eb" stroke-width="1.4" rx="6"/>
    <text x="90" y="22" text-anchor="middle" font-weight="700" fill="#1e3a8a">Pass B (load + write)</text>
    <g font-family="ui-monospace, Consolas, monospace" font-size="10" fill="#1e3a8a" transform="translate(10, 0)">
      <text x="0" y="42">// receives v1 from A</text>
      <text x="0" y="58">b.write(v1, 'attachment',</text>
      <text x="0" y="74">  { loadOp: 'load' });</text>
      <text x="0" y="92" font-style="italic">returns {v: 2}</text>
    </g>
  </g>

  <!-- Pass C: read v2 -->
  <g transform="translate(700, 90)">
    <rect width="180" height="100" fill="#dcfce7" stroke="#15803d" stroke-width="1.4" rx="6"/>
    <text x="90" y="22" text-anchor="middle" font-weight="700" fill="#14532d">Pass C (read)</text>
    <g font-family="ui-monospace, Consolas, monospace" font-size="10" fill="#14532d" transform="translate(10, 0)">
      <text x="0" y="42">// receives v2 from B</text>
      <text x="0" y="58">b.read(v2, 'sampled');</text>
      <text x="0" y="76">// uses contents</text>
      <text x="0" y="92" font-style="italic">no write — no new version</text>
    </g>
  </g>

  <!-- Arrows from pass boxes down to the handle bubbles they consume/produce -->
  <!-- A writes v0 → v1: arrow from initial bubble up to A, and from A back down to v1 -->
  <line x1="110" y1="198" x2="180" y2="160" stroke="#dc2626" stroke-width="1.4" marker-end="url(#hvRed)"/>
  <line x1="360" y1="180" x2="370" y2="198" stroke="#dc2626" stroke-width="1.4" marker-end="url(#hvArr)"/>

  <!-- B writes v1 → v2 -->
  <line x1="370" y1="198" x2="440" y2="160" stroke="#2563eb" stroke-width="1.4" marker-end="url(#hvArr)"/>
  <line x1="620" y1="180" x2="630" y2="198" stroke="#2563eb" stroke-width="1.4" marker-end="url(#hvArr)"/>

  <!-- C reads v2 (no return) -->
  <line x1="630" y1="198" x2="700" y2="160" stroke="#15803d" stroke-width="1.4" marker-end="url(#hvArr)"/>

  <!-- ===== INVALID example below ===== -->
  <g transform="translate(40, 296)">
    <rect width="840" height="148" fill="#fff7ed" stroke="#c2410c" stroke-width="1.4" rx="8"/>
    <text x="14" y="22" font-weight="700" fill="#9a3412">What the compiler catches</text>

    <g font-size="11" fill="#7c2d12" transform="translate(14, 0)">
      <text x="0" y="46"><tspan font-weight="700">Stale read.</tspan> A pass that reads {id:7, v:1} <tspan font-style="italic">after</tspan> B has produced v:2 is rejected — the v:1 contents are gone.</text>
      <text x="0" y="66"><tspan font-weight="700">Double producer.</tspan> Two passes that both claim to produce {id:7, v:2} — only one producer per version is allowed.</text>
      <text x="0" y="86"><tspan font-weight="700">Unproduced read.</tspan> Reading {id:7, v:5} when no pass writes v:5 is a dangling reference — caught at compile time.</text>
      <text x="0" y="112" font-style="italic" fill="#c2410c">Without versioning these would be silent shader bugs. With versioning the graph build fails fast.</text>
    </g>
  </g>
</svg>
