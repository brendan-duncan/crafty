<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 920 440" font-family="system-ui, -apple-system, sans-serif" font-size="13">
  <rect width="920" height="440" fill="#ffffff"/>
  <text x="460" y="26" text-anchor="middle" font-size="16" font-weight="600" fill="#111827">Spawn Shapes: Sphere · Cone · Box</text>

  <defs>
    <marker id="ssArr" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="9" markerHeight="9" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#dc2626"/>
    </marker>
  </defs>

  <!-- ===== SPHERE panel ===== -->
  <g transform="translate(20, 60)">
    <text x="140" y="0" text-anchor="middle" font-weight="700" fill="#111827">Sphere · explosion / burst</text>

    <!-- Frame -->
    <rect x="0" y="14" width="280" height="240" fill="#fef2f2" stroke="#fca5a5" stroke-width="1" rx="6"/>

    <!-- Sphere outline -->
    <circle cx="140" cy="134" r="60" fill="#fee2e2" stroke="#dc2626" stroke-width="1.4" stroke-dasharray="4,3"/>

    <!-- Emitter dot at center -->
    <circle cx="140" cy="134" r="6" fill="#7f1d1d"/>
    <text x="140" y="56" text-anchor="middle" font-size="10" font-weight="700" fill="#7f1d1d">emitter</text>

    <!-- Direction arrows in 8 directions -->
    <g stroke="#dc2626" stroke-width="1.6">
      <line x1="140" y1="134" x2="140" y2="62"  marker-end="url(#ssArr)"/>
      <line x1="140" y1="134" x2="140" y2="206" marker-end="url(#ssArr)"/>
      <line x1="140" y1="134" x2="68"  y2="134" marker-end="url(#ssArr)"/>
      <line x1="140" y1="134" x2="212" y2="134" marker-end="url(#ssArr)"/>
      <line x1="140" y1="134" x2="89"  y2="83"  marker-end="url(#ssArr)"/>
      <line x1="140" y1="134" x2="191" y2="83"  marker-end="url(#ssArr)"/>
      <line x1="140" y1="134" x2="89"  y2="185" marker-end="url(#ssArr)"/>
      <line x1="140" y1="134" x2="191" y2="185" marker-end="url(#ssArr)"/>
    </g>

    <text x="140" y="232" text-anchor="middle" font-size="11" font-style="italic" fill="#7f1d1d">uniform direction on sphere cap (θ)</text>

    <!-- Caption -->
    <text x="140" y="278" text-anchor="middle" font-size="11" fill="#374151">use: explosions, magic bursts</text>
  </g>

  <!-- ===== CONE panel ===== -->
  <g transform="translate(320, 60)">
    <text x="140" y="0" text-anchor="middle" font-weight="700" fill="#111827">Cone · directional spray</text>

    <!-- Frame -->
    <rect x="0" y="14" width="280" height="240" fill="#fef2f2" stroke="#fca5a5" stroke-width="1" rx="6"/>

    <!-- Cone outline (triangle from apex at top to wider base at bottom) -->
    <polygon points="140,70 80,210 200,210" fill="#fee2e2" stroke="#dc2626" stroke-width="1.4" stroke-dasharray="4,3"/>

    <!-- Emitter at apex -->
    <circle cx="140" cy="70" r="6" fill="#7f1d1d"/>
    <text x="160" y="68" font-size="10" font-weight="700" fill="#7f1d1d">emitter</text>

    <!-- Particle direction arrows along the cone -->
    <g stroke="#dc2626" stroke-width="1.6">
      <line x1="140" y1="70" x2="140" y2="200" marker-end="url(#ssArr)"/>
      <line x1="140" y1="70" x2="100" y2="190" marker-end="url(#ssArr)"/>
      <line x1="140" y1="70" x2="180" y2="190" marker-end="url(#ssArr)"/>
      <line x1="140" y1="70" x2="118" y2="196" marker-end="url(#ssArr)"/>
      <line x1="140" y1="70" x2="162" y2="196" marker-end="url(#ssArr)"/>
    </g>

    <!-- Cone half-angle arc -->
    <path d="M 140 110 A 40 40 0 0 0 121 145" fill="none" stroke="#16a34a" stroke-width="1.4"/>
    <text x="106" y="120" text-anchor="end" font-size="10" font-weight="700" fill="#16a34a">θ</text>

    <text x="140" y="232" text-anchor="middle" font-size="11" font-style="italic" fill="#7f1d1d">spherical cap with half-angle θ</text>

    <!-- Caption -->
    <text x="140" y="278" text-anchor="middle" font-size="11" fill="#374151">use: thrusters, geysers, sparks</text>
  </g>

  <!-- ===== BOX panel ===== -->
  <g transform="translate(620, 60)">
    <text x="140" y="0" text-anchor="middle" font-weight="700" fill="#111827">Box · planar emitter (rain / snow)</text>

    <!-- Frame -->
    <rect x="0" y="14" width="280" height="240" fill="#fef2f2" stroke="#fca5a5" stroke-width="1" rx="6"/>

    <!-- Box drawn in perspective (parallelogram + small height) -->
    <polygon points="40,90 220,80 240,108 60,118" fill="#fee2e2" stroke="#dc2626" stroke-width="1.4" stroke-dasharray="4,3"/>
    <text x="40" y="80" font-size="10" font-weight="700" fill="#7f1d1d">emitter plane</text>

    <!-- Rain particles falling down — random x, small streaks -->
    <g stroke="#dc2626" stroke-width="1.4" opacity="0.85">
      <line x1="76"  y1="118" x2="78"  y2="200" marker-end="url(#ssArr)"/>
      <line x1="120" y1="116" x2="122" y2="210" marker-end="url(#ssArr)"/>
      <line x1="160" y1="112" x2="162" y2="200" marker-end="url(#ssArr)"/>
      <line x1="190" y1="108" x2="192" y2="206" marker-end="url(#ssArr)"/>
      <line x1="218" y1="106" x2="220" y2="194" marker-end="url(#ssArr)"/>
      <line x1="98"  y1="118" x2="100" y2="208" marker-end="url(#ssArr)"/>
      <line x1="138" y1="114" x2="140" y2="196" marker-end="url(#ssArr)"/>
      <line x1="200" y1="108" x2="202" y2="208" marker-end="url(#ssArr)"/>
    </g>

    <text x="140" y="232" text-anchor="middle" font-size="11" font-style="italic" fill="#7f1d1d">uniform random in half-extents,</text>
    <text x="140" y="246" text-anchor="middle" font-size="11" font-style="italic" fill="#7f1d1d">velocity = world_up</text>

    <!-- Caption -->
    <text x="140" y="278" text-anchor="middle" font-size="11" fill="#374151">use: rain, snow, dust</text>
  </g>

  <!-- ===== Bottom: shared shader pattern ===== -->
  <g transform="translate(20, 350)">
    <rect width="880" height="80" fill="#f9fafb" stroke="#9ca3af" stroke-width="1" rx="6"/>
    <text x="14" y="22" font-weight="700" fill="#111827">All shapes follow the same recipe in the spawn shader</text>
    <g font-size="11" fill="#374151" transform="translate(14, 0)">
      <text x="0" y="42">1. sample shape with PCG hash → local offset and direction</text>
      <text x="0" y="60">2. rotate by emitter quaternion → world-space  ·  3. write Particle to particleBuffer[idx]</text>
    </g>
  </g>
</svg>
