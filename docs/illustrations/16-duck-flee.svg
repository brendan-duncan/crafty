<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 920 460" font-family="system-ui, -apple-system, sans-serif" font-size="13">
  <rect width="920" height="460" fill="#ffffff"/>
  <text x="460" y="26" text-anchor="middle" font-size="16" font-weight="600" fill="#111827">Duck Flee Zones: 6-Block Trigger, 14-Block Safe Distance</text>

  <defs>
    <marker id="dfArr" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="9" markerHeight="9" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#dc2626"/>
    </marker>
    <marker id="dfArrG" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="9" markerHeight="9" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#16a34a"/>
    </marker>
  </defs>

  <!-- ===== LEFT: top-down view with concentric flee zones ===== -->
  <g transform="translate(40, 60)">
    <text x="220" y="0" text-anchor="middle" font-weight="700" fill="#111827">Top-down view (1 block = 11 px)</text>

    <!-- Frame -->
    <rect x="0" y="14" width="440" height="320" fill="#f0fdf4" stroke="#9ca3af" stroke-width="1" rx="6"/>

    <!-- Player at center: group (220, 174); rings sized to stay inside the frame -->
    <!-- Safe ring: r = 14 blocks * 11 = 154 -->
    <circle cx="220" cy="174" r="154" fill="#dcfce7" stroke="#16a34a" stroke-width="1.4" stroke-dasharray="4,3"/>
    <!-- Flee ring: r = 6 blocks * 11 = 66 -->
    <circle cx="220" cy="174" r="66" fill="#fee2e2" stroke="#dc2626" stroke-width="1.6"/>

    <!-- Player marker -->
    <circle cx="220" cy="174" r="6" fill="#1e3a8a" stroke="#fff" stroke-width="1.4"/>
    <text x="220" y="194" text-anchor="middle" font-size="10" font-weight="700" fill="#1e3a8a">player</text>

    <!-- Duck inside flee zone (north-east of player) -->
    <g transform="translate(264, 130)">
      <ellipse cx="0" cy="0" rx="9" ry="6" fill="#fde68a" stroke="#a16207" stroke-width="1.4"/>
      <circle cx="6" cy="-2" r="3.5" fill="#fde68a" stroke="#a16207" stroke-width="1.2"/>
      <text x="0" y="-12" text-anchor="middle" font-size="10" font-weight="700" fill="#7c2d12">duck</text>
    </g>

    <!-- Flee velocity vector — duck moves away from player (away = NE direction) -->
    <line x1="270" y1="124" x2="304" y2="90" stroke="#dc2626" stroke-width="2.4" marker-end="url(#dfArr)"/>
    <text x="312" y="86" font-size="10" font-weight="700" fill="#dc2626">v = 4.0 m/s</text>
    <text x="312" y="100" font-size="10" font-style="italic" fill="#dc2626">away from player</text>

    <!-- Radius labels — placed in the clear bands between rings -->
    <text x="220" y="60" text-anchor="middle" font-size="10" font-weight="700" fill="#dc2626">flee radius (6)</text>
    <text x="220" y="36" text-anchor="middle" font-size="10" font-weight="700" fill="#16a34a">safe distance (14)</text>

    <!-- Optional: tick marks on +X axis showing distances -->
    <g stroke="#6b7280" stroke-width="0.6">
      <line x1="220" y1="174" x2="374" y2="174"/>
      <line x1="286" y1="170" x2="286" y2="178"/>
      <line x1="374" y1="170" x2="374" y2="178"/>
    </g>
    <text x="286" y="190" text-anchor="middle" font-size="9" fill="#6b7280">6</text>
    <text x="374" y="190" text-anchor="middle" font-size="9" fill="#6b7280">14</text>
  </g>

  <!-- ===== RIGHT: thresholds and code ===== -->
  <g transform="translate(500, 60)">
    <text x="200" y="0" text-anchor="middle" font-weight="700" fill="#111827">Squared distances avoid sqrt</text>

    <rect x="0" y="14" width="400" height="320" fill="#f9fafb" stroke="#9ca3af" stroke-width="1" rx="6"/>

    <g font-family="ui-monospace, Consolas, monospace" font-size="12" fill="#374151" transform="translate(14, 0)">
      <text x="0" y="38" font-weight="700" fill="#111827">// in idle / wander update</text>
      <text x="0" y="56">if (playerDist2 &lt; 36) enterFlee();    <tspan fill="#dc2626">// 6²</tspan></text>

      <text x="0" y="92" font-weight="700" fill="#111827">// in flee update</text>
      <text x="0" y="110">if (playerDist2 &gt; 196) enterIdle();  <tspan fill="#16a34a">// 14²</tspan></text>

      <text x="0" y="146" font-weight="700" fill="#111827">// flee step</text>
      <text x="0" y="164">let n = normalize(self.pos − player.pos);</text>
      <text x="0" y="182">self.pos += n * 4.0 * dt;            <tspan fill="#6b7280">// flee speed</tspan></text>
      <text x="0" y="200">self.yaw  = atan2(−n.x, −n.z);</text>

      <text x="0" y="238" fill="#dc2626" font-style="italic">// 6 → 14 hysteresis prevents</text>
      <text x="0" y="254" fill="#dc2626" font-style="italic">// the duck from oscillating at the boundary</text>

      <text x="0" y="288" font-weight="700" fill="#111827">speeds:</text>
      <text x="0" y="304">wander 1.5 m/s · flee 4.0 m/s (~2.7×)</text>
    </g>
  </g>
</svg>
