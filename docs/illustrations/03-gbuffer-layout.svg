<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 380" font-family="system-ui, -apple-system, sans-serif" font-size="13">
  <rect width="760" height="380" fill="#ffffff"/>
  <text x="380" y="26" text-anchor="middle" font-size="16" font-weight="600" fill="#111827">GBuffer: Three Textures, Channel Packing</text>

  <!-- Three textures in a row, each illustrated as: a small image-like rect on top, a 4-channel breakdown below -->
  <!-- Each texture column: ~220 wide, starting at x=40, 280, 520 -->

  <!-- Helper for texture "thumbnail" -->
  <defs>
    <linearGradient id="albedoGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#a3a3a3"/>
      <stop offset="100%" stop-color="#525252"/>
    </linearGradient>
    <linearGradient id="normalGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#7dd3fc"/>
      <stop offset="50%" stop-color="#86efac"/>
      <stop offset="100%" stop-color="#fca5a5"/>
    </linearGradient>
    <linearGradient id="depthGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1e293b"/>
      <stop offset="100%" stop-color="#cbd5e1"/>
    </linearGradient>
  </defs>

  <!-- Column 1: AlbedoRoughness -->
  <g transform="translate(40, 60)">
    <text x="110" y="0" text-anchor="middle" font-weight="700" fill="#111827">albedoRoughness</text>
    <text x="110" y="16" text-anchor="middle" font-family="ui-monospace, Consolas, monospace" font-size="11" fill="#6b7280">rgba8unorm</text>

    <!-- Thumbnail -->
    <rect x="40" y="28" width="140" height="80" fill="url(#albedoGrad)" stroke="#374151" stroke-width="1.2"/>

    <!-- 4 channel rows -->
    <g transform="translate(0, 124)" font-size="11">
      <rect x="0" y="0" width="20" height="22" fill="#dc2626"/>
      <text x="10" y="15" text-anchor="middle" fill="#ffffff" font-weight="700">R</text>
      <text x="28" y="15" fill="#374151">albedo.r</text>

      <rect x="0" y="26" width="20" height="22" fill="#16a34a"/>
      <text x="10" y="41" text-anchor="middle" fill="#ffffff" font-weight="700">G</text>
      <text x="28" y="41" fill="#374151">albedo.g</text>

      <rect x="0" y="52" width="20" height="22" fill="#2563eb"/>
      <text x="10" y="67" text-anchor="middle" fill="#ffffff" font-weight="700">B</text>
      <text x="28" y="67" fill="#374151">albedo.b</text>

      <rect x="0" y="78" width="20" height="22" fill="#525252"/>
      <text x="10" y="93" text-anchor="middle" fill="#ffffff" font-weight="700">A</text>
      <text x="28" y="93" fill="#374151">roughness</text>
    </g>
  </g>

  <!-- Column 2: NormalMetallic -->
  <g transform="translate(280, 60)">
    <text x="110" y="0" text-anchor="middle" font-weight="700" fill="#111827">normalMetallic</text>
    <text x="110" y="16" text-anchor="middle" font-family="ui-monospace, Consolas, monospace" font-size="11" fill="#6b7280">rgba16float</text>

    <!-- Thumbnail (normal-map style) -->
    <rect x="40" y="28" width="140" height="80" fill="url(#normalGrad)" stroke="#374151" stroke-width="1.2"/>

    <g transform="translate(0, 124)" font-size="11">
      <rect x="0" y="0" width="20" height="22" fill="#dc2626"/>
      <text x="10" y="15" text-anchor="middle" fill="#ffffff" font-weight="700">R</text>
      <text x="28" y="15" fill="#374151">normal.x</text>

      <rect x="0" y="26" width="20" height="22" fill="#16a34a"/>
      <text x="10" y="41" text-anchor="middle" fill="#ffffff" font-weight="700">G</text>
      <text x="28" y="41" fill="#374151">normal.y</text>

      <rect x="0" y="52" width="20" height="22" fill="#2563eb"/>
      <text x="10" y="67" text-anchor="middle" fill="#ffffff" font-weight="700">B</text>
      <text x="28" y="67" fill="#374151">normal.z</text>

      <rect x="0" y="78" width="20" height="22" fill="#525252"/>
      <text x="10" y="93" text-anchor="middle" fill="#ffffff" font-weight="700">A</text>
      <text x="28" y="93" fill="#374151">metallic</text>
    </g>
  </g>

  <!-- Column 3: Depth -->
  <g transform="translate(520, 60)">
    <text x="110" y="0" text-anchor="middle" font-weight="700" fill="#111827">depth</text>
    <text x="110" y="16" text-anchor="middle" font-family="ui-monospace, Consolas, monospace" font-size="11" fill="#6b7280">depth32float</text>

    <!-- Thumbnail (depth gradient) -->
    <rect x="40" y="28" width="140" height="80" fill="url(#depthGrad)" stroke="#374151" stroke-width="1.2"/>

    <g transform="translate(0, 124)" font-size="11">
      <rect x="0" y="0" width="20" height="22" fill="#7c3aed"/>
      <text x="10" y="15" text-anchor="middle" fill="#ffffff" font-weight="700">D</text>
      <text x="28" y="15" fill="#374151">depth (z/w)</text>

      <text x="0" y="60" font-style="italic" fill="#6b7280">single 32-bit channel,</text>
      <text x="0" y="76" font-style="italic" fill="#6b7280">used for depth test</text>
      <text x="0" y="92" font-style="italic" fill="#6b7280">and reconstruction</text>
    </g>
  </g>

  <!-- Bottom note -->
  <g transform="translate(40, 290)">
    <rect width="680" height="68" fill="#f3f4f6" stroke="#9ca3af" stroke-width="1.2" rx="4"/>
    <text x="340" y="22" text-anchor="middle" font-weight="600" fill="#111827">All three share width × height (canvas resolution).</text>
    <text x="20" y="42" font-size="12" fill="#374151">Geometry pass writes all three; lighting pass reads them as <tspan font-family="ui-monospace, Consolas, monospace">texture_2d&lt;f32&gt;</tspan> + the depth view.</text>
    <text x="20" y="60" font-size="12" fill="#374151">Total: 4 + 8 + 4 = <tspan font-weight="600">16 bytes/pixel</tspan> (vs 32+ in a "fat" GBuffer that stores world position explicitly).</text>
  </g>
</svg>
