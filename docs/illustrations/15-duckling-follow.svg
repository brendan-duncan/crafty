<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 920 460" font-family="system-ui, -apple-system, sans-serif" font-size="13">
  <rect width="920" height="460" fill="#ffffff"/>
  <text x="460" y="26" text-anchor="middle" font-size="16" font-weight="600" fill="#111827">Duckling Follow: Each Duckling Has Its Own Polar Offset from the Parent</text>

  <defs>
    <marker id="dlArr" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="9" markerHeight="9" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#a16207"/>
    </marker>
    <marker id="dlAng" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="9" markerHeight="9" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#7c3aed"/>
    </marker>
  </defs>

  <!-- ===== LEFT: top-down brood ===== -->
  <g transform="translate(40, 60)">
    <text x="220" y="0" text-anchor="middle" font-weight="700" fill="#111827">Brood walking together (top-down)</text>

    <rect x="0" y="14" width="440" height="320" fill="#f0fdf4" stroke="#9ca3af" stroke-width="1" rx="6"/>

    <!-- Parent duck at center group (220, 180) -->
    <g transform="translate(220, 180)">
      <ellipse cx="0" cy="0" rx="20" ry="14" fill="#fde68a" stroke="#a16207" stroke-width="1.6"/>
      <circle cx="14" cy="-3" r="8" fill="#fde68a" stroke="#a16207" stroke-width="1.4"/>
      <text x="0" y="34" text-anchor="middle" font-size="11" font-weight="700" fill="#7c2d12">parent duck</text>
    </g>

    <!-- Reference circle for follow distances (avg) -->
    <circle cx="220" cy="180" r="55" fill="none" stroke="#16a34a" stroke-width="0.8" stroke-dasharray="3,3" opacity="0.6"/>

    <!-- 4 ducklings at varying angles and distances -->
    <!-- Offsets: angle (degrees), dist (px). Ducklings approximately at 30°, 110°, 200°, 300° with dist 50/65/55/70 -->

    <!-- Duckling 1 (NE, offset_angle=−30°, dist=50) -->
    <g transform="translate(263, 155)">
      <ellipse cx="0" cy="0" rx="9" ry="6" fill="#fef3c7" stroke="#a16207" stroke-width="1.2"/>
      <circle cx="6" cy="-2" r="3.5" fill="#fef3c7" stroke="#a16207" stroke-width="1.0"/>
    </g>

    <!-- Duckling 2 (south-east, +60°, dist=70) -->
    <g transform="translate(255, 240)">
      <ellipse cx="0" cy="0" rx="9" ry="6" fill="#fef3c7" stroke="#a16207" stroke-width="1.2"/>
      <circle cx="6" cy="-2" r="3.5" fill="#fef3c7" stroke="#a16207" stroke-width="1.0"/>
    </g>

    <!-- Duckling 3 (south-west, ~200°, dist=60) -->
    <g transform="translate(165, 220)">
      <ellipse cx="0" cy="0" rx="9" ry="6" fill="#fef3c7" stroke="#a16207" stroke-width="1.2"/>
      <circle cx="-6" cy="-2" r="3.5" fill="#fef3c7" stroke="#a16207" stroke-width="1.0"/>
    </g>

    <!-- Duckling 4 (north-west, ~150°, dist=55) — highlighted -->
    <g transform="translate(170, 145)">
      <ellipse cx="0" cy="0" rx="9" ry="6" fill="#fde68a" stroke="#dc2626" stroke-width="1.6"/>
      <circle cx="-6" cy="-2" r="3.5" fill="#fde68a" stroke="#dc2626" stroke-width="1.4"/>
    </g>

    <!-- For Duckling 4: show angle arc and distance line -->
    <line x1="220" y1="180" x2="170" y2="145" stroke="#7c3aed" stroke-width="1.4" stroke-dasharray="3,2"/>
    <text x="190" y="156" font-size="10" font-weight="700" fill="#7c3aed">followDist</text>

    <!-- Angle arc (from +X axis sweeping to the duckling vector) -->
    <path d="M 244 180 A 24 24 0 0 0 226 162" fill="none" stroke="#7c3aed" stroke-width="1.4"/>
    <text x="250" y="200" font-size="10" font-weight="700" fill="#7c3aed">offsetAngle</text>

    <!-- Reference +X axis -->
    <line x1="220" y1="180" x2="290" y2="180" stroke="#9ca3af" stroke-width="0.8" stroke-dasharray="2,3"/>

    <!-- Steering arrow on duckling 4 (toward parent's offset target) -->
    <line x1="170" y1="145" x2="184" y2="158" stroke="#a16207" stroke-width="1.6" marker-end="url(#dlArr)"/>

    <!-- Caption -->
    <text x="220" y="306" text-anchor="middle" font-size="11" font-style="italic" fill="#6b7280">offsetAngle drifts at 0.25 rad/s — the brood gently swirls around the parent</text>
  </g>

  <!-- ===== RIGHT: per-duckling code ===== -->
  <g transform="translate(500, 60)">
    <text x="200" y="0" text-anchor="middle" font-weight="700" fill="#111827">Per-frame steering</text>

    <rect x="0" y="14" width="400" height="320" fill="#f9fafb" stroke="#9ca3af" stroke-width="1" rx="6"/>

    <g font-family="ui-monospace, Consolas, monospace" font-size="12" fill="#374151" transform="translate(14, 0)">
      <text x="0" y="38" font-weight="700" fill="#111827">// at construction (per-duckling)</text>
      <text x="0" y="56">offsetAngle = random(0, 2π)</text>
      <text x="0" y="74">followDist  = 0.55 + random(0, 0.5)</text>

      <text x="0" y="106" font-weight="700" fill="#111827">// every frame</text>
      <text x="0" y="124">offsetAngle += dt * 0.25         <tspan fill="#7c3aed">// swirl</tspan></text>
      <text x="0" y="142">tx = parent.x + cos(offsetAngle) * followDist</text>
      <text x="0" y="160">tz = parent.z + sin(offsetAngle) * followDist</text>

      <text x="0" y="194" font-weight="700" fill="#111827">// speed scales with lag</text>
      <text x="0" y="212">dist = length(target − pos)</text>
      <text x="0" y="230">speed = (dist &gt; 2.5) ? 3.5 : 1.8</text>

      <text x="0" y="262" fill="#dc2626" font-style="italic">// no flee state — ducklings don't see the player.</text>
      <text x="0" y="278" fill="#dc2626" font-style="italic">// when the parent flees, ducklings catch up via</text>
      <text x="0" y="294" fill="#dc2626" font-style="italic">// the higher 3.5 m/s threshold.</text>
    </g>
  </g>
</svg>
