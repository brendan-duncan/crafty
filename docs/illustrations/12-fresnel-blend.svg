<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 360" font-family="system-ui, -apple-system, sans-serif" font-size="13">
  <rect width="800" height="360" fill="#ffffff"/>
  <text x="400" y="28" text-anchor="middle" font-size="16" font-weight="600" fill="#111827">Fresnel Blend: Reflection vs Refraction</text>

  <!-- ===== LEFT: Side View Diagram ===== -->
  <g transform="translate(30, 55)">
    <text x="170" y="0" text-anchor="middle" font-weight="700" fill="#0369a1">Viewing Angle Effect</text>
    
    <g transform="translate(0, 20)">
      <rect x="0" y="0" width="340" height="160" fill="#eff6ff" stroke="#3b82f6" stroke-width="1.4" rx="4"/>
      
      <!-- Water surface -->
      <line x1="20" y1="90" x2="320" y2="90" stroke="#3b82f6" stroke-width="2.5"/>
      <text x="20" y="82" font-size="9" font-weight="600" fill="#1d4ed8">water surface</text>
      
      <!-- Camera -->
      <circle cx="170" cy="25" r="10" fill="#f59e0b" stroke="#d97706" stroke-width="1.5"/>
      <text x="170" y="15" text-anchor="middle" font-size="9" fill="#92400e">camera</text>
      
      <!-- Ray 1: Looking STRAIGHT DOWN (high V·N, low fresnel) -->
      <g stroke="#16a34a" stroke-width="1.8">
        <line x1="170" y1="35" x2="170" y2="90"/>
        <circle cx="170" cy="90" r="3.5" fill="#16a34a"/>
        
        <!-- Refraction continues down -->
        <line x1="170" y1="90" x2="170" y2="145" stroke-dasharray="4,2"/>
      </g>
      
      <!-- Ray 1 label -->
      <text x="170" y="60" text-anchor="middle" font-size="8.5" fill="#166534">V·N ≈ 1.0</text>
      <text x="170" y="72" text-anchor="middle" font-size="8.5" fill="#065f46">fresnel ≈ 0.02</text>
      <text x="170" y="158" text-anchor="middle" font-size="8.5" font-weight="600" fill="#16a34a">→ Mostly Refraction</text>
      
      <!-- Ray 2: Looking at GRAZING ANGLE (low V·N, high fresnel) -->
      <g stroke="#dc2626" stroke-width="1.8">
        <line x1="170" y1="35" x2="290" y2="90"/>
        <circle cx="290" cy="90" r="3.5" fill="#dc2626"/>
        
        <!-- Reflection bounces up -->
        <line x1="290" y1="90" x2="310" y2="50" stroke-dasharray="4,2"/>
      </g>
      
      <!-- Ray 2 label -->
      <text x="275" y="65" text-anchor="middle" font-size="8.5" fill="#991b1b">V·N ≈ 0.2</text>
      <text x="275" y="77" text-anchor="middle" font-size="8.5" fill="#b91c1c">fresnel ≈ 0.6</text>
      <text x="285" y="118" text-anchor="middle" font-size="8.5" font-weight="600" fill="#dc2626">→ Mostly Reflection</text>
      
      <!-- View direction arrows explanation -->
      <g transform="translate(40, 115)">
        <text x="0" y="0" font-size="9" fill="#374151">
          <tspan font-weight="600">V·N</tspan> = dot(view_dir, normal)
        </text>
        <text x="0" y="14" font-size="9" fill="#374151">
          <tspan font-weight="600">High V·N</tspan> = looking straight down
        </text>
        <text x="0" y="28" font-size="9" fill="#374151">
          <tspan font-weight="600">Low V·N</tspan> = grazing angle
        </text>
      </g>
    </g>
  </g>

  <!-- Divider -->
  <line x1="400" y1="55" x2="400" y2="325" stroke="#d1d5db" stroke-width="1" stroke-dasharray="4,3"/>

  <!-- ===== RIGHT: Schlick Fresnel Formula ===== -->
  <g transform="translate(440, 55)">
    <text x="170" y="0" text-anchor="middle" font-weight="700" fill="#7c3aed">Schlick Fresnel for Water</text>
    
    <!-- Formula box -->
    <g transform="translate(0, 20)">
      <rect x="0" y="0" width="320" height="105" fill="#faf5ff" stroke="#a78bfa" stroke-width="1.4" rx="4"/>
      <text x="12" y="16" font-weight="600" fill="#6b21a8" font-size="11">Water F₀ ≈ 0.02</text>
      <text x="12" y="34" font-size="10" font-family="ui-monospace, Consolas, monospace" fill="#7c3aed">
        fresnel_r = F₀ + (1 - F₀) * pow(1 - V·N, 5)
      </text>
      <text x="12" y="52" font-size="9" fill="#6b21a8">
        Water has low F₀ = 0.02 — mostly refractive head-on
      </text>
      <text x="12" y="68" font-size="9" font-family="ui-monospace, Consolas, monospace" fill="#7c3aed">
        fresnel_r = min(0.02 + 0.98 * pow(1-VdotN, 5.0), 0.6)
      </text>
      <text x="12" y="84" font-size="9" fill="#6b21a8">
        Capped at 0.6 to prevent HDR sky from over-saturating
      </text>
      <text x="12" y="98" font-size="9" fill="#6b21a8">
        at shallow grazing angles
      </text>
    </g>
    
    <!-- Blend formula -->
    <g transform="translate(0, 135)">
      <rect x="0" y="0" width="320" height="55" fill="#fffbeb" stroke="#f59e0b" stroke-width="1.2" rx="4"/>
      <text x="12" y="16" font-weight="600" fill="#92400e" font-size="11">Final Blend</text>
      <text x="12" y="34" font-size="9.5" font-family="ui-monospace, Consolas, monospace" fill="#b45309">
        world_color = mix(tinted, reflection, fresnel_r)
      </text>
      <text x="12" y="48" font-size="9" fill="#92400e">
        When fresnel_r is LOW → use tinted (refraction)
      </text>
    </g>
    
    <!-- Visual bars showing contribution -->
    <g transform="translate(0, 200)">
      <rect x="0" y="0" width="320" height="38" fill="#f0fdf4" stroke="#10b981" stroke-width="1.2" rx="4"/>
      
      <!-- High V·N (looking down) -->
      <text x="12" y="14" font-size="9.5" fill="#065f46">
        <tspan font-weight="600">Looking down (V·N ≈ 1.0):</tspan> fresnel ≈ 0.02
      </text>
      <!-- Visual bars -->
      <g transform="translate(12, 20)">
        <rect x="0" y="0" width="147" height="8" fill="#16a34a" fill-opacity="0.6" rx="2"/>
        <rect x="150" y="0" width="3" height="8" fill="#166534" rx="1"/>
        <rect x="153" y="0" width="7" height="8" fill="#dc2626" fill-opacity="0.6" rx="2"/>
        <text x="75" y="7" text-anchor="middle" font-size="7" fill="#065f46">refraction 98%</text>
        <text x="180" y="7" text-anchor="middle" font-size="7" fill="#991b1b">reflection 2%</text>
      </g>
    </g>
    
    <g transform="translate(0, 245)">
      <rect x="0" y="0" width="320" height="38" fill="#fef2f2" stroke="#f87171" stroke-width="1.2" rx="4"/>
      
      <!-- Low V·N (grazing) -->
      <text x="12" y="14" font-size="9.5" fill="#991b1b">
        <tspan font-weight="600">Grazing (V·N ≈ 0.2):</tspan> fresnel ≈ 0.6
      </text>
      <!-- Visual bars -->
      <g transform="translate(12, 20)">
        <rect x="0" y="0" width="64" height="8" fill="#16a34a" fill-opacity="0.6" rx="2"/>
        <rect x="67" y="0" width="3" height="8" fill="#166534" rx="1"/>
        <rect x="70" y="0" width="96" height="8" fill="#dc2626" fill-opacity="0.6" rx="2"/>
        <text x="32" y="7" text-anchor="middle" font-size="7" fill="#065f46">refraction 40%</text>
        <text x="150" y="7" text-anchor="middle" font-size="7" fill="#991b1b">reflection 60%</text>
      </g>
    </g>
  </g>
</svg>
