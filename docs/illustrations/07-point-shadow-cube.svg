<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 460" font-family="system-ui, -apple-system, sans-serif" font-size="13">
  <rect width="880" height="460" fill="#ffffff"/>
  <text x="440" y="26" text-anchor="middle" font-size="16" font-weight="600" fill="#111827">Point Light Shadows: One Light → 6 Cube Faces</text>

  <defs>
    <marker id="psArr" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="9" markerHeight="9" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#dc2626"/>
    </marker>
  </defs>

  <!-- ===== LEFT: light + scene concept ===== -->
  <g transform="translate(40, 70)">
    <text x="180" y="0" text-anchor="middle" font-weight="700" fill="#111827">Point light surrounded by scene</text>

    <!-- Frame -->
    <rect x="20" y="24" width="320" height="280" fill="#1e293b" stroke="#374151" stroke-width="1.4"/>

    <!-- Light source at center -->
    <circle cx="180" cy="164" r="14" fill="#fef3c7" stroke="#dc2626" stroke-width="2"/>
    <text x="180" y="148" text-anchor="middle" font-size="11" font-weight="700" fill="#fef3c7">light</text>

    <!-- A few obstacles around the light -->
    <rect x="64"  y="200" width="44" height="44" fill="#475569" stroke="#94a3b8" stroke-width="1"/>
    <rect x="240" y="80"  width="36" height="36" fill="#475569" stroke="#94a3b8" stroke-width="1"/>
    <circle cx="78"  cy="80"  r="20" fill="#475569" stroke="#94a3b8" stroke-width="1"/>
    <polygon points="280,240 320,240 300,200" fill="#475569" stroke="#94a3b8" stroke-width="1"/>

    <!-- Six rays going out in cardinal directions, color-coded -->
    <g stroke="#fbbf24" stroke-width="1.2" stroke-dasharray="3,2" opacity="0.8">
      <line x1="180" y1="164" x2="180" y2="40"/>
      <line x1="180" y1="164" x2="180" y2="288"/>
      <line x1="180" y1="164" x2="40"  y2="164"/>
      <line x1="180" y1="164" x2="320" y2="164"/>
      <line x1="180" y1="164" x2="80"  y2="60"/>
      <line x1="180" y1="164" x2="280" y2="270"/>
    </g>

    <!-- Sub-caption -->
    <text x="180" y="324" text-anchor="middle" font-size="11" font-style="italic" fill="#6b7280">light needs to know depth in every direction</text>
  </g>

  <!-- ===== RIGHT: 6 cube face thumbnails ===== -->
  <g transform="translate(440, 70)">
    <text x="200" y="0" text-anchor="middle" font-weight="700" fill="#dc2626">Render scene 6 times — one per face</text>

    <!-- 2 rows × 3 cols of 110×80 thumbnails, gap 16. Total: 3*110 + 2*16 = 362, 2*80 + 16 = 176 -->
    <!-- Position: x=14 to 376, y=24 to 200 -->

    <!-- Each thumbnail: dark background = depth visualization, with simulated obstacle shapes -->
    <!-- Face label outside the thumbnail (above) to avoid overlap -->

    <g font-size="11" text-anchor="middle">
      <!-- Row 1 -->

      <!-- +X -->
      <text x="69" y="22" font-weight="700" fill="#dc2626">+X</text>
      <rect x="14" y="28" width="110" height="80" fill="#0f172a" stroke="#374151" stroke-width="1.2"/>
      <rect x="40" y="62" width="22" height="20" fill="#475569"/>

      <!-- -X -->
      <text x="195" y="22" font-weight="700" fill="#dc2626">−X</text>
      <rect x="140" y="28" width="110" height="80" fill="#0f172a" stroke="#374151" stroke-width="1.2"/>
      <circle cx="178" cy="68" r="14" fill="#475569"/>

      <!-- +Y -->
      <text x="321" y="22" font-weight="700" fill="#dc2626">+Y</text>
      <rect x="266" y="28" width="110" height="80" fill="#0f172a" stroke="#374151" stroke-width="1.2"/>
      <polygon points="294,90 348,90 322,60" fill="#475569"/>

      <!-- Row 2 -->

      <!-- -Y -->
      <text x="69" y="138" font-weight="700" fill="#dc2626">−Y</text>
      <rect x="14" y="144" width="110" height="80" fill="#0f172a" stroke="#374151" stroke-width="1.2"/>
      <rect x="34" y="170" width="80" height="44" fill="#475569"/>

      <!-- +Z -->
      <text x="195" y="138" font-weight="700" fill="#dc2626">+Z</text>
      <rect x="140" y="144" width="110" height="80" fill="#0f172a" stroke="#374151" stroke-width="1.2"/>
      <rect x="166" y="178" width="22" height="22" fill="#475569"/>
      <circle cx="218" cy="180" r="10" fill="#475569"/>

      <!-- -Z -->
      <text x="321" y="138" font-weight="700" fill="#dc2626">−Z</text>
      <rect x="266" y="144" width="110" height="80" fill="#0f172a" stroke="#374151" stroke-width="1.2"/>
      <rect x="296" y="170" width="20" height="36" fill="#475569"/>
    </g>

    <text x="200" y="248" text-anchor="middle" font-size="11" font-style="italic" fill="#6b7280">each face is a depth render with 90° FOV</text>
  </g>

  <!-- ===== BOTTOM: WGSL sampling ===== -->
  <g transform="translate(40, 358)">
    <rect width="800" height="84" fill="#f9fafb" stroke="#9ca3af" stroke-width="1" rx="6"/>
    <text x="14" y="22" font-weight="700" fill="#111827">Sampling at lighting time</text>

    <g font-family="ui-monospace, Consolas, monospace" font-size="12" fill="#374151" transform="translate(14, 0)">
      <text x="0" y="46">let shadowDir = surfacePos − light.position;     // direction from light to fragment</text>
      <text x="0" y="64">let depth = textureSample(shadowCube, samp, shadowDir).r;</text>
    </g>

    <text x="780" y="46" text-anchor="end" font-size="11" font-style="italic" fill="#6b7280">cube map sampler picks the right face</text>
    <text x="780" y="62" text-anchor="end" font-size="11" font-style="italic" fill="#6b7280">automatically from the 3D direction</text>
  </g>
</svg>
