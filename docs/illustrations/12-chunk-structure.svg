<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 480" font-family="system-ui, -apple-system, sans-serif" font-size="13">
  <rect width="760" height="480" fill="#ffffff"/>
  <text x="380" y="26" text-anchor="middle" font-size="16" font-weight="600" fill="#111827">Chunk: 16 × 256 × 16 Blocks</text>

  <defs>
    <marker id="cArr" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#374151"/>
    </marker>
    <linearGradient id="cFront" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"  stop-color="#bfdbfe"/>
      <stop offset="50%" stop-color="#92400e"/>
      <stop offset="100%" stop-color="#451a03"/>
    </linearGradient>
    <linearGradient id="cTop" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#a7f3d0"/>
      <stop offset="100%" stop-color="#16a34a"/>
    </linearGradient>
    <linearGradient id="cRight" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"  stop-color="#dbeafe"/>
      <stop offset="50%" stop-color="#a16207"/>
      <stop offset="100%" stop-color="#3f1d05"/>
    </linearGradient>
  </defs>

  <!-- ===== LEFT: chunk box (isometric) ===== -->
  <!-- Front face: 100 wide × 320 tall, top-left at (200, 80) -->
  <!-- Top face skews back-right: depth offset (40, -32) -->
  <!-- Right face skews back-right -->

  <g>
    <!-- Top face (perspective parallelogram, sky to grass colored) -->
    <polygon points="200,80 300,80 340,48 240,48" fill="url(#cTop)" stroke="#374151" stroke-width="1.4"/>
    <!-- Front face (sky → dirt/stone gradient) -->
    <polygon points="200,80 300,80 300,400 200,400" fill="url(#cFront)" stroke="#374151" stroke-width="1.4"/>
    <!-- Right face (perspective) -->
    <polygon points="300,80 340,48 340,368 300,400" fill="url(#cRight)" stroke="#374151" stroke-width="1.4"/>
  </g>

  <!-- Y axis dimension: vertical bar to the LEFT of front face -->
  <g transform="translate(170, 80)">
    <line x1="0" y1="0" x2="0" y2="320" stroke="#374151" stroke-width="1.4"/>
    <line x1="-6" y1="0"   x2="6" y2="0"   stroke="#374151" stroke-width="1.4"/>
    <line x1="-6" y1="320" x2="6" y2="320" stroke="#374151" stroke-width="1.4"/>
    <text x="-12" y="166" text-anchor="end" font-weight="700" fill="#16a34a">Y = 256</text>
    <text x="-12" y="182" text-anchor="end" font-size="11" font-style="italic" fill="#16a34a">(world height)</text>
  </g>

  <!-- X axis dimension: horizontal bar BELOW front face -->
  <g transform="translate(200, 422)">
    <line x1="0"   y1="0"  x2="100" y2="0"  stroke="#374151" stroke-width="1.4"/>
    <line x1="0"   y1="-6" x2="0"   y2="6"  stroke="#374151" stroke-width="1.4"/>
    <line x1="100" y1="-6" x2="100" y2="6"  stroke="#374151" stroke-width="1.4"/>
    <text x="50" y="22" text-anchor="middle" font-weight="700" fill="#1e40af">X = 16</text>
  </g>

  <!-- Z axis dimension: along the top-back edge — kept clear of the title at y=14-30 -->
  <g>
    <!-- Diagonal indicator parallel to the right-top edge of the top face -->
    <line x1="300" y1="76" x2="340" y2="44" stroke="#374151" stroke-width="1.4"/>
    <line x1="296" y1="72" x2="304" y2="80" stroke="#374151" stroke-width="1.4"/>
    <line x1="336" y1="40" x2="344" y2="48" stroke="#374151" stroke-width="1.4"/>
    <text x="350" y="52" font-weight="700" fill="#9d174d">Z = 16</text>
  </g>

  <!-- ===== RIGHT: stats and storage ===== -->
  <g transform="translate(440, 80)">
    <rect width="280" height="120" fill="#f3f4f6" stroke="#9ca3af" stroke-width="1" rx="6"/>
    <text x="14" y="22" font-weight="700" fill="#111827">Per chunk</text>

    <g font-family="ui-monospace, Consolas, monospace" font-size="13" transform="translate(14, 0)">
      <text x="0" y="48" fill="#374151">blocks    = 16 × 256 × 16</text>
      <text x="0" y="66" fill="#374151">          = <tspan font-weight="700" fill="#111827">65,536 blocks</tspan></text>

      <text x="0" y="92" fill="#374151">storage   = 1 byte each</text>
      <text x="0" y="110" fill="#374151">          = <tspan font-weight="700" fill="#111827">64 KiB Uint8Array</tspan></text>
    </g>
  </g>

  <!-- Indexing formula box -->
  <g transform="translate(440, 224)">
    <rect width="280" height="92" fill="#f3f4f6" stroke="#9ca3af" stroke-width="1" rx="6"/>
    <text x="14" y="22" font-weight="700" fill="#111827">Block index</text>

    <g font-family="ui-monospace, Consolas, monospace" font-size="12" transform="translate(14, 0)">
      <text x="0" y="46" fill="#374151">i = (y · 16 + z) · 16 + x</text>
      <text x="0" y="66" fill="#6b7280" font-style="italic" font-size="11">column-major in y, then z, then x</text>
      <text x="0" y="82" fill="#6b7280" font-style="italic" font-size="11">— neighbours in y are adjacent in memory</text>
    </g>
  </g>

  <!-- Block-type note -->
  <g transform="translate(440, 340)">
    <rect width="280" height="74" fill="#fef3c7" stroke="#92400e" stroke-width="1" rx="6"/>
    <text x="14" y="22" font-weight="700" fill="#92400e">BlockType (small int)</text>
    <text x="14" y="42" font-size="11" font-family="ui-monospace, Consolas, monospace" fill="#92400e">0 = air · 1 = grass · 2 = dirt · …</text>
    <text x="14" y="60" font-size="11" font-style="italic" fill="#92400e">enum maps to material + atlas tile</text>
  </g>

  <!-- Bottom note -->
  <text x="380" y="456" text-anchor="middle" font-size="11" fill="#6b7280" font-style="italic">A chunk is the unit of generation, meshing, persistence, and culling.</text>
</svg>
