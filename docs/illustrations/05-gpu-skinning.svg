<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 920 480" font-family="system-ui, -apple-system, sans-serif" font-size="13">
  <rect width="920" height="480" fill="#ffffff"/>
  <text x="460" y="26" text-anchor="middle" font-size="16" font-weight="600" fill="#111827">GPU Skinning: Each Vertex Blends Up to 4 Joint Matrices</text>

  <defs>
    <marker id="skArr" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="9" markerHeight="9" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#374151"/>
    </marker>
  </defs>

  <!-- ===== TOP: vertex with joint indices and weights ===== -->
  <g transform="translate(40, 60)">
    <text x="14" y="0" font-weight="700" fill="#111827">Vertex attributes (per vertex)</text>

    <!-- Position attribute (existing) -->
    <g transform="translate(0, 16)">
      <rect width="200" height="60" fill="#dbeafe" stroke="#1e40af" stroke-width="1.4" rx="4"/>
      <text x="14" y="20" font-weight="700" fill="#1e40af" font-size="12">@location(0..3)</text>
      <text x="14" y="38" font-size="11" fill="#1e40af">position, normal,</text>
      <text x="14" y="52" font-size="11" fill="#1e40af">uv, tangent</text>
    </g>

    <!-- Joint indices -->
    <g transform="translate(220, 16)">
      <rect width="200" height="60" fill="#fef3c7" stroke="#92400e" stroke-width="1.4" rx="4"/>
      <text x="14" y="20" font-weight="700" fill="#92400e" font-size="12">@location(4)  joints</text>
      <text x="14" y="40" font-size="11" font-family="ui-monospace, Consolas, monospace" fill="#92400e">vec4&lt;u32&gt;</text>
      <text x="14" y="54" font-size="11" font-family="ui-monospace, Consolas, monospace" fill="#92400e">[ J0, J1, J2, J3 ]</text>
    </g>

    <!-- Joint weights -->
    <g transform="translate(440, 16)">
      <rect width="200" height="60" fill="#fce7f3" stroke="#9d174d" stroke-width="1.4" rx="4"/>
      <text x="14" y="20" font-weight="700" fill="#9d174d" font-size="12">@location(5)  weights</text>
      <text x="14" y="40" font-size="11" font-family="ui-monospace, Consolas, monospace" fill="#9d174d">vec4&lt;f32&gt;</text>
      <text x="14" y="54" font-size="11" font-family="ui-monospace, Consolas, monospace" fill="#9d174d">[ w0, w1, w2, w3 ]  (Σ = 1)</text>
    </g>

    <!-- Annotation -->
    <text x="660" y="50" font-size="11" fill="#6b7280" font-style="italic">e.g. shoulder joint: J0 = 7, J1 = 12,</text>
    <text x="660" y="64" font-size="11" fill="#6b7280" font-style="italic">w0 = 0.7, w1 = 0.3</text>
  </g>

  <!-- ===== MIDDLE: storage buffer of joint matrices ===== -->
  <g transform="translate(40, 170)">
    <text x="14" y="0" font-weight="700" fill="#111827">Storage buffer: jointMatrices[N]</text>
    <text x="14" y="16" font-size="11" fill="#6b7280" font-style="italic" font-family="ui-monospace, Consolas, monospace">@group(3) @binding(0) var&lt;storage, read&gt; jointMatrices: array&lt;mat4x4&lt;f32&gt;&gt;;</text>

    <!-- Row of joint matrices, indexed -->
    <g transform="translate(0, 30)" font-family="ui-monospace, Consolas, monospace" font-size="11" text-anchor="middle">
      <!-- 8 matrix slots; the ones referenced by the example vertex highlighted -->

      <rect x="0"   y="0" width="80" height="50" fill="#f3f4f6" stroke="#374151"/>
      <text x="40" y="20" fill="#111827" font-weight="700">M[0]</text>
      <text x="40" y="38" fill="#6b7280" font-size="10">root</text>

      <rect x="84"  y="0" width="80" height="50" fill="#f3f4f6" stroke="#374151"/>
      <text x="124" y="20" fill="#111827" font-weight="700">M[1]</text>
      <text x="124" y="38" fill="#6b7280" font-size="10">spine</text>

      <rect x="168" y="0" width="80" height="50" fill="#f3f4f6" stroke="#374151"/>
      <text x="208" y="20" fill="#111827" font-weight="700">M[2]</text>

      <rect x="252" y="0" width="80" height="50" fill="#f3f4f6" stroke="#374151"/>
      <text x="292" y="20" fill="#111827" font-weight="700">…</text>

      <!-- Highlighted: M[7] (J0) -->
      <rect x="336" y="0" width="80" height="50" fill="#fef3c7" stroke="#92400e" stroke-width="1.8"/>
      <text x="376" y="20" fill="#92400e" font-weight="700">M[7]</text>
      <text x="376" y="38" fill="#92400e" font-size="10">shoulder</text>

      <rect x="420" y="0" width="80" height="50" fill="#f3f4f6" stroke="#374151"/>
      <text x="460" y="20" fill="#111827" font-weight="700">…</text>

      <!-- Highlighted: M[12] (J1) -->
      <rect x="504" y="0" width="80" height="50" fill="#fef3c7" stroke="#92400e" stroke-width="1.8"/>
      <text x="544" y="20" fill="#92400e" font-weight="700">M[12]</text>
      <text x="544" y="38" fill="#92400e" font-size="10">upper arm</text>

      <rect x="588" y="0" width="80" height="50" fill="#f3f4f6" stroke="#374151"/>
      <text x="628" y="20" fill="#111827" font-weight="700">…</text>

      <rect x="672" y="0" width="80" height="50" fill="#f3f4f6" stroke="#374151"/>
      <text x="712" y="20" fill="#111827" font-weight="700">M[N−1]</text>

      <text x="376" y="-6" fill="#92400e" font-size="10" font-style="italic">J0</text>
      <text x="544" y="-6" fill="#92400e" font-size="10" font-style="italic">J1</text>
    </g>
  </g>

  <!-- ===== BOTTOM: blend formula in vertex shader ===== -->
  <g transform="translate(40, 290)">
    <text x="14" y="0" font-weight="700" fill="#111827">Vertex shader: weighted blend</text>

    <!-- Big formula box -->
    <g transform="translate(0, 16)">
      <rect width="840" height="100" fill="#f9fafb" stroke="#9ca3af" stroke-width="1" rx="6"/>
      <g font-family="ui-monospace, Consolas, monospace" font-size="13" fill="#374151" transform="translate(14, 0)">
        <text x="0" y="26">var pos = vec3f(0);</text>
        <text x="0" y="46">for (var i = 0u; i &lt; 4u; i++) {</text>
        <text x="20" y="66">pos += (<tspan fill="#92400e">jointMatrices[joints[i]]</tspan> * vec4f(position, 1.0)).xyz * <tspan fill="#9d174d">weights[i]</tspan>;</text>
        <text x="0" y="86">}</text>
      </g>
    </g>
  </g>

  <!-- Visualization: rest pose vs deformed pose -->
  <g transform="translate(40, 432)">
    <text x="14" y="0" font-size="11" font-style="italic" fill="#6b7280">In effect: each vertex's final position is a weighted average of where each joint would place it.</text>
    <text x="14" y="16" font-size="11" font-style="italic" fill="#6b7280">Skeleton is computed CPU-side once per frame; the ~50–200 joint matrices upload via writeBuffer() into the storage buffer.</text>
  </g>
</svg>
