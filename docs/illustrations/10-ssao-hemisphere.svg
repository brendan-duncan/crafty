<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 400" font-family="system-ui, -apple-system, sans-serif" font-size="13">
  <rect width="760" height="400" fill="#ffffff"/>
  <text x="380" y="26" text-anchor="middle" font-size="16" font-weight="600" fill="#111827">SSAO: Sampling a Hemisphere Around the Surface</text>

  <defs>
    <marker id="ssOpen" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#16a34a"/>
    </marker>
    <marker id="ssNorm" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="9" markerHeight="9" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#16a34a"/>
    </marker>
    <marker id="ssOccl" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#dc2626"/>
    </marker>
  </defs>

  <!-- Title labels for the hemisphere region -->
  <text x="220" y="56" text-anchor="middle" font-size="12" fill="#1e40af" font-weight="600">hemisphere of samples around surface point</text>

  <!-- Hemisphere: top half-circle of radius 100, center at (220, 280) -->
  <path d="M 120,280 A 100,100 0 0 0 320,280 Z" fill="#dbeafe" stroke="#1e40af" stroke-width="1.4" opacity="0.55"/>

  <!-- Surface line (horizontal) at y=280 -->
  <line x1="40" y1="280" x2="460" y2="280" stroke="#374151" stroke-width="2.5"/>

  <!-- Hatch fill below the surface -->
  <g stroke="#9ca3af" stroke-width="0.8">
    <line x1="40"  y1="280" x2="60"  y2="320"/>
    <line x1="80"  y1="280" x2="100" y2="320"/>
    <line x1="120" y1="280" x2="140" y2="320"/>
    <line x1="160" y1="280" x2="180" y2="320"/>
    <line x1="200" y1="280" x2="220" y2="320"/>
    <line x1="240" y1="280" x2="260" y2="320"/>
    <line x1="280" y1="280" x2="300" y2="320"/>
    <line x1="320" y1="280" x2="340" y2="320"/>
    <line x1="360" y1="280" x2="380" y2="320"/>
    <line x1="400" y1="280" x2="420" y2="320"/>
    <line x1="440" y1="280" x2="460" y2="320"/>
  </g>
  <text x="50" y="332" font-size="11" font-style="italic" fill="#6b7280">surface</text>

  <!-- Occluder geometry above the surface, to the right -->
  <g>
    <polygon points="320,170 410,170 410,230 320,230" fill="#fde68a" stroke="#92400e" stroke-width="1.5"/>
    <text x="365" y="204" text-anchor="middle" font-size="12" fill="#92400e" font-weight="600">occluder</text>
  </g>

  <!-- Sample rays from origin (220, 280) going up into the hemisphere -->
  <!-- Five "open sky" rays (green) and three "occluded" rays (red, hitting the occluder) -->
  <g fill="none" stroke-width="1.5" stroke-dasharray="3,2">

    <!-- Open-sky rays (green) -->
    <line x1="220" y1="280" x2="155" y2="218" stroke="#16a34a" marker-end="url(#ssOpen)"/>
    <line x1="220" y1="280" x2="180" y2="190" stroke="#16a34a" marker-end="url(#ssOpen)"/>
    <line x1="220" y1="280" x2="240" y2="183" stroke="#16a34a" marker-end="url(#ssOpen)"/>
    <line x1="220" y1="280" x2="135" y2="248" stroke="#16a34a" marker-end="url(#ssOpen)"/>
    <line x1="220" y1="280" x2="200" y2="184" stroke="#16a34a" marker-end="url(#ssOpen)"/>

    <!-- Occluded rays (red) — terminate at the occluder face -->
    <line x1="220" y1="280" x2="320" y2="216" stroke="#dc2626" marker-end="url(#ssOccl)"/>
    <line x1="220" y1="280" x2="320" y2="200" stroke="#dc2626" marker-end="url(#ssOccl)"/>
    <line x1="220" y1="280" x2="305" y2="195" stroke="#dc2626" marker-end="url(#ssOccl)"/>
  </g>

  <!-- Surface normal (centered, pointing straight up) — drawn last so it sits on top of rays -->
  <line x1="220" y1="280" x2="220" y2="170" stroke="#16a34a" stroke-width="3" marker-end="url(#ssNorm)"/>
  <text x="232" y="172" font-size="14" fill="#16a34a" font-weight="700">n̂</text>

  <!-- Surface point P -->
  <circle cx="220" cy="280" r="5" fill="#dc2626"/>
  <text x="208" y="298" text-anchor="end" fill="#dc2626" font-weight="700">P</text>

  <!-- Color legend for ray status -->
  <g transform="translate(40, 80)" font-size="11">
    <line x1="0" y1="0" x2="22" y2="0" stroke="#16a34a" stroke-width="1.5" stroke-dasharray="3,2"/>
    <text x="28" y="4" fill="#374151">unoccluded sample (sky)</text>

    <line x1="0" y1="18" x2="22" y2="18" stroke="#dc2626" stroke-width="1.5" stroke-dasharray="3,2"/>
    <text x="28" y="22" fill="#374151">occluded sample (geometry)</text>
  </g>

  <!-- Right-side legend / explanation box -->
  <g transform="translate(500, 60)">
    <rect width="240" height="200" fill="#f9fafb" stroke="#9ca3af" stroke-width="1" rx="6"/>
    <text x="14" y="22" font-weight="700" fill="#111827">Per pixel</text>

    <text x="14" y="48" font-size="12" fill="#374151">1. Reconstruct P and n̂</text>
    <text x="14" y="64" font-size="12" fill="#374151">    from the G-buffer.</text>

    <text x="14" y="90" font-size="12" fill="#374151">2. For each of N samples</text>
    <text x="14" y="106" font-size="12" fill="#374151">    in the hemisphere:</text>
    <text x="14" y="124" font-size="11" fill="#374151">    – project to screen space</text>
    <text x="14" y="140" font-size="11" fill="#374151">    – read depth at that texel</text>
    <text x="14" y="156" font-size="11" fill="#374151">    – is geometry occluding?</text>

    <text x="14" y="184" font-family="ui-monospace, Consolas, monospace" font-size="11" fill="#374151">3. occlusion = 1 − occluded/N</text>
  </g>

  <!-- Bottom note -->
  <g transform="translate(40, 346)">
    <rect width="680" height="50" fill="#fef3c7" stroke="#92400e" stroke-width="1" rx="4"/>
    <text x="14" y="18" font-size="11" font-weight="600" fill="#92400e">Per-pixel rotation + bilateral blur</text>
    <text x="14" y="34" font-size="11" fill="#92400e">A noise texture rotates the kernel each pixel to hide banding; the noisy result is then</text>
    <text x="14" y="46" font-size="11" fill="#92400e">bilaterally blurred (depth-aware) to smooth without crossing edges.</text>
  </g>
</svg>
