<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 850 410" font-family="system-ui, -apple-system, sans-serif" font-size="13">
  <rect width="850" height="410" fill="#ffffff"/>
  <text x="425" y="28" text-anchor="middle" font-size="16" font-weight="600" fill="#111827">Village Generation: Site Selection and House Placement</text>

  <!-- ===== LEFT: Site Selection Pipeline ===== -->
  <g transform="translate(30, 55)">
    <text x="110" y="0" text-anchor="middle" font-weight="700" fill="#0369a1">Site Selection Pipeline</text>
    
    <g transform="translate(0, 20)">
      <!-- Step 1 -->
      <g>
        <rect x="0" y="0" width="220" height="36" fill="#fef3c7" stroke="#f59e0b" stroke-width="1.5" rx="4"/>
        <text x="12" y="15" font-weight="600" fill="#92400e" font-size="11">1. Chunk Load Event</text>
        <text x="12" y="28" font-size="9" fill="#b45309">Hook: world.onChunkAdded</text>
      </g>
      
      <g stroke="#9ca3af" stroke-width="1.2" fill="none" transform="translate(110, 42)">
        <line x1="0" y1="0" x2="0" y2="10"/>
        <path d="M 0 10 L -4 5 M 0 10 L 4 5"/>
      </g>
      
      <!-- Step 2 -->
      <g transform="translate(0, 57)">
        <rect x="0" y="0" width="220" height="30" fill="#e5e7eb" stroke="#6b7280" stroke-width="1.2" rx="4"/>
        <text x="12" y="13" font-weight="600" fill="#374151" font-size="11">2. Skip Check</text>
        <text x="12" y="24" font-size="9" fill="#6b7280">aliveBlocks == 0 or already processed? → skip</text>
      </g>
      
      <g stroke="#9ca3af" stroke-width="1.2" fill="none" transform="translate(110, 93)">
        <line x1="0" y1="0" x2="0" y2="10"/>
        <path d="M 0 10 L -4 5 M 0 10 L 4 5"/>
      </g>
      
      <!-- Step 3 -->
      <g transform="translate(0, 108)">
        <rect x="0" y="0" width="220" height="36" fill="#dcfce7" stroke="#16a34a" stroke-width="1.5" rx="4"/>
        <text x="12" y="14" font-weight="600" fill="#166534" font-size="11">3. Biome + Flatness</text>
        <text x="12" y="26" font-size="9" fill="#15803d">Biome must be GrassyPlains, height variance ≤ 1.5</text>
      </g>
      
      <g stroke="#9ca3af" stroke-width="1.2" fill="none" transform="translate(110, 150)">
        <line x1="0" y1="0" x2="0" y2="10"/>
        <path d="M 0 10 L -4 5 M 0 10 L 4 5"/>
      </g>
      
      <!-- Step 4 -->
      <g transform="translate(0, 165)">
        <rect x="0" y="0" width="220" height="30" fill="#fef2f2" stroke="#dc2626" stroke-width="1.2" rx="4"/>
        <text x="12" y="13" font-weight="600" fill="#991b1b" font-size="11">4. Water Check</text>
        <text x="12" y="24" font-size="9" fill="#b91c1c">No water under 9 sample points</text>
      </g>
      
      <g stroke="#9ca3af" stroke-width="1.2" fill="none" transform="translate(110, 201)">
        <line x1="0" y1="0" x2="0" y2="10"/>
        <path d="M 0 10 L -4 5 M 0 10 L 4 5"/>
      </g>
      
      <!-- Step 5 -->
      <g transform="translate(0, 216)">
        <rect x="0" y="0" width="220" height="30" fill="#f3e8ff" stroke="#9333ea" stroke-width="1.2" rx="4"/>
        <text x="12" y="13" font-weight="600" fill="#7c3aed" font-size="11">5. Probability: 25%</text>
        <text x="12" y="24" font-size="9" fill="#9333ea">VILLAGE_CHANCE = 0.25</text>
      </g>
    </g>
  </g>

  <!-- Divider -->
  <line x1="290" y1="55" x2="290" y2="345" stroke="#d1d5db" stroke-width="1" stroke-dasharray="4,3"/>

  <!-- ===== RIGHT: House Placement ===== -->
  <g transform="translate(330, 55)">
    <text x="250" y="0" text-anchor="middle" font-weight="700" fill="#0369a1">House Placement (2–4 houses per village)</text>
    
    <!-- Top-down view of houses around chunk center -->
    <g transform="translate(130, 25)">
      <!-- Chunk boundaries -->
      <rect x="0" y="0" width="240" height="240" fill="#fafafa" stroke="#9ca3af" stroke-width="1" stroke-dasharray="6,4"/>
      <text x="120" y="-8" text-anchor="middle" font-size="10" fill="#6b7280">16×16 chunk</text>
      
      <!-- Center point -->
      <circle cx="120" cy="120" r="6" fill="#f59e0b" stroke="#d97706" stroke-width="1.5"/>
      <text x="120" y="100" text-anchor="middle" font-size="10" fill="#92400e" font-weight="600">chunk center</text>
      
      <!-- Placement radius annulus -->
      <circle cx="120" cy="120" r="90" fill="none" stroke="#e5e7eb" stroke-width="16" stroke-opacity="0.4"/>
      <circle cx="120" cy="120" r="60" fill="#fefce8" fill-opacity="0.25"/>
      
      <!-- Houses placed around center -->
      <g>
        <!-- House 1: Top -->
        <rect x="102" y="25" width="36" height="25" fill="#a16207" fill-opacity="0.6" stroke="#854d0e" stroke-width="1.2" rx="2"/>
        <rect x="108" y="30" width="24" height="16" fill="#fcd34d" fill-opacity="0.35" stroke="#f59e0b" stroke-width="0.6"/>
        
        <!-- House 2: Bottom-right -->
        <rect x="185" y="165" width="36" height="25" fill="#a16207" fill-opacity="0.6" stroke="#854d0e" stroke-width="1.2" rx="2"/>
        <rect x="191" y="170" width="24" height="16" fill="#fcd34d" fill-opacity="0.35" stroke="#f59e0b" stroke-width="0.6"/>
        
        <!-- House 3: Bottom-left -->
        <rect x="45" y="185" width="36" height="25" fill="#a16207" fill-opacity="0.6" stroke="#854d0e" stroke-width="1.2" rx="2"/>
        <rect x="51" y="190" width="24" height="16" fill="#fcd34d" fill-opacity="0.35" stroke="#f59e0b" stroke-width="0.6"/>
      </g>
      
      <!-- Legend -->
      <g transform="translate(0, 270)">
        <rect x="0" y="0" width="14" height="14" fill="#a16207" fill-opacity="0.6" stroke="#854d0e" stroke-width="1.2"/>
        <text x="20" y="12" font-size="10" fill="#4b5563">house (7×5 footprint)</text>
        <rect x="120" y="0" width="14" height="14" fill="#fcd34d" fill-opacity="0.35" stroke="#f59e0b" stroke-width="0.6"/>
        <text x="140" y="12" font-size="10" fill="#4b5563">door/window</text>
        <circle cx="310" cy="7" r="5" fill="#f59e0b" stroke="#d97706" stroke-width="1"/>
        <text x="322" y="12" font-size="10" fill="#4b5563">center</text>
      </g>
    </g>
    
    <!-- Polar coordinate info box -->
    <g transform="translate(0, 290)">
      <rect width="500" height="45" fill="#f0fdf4" stroke="#16a34a" stroke-width="1" rx="4"/>
      <text x="12" y="18" font-weight="600" fill="#166534" font-size="11">Polar Coordinate Placement</text>
      <text x="12" y="32" font-size="10" fill="#15803d">angle = random(0, 2π), dist = 4 + random(6). Validates: no water under footprint, elevation within ±1.5 of village Y</text>
    </g>
  </g>

  <!-- ===== BOTTOM: House Template ===== -->
  <g transform="translate(30, 345)">
    <rect width="240" height="52" fill="#fffbeb" stroke="#f59e0b" stroke-width="1" rx="4"/>
    <text x="12" y="16" font-weight="600" fill="#92400e" font-size="11">House Template: 7×5×4</text>
    <text x="12" y="30" font-size="9" fill="#b45309">y=0: floor, y=1-2: walls+door+window</text>
    <text x="12" y="42" font-size="9" fill="#b45309">y=3: roof (SPRUCE_PLANKS, GLASS)</text>
  </g>
</svg>
