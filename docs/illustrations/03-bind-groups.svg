<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 920 460" font-family="system-ui, -apple-system, sans-serif" font-size="13">
  <rect width="920" height="460" fill="#ffffff"/>
  <text x="460" y="26" text-anchor="middle" font-size="16" font-weight="600" fill="#111827">Bind Groups: Connecting CPU Resources to Shader Bindings</text>

  <!-- Two columns: left = CPU side (TS code), right = WGSL shader side. Arrows in middle. -->

  <!-- Left header -->
  <text x="220" y="60" text-anchor="middle" font-weight="700" fill="#374151">CPU side (TypeScript)</text>
  <line x1="40" y1="68" x2="400" y2="68" stroke="#9ca3af" stroke-width="1"/>

  <!-- Right header -->
  <text x="700" y="60" text-anchor="middle" font-weight="700" fill="#374151">GPU side (WGSL shader)</text>
  <line x1="520" y1="68" x2="880" y2="68" stroke="#9ca3af" stroke-width="1"/>

  <!-- ====== Group 0: Camera ====== -->

  <!-- Group 0 box (left, CPU) -->
  <g transform="translate(40, 88)">
    <rect width="360" height="76" fill="#dbeafe" stroke="#1e40af" stroke-width="1.4" rx="6"/>
    <text x="14" y="22" font-weight="700" fill="#1e40af">Bind Group 0 — Camera</text>
    <text x="14" y="42" font-size="11" font-family="ui-monospace, Consolas, monospace" fill="#1e40af">setBindGroup(0, cameraBindGroup)</text>
    <g transform="translate(14, 50)" font-size="11" font-family="ui-monospace, Consolas, monospace">
      <rect x="0" y="0" width="320" height="20" fill="#ffffff" stroke="#1e40af"/>
      <text x="8" y="14" fill="#111827">binding 0  →  cameraBuffer  (uniform)</text>
    </g>
  </g>

  <!-- Group 0 box (right, shader) -->
  <g transform="translate(520, 88)">
    <rect width="360" height="76" fill="#dbeafe" stroke="#1e40af" stroke-width="1.4" rx="6"/>
    <text x="14" y="22" font-weight="700" fill="#1e40af" font-family="ui-monospace, Consolas, monospace">@group(0)</text>
    <g transform="translate(14, 32)" font-size="11" font-family="ui-monospace, Consolas, monospace">
      <text x="0" y="14" fill="#111827">@binding(0) var&lt;uniform&gt; camera</text>
      <text x="0" y="30" fill="#111827">  : CameraUniforms;</text>
    </g>
  </g>

  <!-- Arrow group 0 -->
  <g>
    <line x1="400" y1="126" x2="520" y2="126" stroke="#374151" stroke-width="1.6" marker-end="url(#bgArr)"/>
  </g>

  <!-- ====== Group 1: Model ====== -->

  <g transform="translate(40, 184)">
    <rect width="360" height="76" fill="#dcfce7" stroke="#166534" stroke-width="1.4" rx="6"/>
    <text x="14" y="22" font-weight="700" fill="#166534">Bind Group 1 — Model</text>
    <text x="14" y="42" font-size="11" font-family="ui-monospace, Consolas, monospace" fill="#166534">setBindGroup(1, modelBindGroup)</text>
    <g transform="translate(14, 50)" font-size="11" font-family="ui-monospace, Consolas, monospace">
      <rect x="0" y="0" width="320" height="20" fill="#ffffff" stroke="#166534"/>
      <text x="8" y="14" fill="#111827">binding 0  →  modelBuffer  (uniform)</text>
    </g>
  </g>

  <g transform="translate(520, 184)">
    <rect width="360" height="76" fill="#dcfce7" stroke="#166534" stroke-width="1.4" rx="6"/>
    <text x="14" y="22" font-weight="700" fill="#166534" font-family="ui-monospace, Consolas, monospace">@group(1)</text>
    <g transform="translate(14, 32)" font-size="11" font-family="ui-monospace, Consolas, monospace">
      <text x="0" y="14" fill="#111827">@binding(0) var&lt;uniform&gt; model</text>
      <text x="0" y="30" fill="#111827">  : ModelUniforms;</text>
    </g>
  </g>

  <line x1="400" y1="222" x2="520" y2="222" stroke="#374151" stroke-width="1.6" marker-end="url(#bgArr)"/>

  <!-- ====== Group 2: Material ====== -->

  <g transform="translate(40, 280)">
    <rect width="360" height="156" fill="#fce7f3" stroke="#9d174d" stroke-width="1.4" rx="6"/>
    <text x="14" y="22" font-weight="700" fill="#9d174d">Bind Group 2 — Material</text>
    <text x="14" y="42" font-size="11" font-family="ui-monospace, Consolas, monospace" fill="#9d174d">setBindGroup(2, materialBindGroup)</text>
    <g transform="translate(14, 50)" font-size="11" font-family="ui-monospace, Consolas, monospace">
      <rect x="0" y="0"  width="320" height="20" fill="#ffffff" stroke="#9d174d"/>
      <text x="8" y="14" fill="#111827">binding 0  →  materialBuffer  (uniform)</text>

      <rect x="0" y="22" width="320" height="20" fill="#ffffff" stroke="#9d174d"/>
      <text x="8" y="36" fill="#111827">binding 1  →  albedoTexture  (texture_2d)</text>

      <rect x="0" y="44" width="320" height="20" fill="#ffffff" stroke="#9d174d"/>
      <text x="8" y="58" fill="#111827">binding 2  →  normalTexture  (texture_2d)</text>

      <rect x="0" y="66" width="320" height="20" fill="#ffffff" stroke="#9d174d"/>
      <text x="8" y="80" fill="#111827">binding 3  →  merTexture     (texture_2d)</text>

      <rect x="0" y="88" width="320" height="20" fill="#ffffff" stroke="#9d174d"/>
      <text x="8" y="102" fill="#111827">binding 4  →  matSampler     (sampler)</text>
    </g>
  </g>

  <g transform="translate(520, 280)">
    <rect width="360" height="156" fill="#fce7f3" stroke="#9d174d" stroke-width="1.4" rx="6"/>
    <text x="14" y="22" font-weight="700" fill="#9d174d" font-family="ui-monospace, Consolas, monospace">@group(2)</text>
    <g transform="translate(14, 32)" font-size="11" font-family="ui-monospace, Consolas, monospace">
      <text x="0" y="14"  fill="#111827">@binding(0) var&lt;uniform&gt; material</text>
      <text x="0" y="30"  fill="#111827">  : MaterialUniforms;</text>
      <text x="0" y="50"  fill="#111827">@binding(1) var albedo_map: texture_2d&lt;f32&gt;;</text>
      <text x="0" y="70"  fill="#111827">@binding(2) var normal_map: texture_2d&lt;f32&gt;;</text>
      <text x="0" y="90"  fill="#111827">@binding(3) var mer_map   : texture_2d&lt;f32&gt;;</text>
      <text x="0" y="110" fill="#111827">@binding(4) var mat_samp  : sampler;</text>
    </g>
  </g>

  <!-- 5 arrows for material bindings -->
  <g stroke="#374151" stroke-width="1.4" fill="none">
    <line x1="400" y1="344" x2="520" y2="324" marker-end="url(#bgArr)"/>
    <line x1="400" y1="366" x2="520" y2="354" marker-end="url(#bgArr)"/>
    <line x1="400" y1="388" x2="520" y2="374" marker-end="url(#bgArr)"/>
    <line x1="400" y1="410" x2="520" y2="394" marker-end="url(#bgArr)"/>
    <line x1="400" y1="432" x2="520" y2="414" marker-end="url(#bgArr)"/>
  </g>

  <defs>
    <marker id="bgArr" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="9" markerHeight="9" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#374151"/>
    </marker>
  </defs>
</svg>
