<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 460" font-family="system-ui, -apple-system, sans-serif" font-size="13">
  <rect width="760" height="460" fill="#ffffff"/>
  <text x="380" y="26" text-anchor="middle" font-size="16" font-weight="600" fill="#111827">LOD Distance Bands (Top-Down View)</text>

  <!-- Player at center (260, 230). Three concentric rings of radius 80, 140, 200 -->

  <!-- Outer ring: Low LOD (4×4×4) -->
  <circle cx="260" cy="230" r="200" fill="#ede9fe" stroke="#5b21b6" stroke-width="1.5" opacity="0.5"/>

  <!-- Middle ring: Medium LOD (2×2×2) -->
  <circle cx="260" cy="230" r="140" fill="#dbeafe" stroke="#1e40af" stroke-width="1.5" opacity="0.7"/>

  <!-- Inner ring: Full LOD -->
  <circle cx="260" cy="230" r="80" fill="#dcfce7" stroke="#166534" stroke-width="1.5" opacity="0.85"/>

  <!-- Chunk grid: faint squares visible across all rings -->
  <g stroke="#9ca3af" stroke-width="0.5" opacity="0.45" fill="none">
    <!-- 13 × 13 grid centered on player, cell size 32. Spans (260 ± 6.5*32) = (52..468) X, (22..438) Y -->
    <!-- Just draw the grid lines -->
    <g>
      <line x1="60"  y1="30" x2="60"  y2="430"/>
      <line x1="92"  y1="30" x2="92"  y2="430"/>
      <line x1="124" y1="30" x2="124" y2="430"/>
      <line x1="156" y1="30" x2="156" y2="430"/>
      <line x1="188" y1="30" x2="188" y2="430"/>
      <line x1="220" y1="30" x2="220" y2="430"/>
      <line x1="252" y1="30" x2="252" y2="430"/>
      <line x1="284" y1="30" x2="284" y2="430"/>
      <line x1="316" y1="30" x2="316" y2="430"/>
      <line x1="348" y1="30" x2="348" y2="430"/>
      <line x1="380" y1="30" x2="380" y2="430"/>
      <line x1="412" y1="30" x2="412" y2="430"/>
      <line x1="444" y1="30" x2="444" y2="430"/>

      <line x1="60" y1="30"  x2="460" y2="30"/>
      <line x1="60" y1="62"  x2="460" y2="62"/>
      <line x1="60" y1="94"  x2="460" y2="94"/>
      <line x1="60" y1="126" x2="460" y2="126"/>
      <line x1="60" y1="158" x2="460" y2="158"/>
      <line x1="60" y1="190" x2="460" y2="190"/>
      <line x1="60" y1="222" x2="460" y2="222"/>
      <line x1="60" y1="254" x2="460" y2="254"/>
      <line x1="60" y1="286" x2="460" y2="286"/>
      <line x1="60" y1="318" x2="460" y2="318"/>
      <line x1="60" y1="350" x2="460" y2="350"/>
      <line x1="60" y1="382" x2="460" y2="382"/>
      <line x1="60" y1="414" x2="460" y2="414"/>
    </g>
  </g>

  <!-- Player marker -->
  <circle cx="260" cy="230" r="6" fill="#dc2626" stroke="#7f1d1d" stroke-width="1.5"/>
  <text x="270" y="252" font-size="11" font-weight="700" fill="#dc2626">player</text>

  <!-- Inline distance labels — pulled deeper into each band, away from the boundary lines -->
  <text x="260" y="190" text-anchor="middle" font-size="11" font-weight="700" fill="#166534">FULL (1:1)</text>
  <text x="260" y="124" text-anchor="middle" font-size="11" font-weight="700" fill="#1e40af">MEDIUM (2×2×2)</text>
  <text x="260" y="62"  text-anchor="middle" font-size="11" font-weight="700" fill="#5b21b6">LOW (4×4×4)</text>

  <!-- Right-side legend -->
  <g transform="translate(500, 80)">
    <rect width="240" height="220" fill="#f9fafb" stroke="#9ca3af" stroke-width="1" rx="6"/>
    <text x="14" y="22" font-weight="700" fill="#111827">LOD selection</text>

    <g transform="translate(14, 44)" font-size="12">
      <!-- Full LOD swatch -->
      <rect x="0" y="0" width="18" height="18" fill="#dcfce7" stroke="#166534" stroke-width="1.5"/>
      <text x="26" y="13" fill="#166534" font-weight="700">FULL</text>
      <text x="78" y="13" fill="#374151">all blocks rendered</text>

      <!-- Medium LOD -->
      <rect x="0" y="32" width="18" height="18" fill="#dbeafe" stroke="#1e40af" stroke-width="1.5"/>
      <text x="26" y="45" fill="#1e40af" font-weight="700">MED</text>
      <text x="78" y="45" fill="#374151">2×2×2 merged</text>

      <!-- Low LOD -->
      <rect x="0" y="64" width="18" height="18" fill="#ede9fe" stroke="#5b21b6" stroke-width="1.5"/>
      <text x="26" y="77" fill="#5b21b6" font-weight="700">LOW</text>
      <text x="78" y="77" fill="#374151">4×4×4 merged</text>
    </g>

    <g transform="translate(14, 154)" font-size="11" fill="#6b7280" font-style="italic">
      <text x="0" y="0">Transitions use slight mesh</text>
      <text x="0" y="14">overlap + alpha dithering</text>
      <text x="0" y="28">to hide pop-in.</text>
    </g>
  </g>

  <!-- Bottom note -->
  <text x="380" y="446" text-anchor="middle" font-size="11" fill="#6b7280" font-style="italic">Distant chunks merge blocks into larger units — fewer triangles where the eye can't perceive detail.</text>
</svg>
