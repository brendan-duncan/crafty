<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 920 480" font-family="system-ui, -apple-system, sans-serif" font-size="13">
  <rect width="920" height="480" fill="#ffffff"/>
  <text x="460" y="26" text-anchor="middle" font-size="16" font-weight="600" fill="#111827">Cascaded Shadow Maps: Frustum Split → Array Texture</text>

  <defs>
    <marker id="csmArr" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="9" markerHeight="9" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#374151"/>
    </marker>
  </defs>

  <!-- ===== TOP: View frustum split into 4 cascades (top-down) ===== -->
  <g transform="translate(40, 60)">
    <text x="420" y="0" text-anchor="middle" font-weight="700" fill="#111827">Camera view frustum, top-down — 4 cascades by distance</text>

    <!-- Camera origin -->
    <circle cx="20" cy="100" r="9" fill="#111827"/>
    <text x="20" y="124" text-anchor="middle" font-size="11" font-weight="700" fill="#111827">camera</text>

    <!-- Frustum: trapezoidal (cone) from camera spreading right.
         Cascade 0: x 30-130, half-height grows from ±10 to ±18.
         Cascade 1: x 130-260, ±18 to ±32
         Cascade 2: x 260-450, ±32 to ±52
         Cascade 3: x 450-820, ±52 to ±80
         Centered vertically at y=100. Tightened so largest cascade sits well
         below the title. -->

    <!-- Cascade 0 (red) -->
    <polygon points="30,90 130,82 130,118 30,110" fill="#fecaca" stroke="#dc2626" stroke-width="1.4"/>
    <text x="80" y="103" text-anchor="middle" font-size="11" font-weight="700" fill="#7f1d1d">C0</text>
    <text x="80" y="74" text-anchor="middle" font-size="10" fill="#7f1d1d">near</text>

    <!-- Cascade 1 (orange) -->
    <polygon points="130,82 260,68 260,132 130,118" fill="#fed7aa" stroke="#ea580c" stroke-width="1.4"/>
    <text x="195" y="103" text-anchor="middle" font-size="11" font-weight="700" fill="#7c2d12">C1</text>

    <!-- Cascade 2 (green) -->
    <polygon points="260,68 450,48 450,152 260,132" fill="#bbf7d0" stroke="#16a34a" stroke-width="1.4"/>
    <text x="355" y="103" text-anchor="middle" font-size="11" font-weight="700" fill="#14532d">C2</text>

    <!-- Cascade 3 (blue) -->
    <polygon points="450,48 820,20 820,180 450,152" fill="#bfdbfe" stroke="#2563eb" stroke-width="1.4"/>
    <text x="635" y="103" text-anchor="middle" font-size="11" font-weight="700" fill="#1e3a8a">C3</text>
    <text x="780" y="40" text-anchor="middle" font-size="10" fill="#1e3a8a">far</text>

    <!-- Distance ticks below -->
    <g font-family="ui-monospace, Consolas, monospace" font-size="10" fill="#374151">
      <line x1="30"  y1="220" x2="820" y2="220" stroke="#6b7280" stroke-width="0.8"/>
      <g stroke="#6b7280" stroke-width="0.8">
        <line x1="30"  y1="216" x2="30"  y2="224"/>
        <line x1="130" y1="216" x2="130" y2="224"/>
        <line x1="260" y1="216" x2="260" y2="224"/>
        <line x1="450" y1="216" x2="450" y2="224"/>
        <line x1="820" y1="216" x2="820" y2="224"/>
      </g>
      <text x="30"  y="238" text-anchor="middle">near</text>
      <text x="130" y="238" text-anchor="middle">~6 m</text>
      <text x="260" y="238" text-anchor="middle">~24 m</text>
      <text x="450" y="238" text-anchor="middle">~80 m</text>
      <text x="820" y="238" text-anchor="middle">far (~300 m)</text>
    </g>

    <!-- Sub-caption -->
    <text x="420" y="262" text-anchor="middle" font-size="11" font-style="italic" fill="#6b7280">practical-log split: split[i] = lerp(near*(far/near)^(i/N), near + (far−near)*i/N, λ ≈ 0.7)</text>
  </g>

  <!-- ===== BOTTOM-LEFT: each cascade gets its own light view-projection ===== -->
  <g transform="translate(40, 360)">
    <rect width="430" height="100" fill="#f9fafb" stroke="#9ca3af" stroke-width="1" rx="6"/>
    <text x="14" y="22" font-weight="700" fill="#111827">Each cascade has its own light view-projection</text>
    <text x="14" y="42" font-size="11" fill="#374151">Tightly fit around its slice of the camera frustum,</text>
    <text x="14" y="58" font-size="11" fill="#374151">so near texels are dense (sharp shadows nearby)</text>
    <text x="14" y="74" font-size="11" fill="#374151">and far texels are sparse (cheap shadows in the distance).</text>
    <text x="14" y="92" font-size="11" font-style="italic" fill="#6b7280">cascadeCount, splits, and 4× viewProj are uploaded each frame.</text>
  </g>

  <!-- ===== BOTTOM-RIGHT: 4-layer array texture ===== -->
  <g transform="translate(490, 360)">
    <rect width="390" height="100" fill="#f9fafb" stroke="#9ca3af" stroke-width="1" rx="6"/>
    <text x="14" y="22" font-weight="700" fill="#111827">depth32float 2D-array texture</text>

    <!-- 4 stacked layers, isometric -->
    <g transform="translate(20, 36)">
      <!-- Layer 3 (back) - blue -->
      <polygon points="40,4 116,4 124,12 48,12 40,4" fill="#bfdbfe" stroke="#2563eb" stroke-width="1"/>
      <rect x="48" y="12" width="76" height="38" fill="#dbeafe" stroke="#2563eb" stroke-width="1"/>
      <text x="86" y="35" text-anchor="middle" font-size="10" font-weight="700" fill="#1e3a8a">layer 3 · C3</text>

      <!-- Layer 2 - green -->
      <polygon points="32,16 108,16 116,24 40,24 32,16" fill="#bbf7d0" stroke="#16a34a" stroke-width="1"/>
      <rect x="40" y="24" width="76" height="38" fill="#dcfce7" stroke="#16a34a" stroke-width="1"/>
      <text x="78" y="47" text-anchor="middle" font-size="10" font-weight="700" fill="#14532d">layer 2 · C2</text>

      <!-- Layer 1 - orange -->
      <polygon points="24,28 100,28 108,36 32,36 24,28" fill="#fed7aa" stroke="#ea580c" stroke-width="1"/>
      <rect x="32" y="36" width="76" height="38" fill="#ffedd5" stroke="#ea580c" stroke-width="1"/>
      <text x="70" y="59" text-anchor="middle" font-size="10" font-weight="700" fill="#7c2d12">layer 1 · C1</text>

      <!-- Layer 0 (front) - red -->
      <polygon points="16,40 92,40 100,48 24,48 16,40" fill="#fecaca" stroke="#dc2626" stroke-width="1"/>
      <rect x="24" y="48" width="76" height="38" fill="#fee2e2" stroke="#dc2626" stroke-width="1"/>
      <text x="62" y="71" text-anchor="middle" font-size="10" font-weight="700" fill="#7f1d1d">layer 0 · C0</text>
    </g>

    <g font-family="ui-monospace, Consolas, monospace" font-size="11" fill="#374151" transform="translate(170, 50)">
      <text x="0" y="0">size:  2048 × 2048 × 4</text>
      <text x="0" y="18">format: depth32float</text>
      <text x="0" y="36">view:   2d-array</text>
    </g>
  </g>
</svg>
