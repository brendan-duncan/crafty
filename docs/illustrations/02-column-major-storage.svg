<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 380" font-family="system-ui, -apple-system, sans-serif" font-size="13">
  <rect width="720" height="380" fill="#ffffff"/>
  <text x="360" y="26" text-anchor="middle" font-size="16" font-weight="600" fill="#111827">Column-Major Storage (WebGPU / WGSL)</text>

  <!-- 4x4 grid on the left -->
  <g transform="translate(40, 70)" font-family="ui-monospace, Consolas, monospace" font-size="13">
    <!-- Column highlights (4 columns, 4 rows; cell 50x40) -->
    <rect x="0"   y="0" width="50" height="160" fill="#dbeafe"/>
    <rect x="50"  y="0" width="50" height="160" fill="#dcfce7"/>
    <rect x="100" y="0" width="50" height="160" fill="#fef3c7"/>
    <rect x="150" y="0" width="50" height="160" fill="#fce7f3"/>

    <!-- Cell borders -->
    <g stroke="#374151" stroke-width="1" fill="none">
      <rect x="0" y="0" width="200" height="160"/>
      <line x1="50"  y1="0" x2="50"  y2="160"/>
      <line x1="100" y1="0" x2="100" y2="160"/>
      <line x1="150" y1="0" x2="150" y2="160"/>
      <line x1="0" y1="40"  x2="200" y2="40"/>
      <line x1="0" y1="80"  x2="200" y2="80"/>
      <line x1="0" y1="120" x2="200" y2="120"/>
    </g>

    <!-- Cell labels: indices 0..15 by column -->
    <g text-anchor="middle" fill="#111827">
      <!-- col 0 -->
      <text x="25" y="26">0</text><text x="25" y="66">1</text><text x="25" y="106">2</text><text x="25" y="146">3</text>
      <!-- col 1 -->
      <text x="75" y="26">4</text><text x="75" y="66">5</text><text x="75" y="106">6</text><text x="75" y="146">7</text>
      <!-- col 2 -->
      <text x="125" y="26">8</text><text x="125" y="66">9</text><text x="125" y="106">10</text><text x="125" y="146">11</text>
      <!-- col 3 -->
      <text x="175" y="26">12</text><text x="175" y="66">13</text><text x="175" y="106">14</text><text x="175" y="146">15</text>
    </g>

    <!-- Row labels -->
    <g font-family="system-ui, sans-serif" font-size="11" fill="#6b7280" text-anchor="end">
      <text x="-8" y="24">row 0</text>
      <text x="-8" y="64">row 1</text>
      <text x="-8" y="104">row 2</text>
      <text x="-8" y="144">row 3</text>
    </g>

    <!-- Column labels -->
    <g font-family="system-ui, sans-serif" font-size="11" fill="#6b7280" text-anchor="middle">
      <text x="25" y="-8">col 0</text>
      <text x="75" y="-8">col 1</text>
      <text x="125" y="-8">col 2</text>
      <text x="175" y="-8">col 3</text>
    </g>

    <!-- Title for matrix -->
    <text x="100" y="186" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" fill="#374151" font-style="italic">4×4 logical matrix</text>

    <!-- Index formula -->
    <text x="100" y="220" text-anchor="middle" font-family="ui-monospace, Consolas, monospace" font-size="13" fill="#111827">index = col * 4 + row</text>
  </g>

  <!-- Arrow from grid to flat array -->
  <g transform="translate(270, 150)">
    <path d="M 0,0 L 50,0" stroke="#374151" stroke-width="2" fill="none" marker-end="url(#flatArrow)"/>
    <text x="25" y="-8" text-anchor="middle" font-size="11" fill="#6b7280">linearize</text>
    <text x="25" y="22" text-anchor="middle" font-size="11" fill="#6b7280">column-by-column</text>
  </g>

  <defs>
    <marker id="flatArrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#374151"/>
    </marker>
  </defs>

  <!-- Flat array on the right -->
  <g transform="translate(330, 110)" font-family="ui-monospace, Consolas, monospace" font-size="12">
    <text x="180" y="-14" text-anchor="middle" font-family="system-ui, sans-serif" font-size="13" fill="#111827" font-weight="600">Float32Array (16 elements)</text>

    <!-- 16 cells, width 22 each, color-grouped by column of origin -->
    <g stroke="#374151" stroke-width="1">
      <!-- col 0 → indices 0..3 (blue) -->
      <rect x="0"   y="0" width="22" height="32" fill="#dbeafe"/>
      <rect x="22"  y="0" width="22" height="32" fill="#dbeafe"/>
      <rect x="44"  y="0" width="22" height="32" fill="#dbeafe"/>
      <rect x="66"  y="0" width="22" height="32" fill="#dbeafe"/>
      <!-- col 1 (green) -->
      <rect x="88"  y="0" width="22" height="32" fill="#dcfce7"/>
      <rect x="110" y="0" width="22" height="32" fill="#dcfce7"/>
      <rect x="132" y="0" width="22" height="32" fill="#dcfce7"/>
      <rect x="154" y="0" width="22" height="32" fill="#dcfce7"/>
      <!-- col 2 (amber) -->
      <rect x="176" y="0" width="22" height="32" fill="#fef3c7"/>
      <rect x="198" y="0" width="22" height="32" fill="#fef3c7"/>
      <rect x="220" y="0" width="22" height="32" fill="#fef3c7"/>
      <rect x="242" y="0" width="22" height="32" fill="#fef3c7"/>
      <!-- col 3 (pink) -->
      <rect x="264" y="0" width="22" height="32" fill="#fce7f3"/>
      <rect x="286" y="0" width="22" height="32" fill="#fce7f3"/>
      <rect x="308" y="0" width="22" height="32" fill="#fce7f3"/>
      <rect x="330" y="0" width="22" height="32" fill="#fce7f3"/>
    </g>

    <!-- Index labels inside cells -->
    <g text-anchor="middle" fill="#111827">
      <text x="11"  y="20">0</text><text x="33"  y="20">1</text><text x="55"  y="20">2</text><text x="77"  y="20">3</text>
      <text x="99"  y="20">4</text><text x="121" y="20">5</text><text x="143" y="20">6</text><text x="165" y="20">7</text>
      <text x="187" y="20">8</text><text x="209" y="20">9</text><text x="231" y="20">10</text><text x="253" y="20">11</text>
      <text x="275" y="20">12</text><text x="297" y="20">13</text><text x="319" y="20">14</text><text x="341" y="20">15</text>
    </g>

    <!-- Brackets under each column group -->
    <g fill="none" stroke="#374151" stroke-width="1">
      <path d="M 0,42 L 0,48 L 88,48 L 88,42"/>
      <path d="M 88,42 L 88,48 L 176,48 L 176,42"/>
      <path d="M 176,42 L 176,48 L 264,48 L 264,42"/>
      <path d="M 264,42 L 264,48 L 352,48 L 352,42"/>
    </g>
    <g text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#6b7280">
      <text x="44"  y="62">column 0</text>
      <text x="132" y="62">column 1</text>
      <text x="220" y="62">column 2</text>
      <text x="308" y="62">column 3</text>
    </g>

    <!-- Identity matrix example -->
    <text x="180" y="100" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" fill="#374151">Example: identity matrix as a flat array</text>
    <g font-family="ui-monospace, Consolas, monospace" font-size="12" fill="#111827" text-anchor="middle">
      <text x="11" y="138">1</text><text x="33" y="138">0</text><text x="55" y="138">0</text><text x="77" y="138">0</text>
      <text x="99" y="138">0</text><text x="121" y="138">1</text><text x="143" y="138">0</text><text x="165" y="138">0</text>
      <text x="187" y="138">0</text><text x="209" y="138">0</text><text x="231" y="138">1</text><text x="253" y="138">0</text>
      <text x="275" y="138">0</text><text x="297" y="138">0</text><text x="319" y="138">0</text><text x="341" y="138">1</text>
    </g>
    <g stroke="#9ca3af" stroke-width="1" fill="none">
      <rect x="0" y="118" width="352" height="26"/>
      <line x1="88"  y1="118" x2="88"  y2="144"/>
      <line x1="176" y1="118" x2="176" y2="144"/>
      <line x1="264" y1="118" x2="264" y2="144"/>
    </g>
  </g>

  <!-- Bottom note -->
  <text x="360" y="362" text-anchor="middle" font-size="12" fill="#6b7280" font-style="italic">Each column of the matrix becomes a contiguous run of 4 floats — matches WGSL's mat4x4&lt;f32&gt; layout.</text>
</svg>
