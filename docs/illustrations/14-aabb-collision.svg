<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 920 460" font-family="system-ui, -apple-system, sans-serif" font-size="13">
  <rect width="920" height="460" fill="#ffffff"/>
  <text x="460" y="26" text-anchor="middle" font-size="16" font-weight="600" fill="#111827">AABB vs Voxel Grid: Test Only the Cells the Box Overlaps</text>

  <defs>
    <marker id="aabbArr" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="9" markerHeight="9" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#dc2626"/>
    </marker>
  </defs>

  <!-- ===== LEFT: scene with AABB on voxel grid ===== -->
  <g transform="translate(40, 60)">
    <text x="200" y="0" text-anchor="middle" font-weight="700" fill="#111827">Player AABB resting on the world</text>

    <!-- Voxel grid 8 cells × 6 cells, cell size 48. Total 384 × 288. Frame at (0,14)-(384,302). -->
    <g>
      <!-- Background -->
      <rect x="0" y="14" width="384" height="288" fill="#f3f4f6" stroke="#9ca3af" stroke-width="1"/>

      <!-- Solid blocks (terrain) — bottom row + an obstacle -->
      <g fill="#a16207" stroke="#7c2d12" stroke-width="1">
        <rect x="0"   y="254" width="48" height="48"/>
        <rect x="48"  y="254" width="48" height="48"/>
        <rect x="96"  y="254" width="48" height="48"/>
        <rect x="144" y="254" width="48" height="48"/>
        <rect x="192" y="254" width="48" height="48"/>
        <rect x="240" y="254" width="48" height="48"/>
        <rect x="288" y="254" width="48" height="48"/>
        <rect x="336" y="254" width="48" height="48"/>
        <!-- Step / wall on the right -->
        <rect x="288" y="206" width="48" height="48"/>
        <rect x="336" y="206" width="48" height="48"/>
        <rect x="336" y="158" width="48" height="48"/>
      </g>

      <!-- Grid lines (drawn after terrain so they appear on top) -->
      <g stroke="#d1d5db" stroke-width="0.5">
        <line x1="48"  y1="14" x2="48"  y2="302"/>
        <line x1="96"  y1="14" x2="96"  y2="302"/>
        <line x1="144" y1="14" x2="144" y2="302"/>
        <line x1="192" y1="14" x2="192" y2="302"/>
        <line x1="240" y1="14" x2="240" y2="302"/>
        <line x1="288" y1="14" x2="288" y2="302"/>
        <line x1="336" y1="14" x2="336" y2="302"/>
        <line x1="0" y1="62"  x2="384" y2="62"/>
        <line x1="0" y1="110" x2="384" y2="110"/>
        <line x1="0" y1="158" x2="384" y2="158"/>
        <line x1="0" y1="206" x2="384" y2="206"/>
        <line x1="0" y1="254" x2="384" y2="254"/>
      </g>

      <!-- Player AABB: 0.6 wide × 1.8 tall (player). Centered around x=160, feet at y=254. -->
      <!-- 0.6 blocks wide = 28.8 px. So min_x ≈ 145, max_x ≈ 174. Height 1.8 = 86.4 px. min_y ≈ 168, max_y ≈ 254. -->
      <rect x="146" y="168" width="29" height="86" fill="#60a5fa" fill-opacity="0.45" stroke="#1e3a8a" stroke-width="1.6"/>

      <!-- min/max corner markers -->
      <circle cx="146" cy="168" r="3" fill="#1e3a8a"/>
      <text x="142" y="164" text-anchor="end" font-size="10" font-weight="700" fill="#1e3a8a">min</text>

      <circle cx="175" cy="254" r="3" fill="#1e3a8a"/>
      <text x="180" y="266" font-size="10" font-weight="700" fill="#1e3a8a">max</text>

      <!-- Highlight cells the AABB overlaps (test set) -->
      <g fill="none" stroke="#dc2626" stroke-width="2" stroke-dasharray="4,3">
        <rect x="144" y="158" width="48" height="48"/>
        <rect x="144" y="206" width="48" height="48"/>
      </g>

      <!-- Test labels in red -->
      <g font-size="10" font-weight="700" fill="#dc2626" text-anchor="middle">
        <text x="210" y="178">test:</text>
        <text x="210" y="192">(3, ?, 1)</text>
        <text x="210" y="226">(3, ?, 2)</text>
      </g>
    </g>

    <text x="200" y="328" text-anchor="middle" font-size="11" font-style="italic" fill="#6b7280">only 2 cells overlap the box → only 2 lookups needed</text>
  </g>

  <!-- ===== RIGHT: code + key insight ===== -->
  <g transform="translate(480, 60)">
    <text x="200" y="0" text-anchor="middle" font-weight="700" fill="#111827">Cell range from min/max</text>

    <rect x="0" y="14" width="400" height="280" fill="#f9fafb" stroke="#9ca3af" stroke-width="1" rx="6"/>

    <g font-family="ui-monospace, Consolas, monospace" font-size="12" fill="#374151" transform="translate(14, 0)">
      <text x="0" y="38" font-weight="700" fill="#111827">// AABB.intersectsAnySolidBlock(world)</text>
      <text x="0" y="62">(xLo, yLo, zLo) = floor(min.xyz)</text>
      <text x="0" y="80">(xHi, yHi, zHi) = floor(max.xyz − ε)</text>

      <text x="0" y="112">for (bx = xLo; bx &lt;= xHi; bx++)</text>
      <text x="0" y="130">  for (by = yLo; by &lt;= yHi; by++)</text>
      <text x="0" y="148">    for (bz = zLo; bz &lt;= zHi; bz++)</text>
      <text x="0" y="166">      if (isSolid(bx, by, bz)) return true;</text>

      <text x="0" y="206" fill="#dc2626" font-style="italic">// player AABB ≈ 0.6 × 1.8 × 0.6 →</text>
      <text x="0" y="224" fill="#dc2626" font-style="italic">// at most 2 × 2 × 2 = 8 cells per query</text>
    </g>

    <text x="200" y="324" text-anchor="middle" font-size="11" font-style="italic" fill="#6b7280">no spatial structure needed —</text>
    <text x="200" y="338" text-anchor="middle" font-size="11" font-style="italic" fill="#6b7280">the voxel grid IS the index</text>
  </g>

  <!-- ===== Bottom note ===== -->
  <g transform="translate(40, 408)">
    <rect width="840" height="40" fill="#eff6ff" stroke="#2563eb" stroke-width="1" rx="6"/>
    <text x="14" y="26" font-size="11" fill="#1e3a8a">
      <tspan font-weight="700">Why ε?</tspan>
      Subtracting a small epsilon from max keeps a box flush against a face from claiming the next cell.
    </text>
  </g>
</svg>
