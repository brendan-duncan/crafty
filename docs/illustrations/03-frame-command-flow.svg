<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 920 380" font-family="system-ui, -apple-system, sans-serif" font-size="13">
  <rect width="920" height="380" fill="#ffffff"/>
  <text x="460" y="26" text-anchor="middle" font-size="16" font-weight="600" fill="#111827">A Frame: Recording Commands and Submitting to the GPU</text>

  <defs>
    <marker id="fcArr" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="9" markerHeight="9" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#374151"/>
    </marker>
  </defs>

  <!-- CPU side rectangle (top) -->
  <g>
    <rect x="20" y="60" width="880" height="200" fill="#f9fafb" stroke="#d1d5db" stroke-width="1" stroke-dasharray="4,4" rx="6"/>
    <text x="34" y="80" font-weight="700" fill="#6b7280" font-size="11">CPU (this frame's JS execution)</text>
  </g>

  <!-- 1. Create encoder -->
  <g transform="translate(50, 120)">
    <rect width="160" height="80" fill="#dbeafe" stroke="#1e40af" stroke-width="1.4" rx="6"/>
    <text x="80" y="22" text-anchor="middle" font-weight="700" fill="#1e40af" font-size="12">Create encoder</text>
    <text x="80" y="46" text-anchor="middle" font-family="ui-monospace, Consolas, monospace" font-size="10" fill="#1e40af">device.create</text>
    <text x="80" y="60" text-anchor="middle" font-family="ui-monospace, Consolas, monospace" font-size="10" fill="#1e40af">CommandEncoder()</text>
  </g>

  <line x1="210" y1="160" x2="240" y2="160" stroke="#374151" stroke-width="1.6" marker-end="url(#fcArr)"/>

  <!-- 2. Multiple passes record into encoder -->
  <g transform="translate(240, 100)">
    <rect width="380" height="120" fill="#fde68a" stroke="#92400e" stroke-width="1.4" rx="6"/>
    <text x="190" y="22" text-anchor="middle" font-weight="700" fill="#92400e">All passes append to the same encoder</text>

    <!-- Pass chips -->
    <g font-size="11" font-family="ui-monospace, Consolas, monospace">
      <rect x="14" y="38" width="84" height="22" fill="#ffffff" stroke="#92400e"/>
      <text x="56" y="53" text-anchor="middle" fill="#92400e">GeometryPass</text>

      <rect x="106" y="38" width="84" height="22" fill="#ffffff" stroke="#92400e"/>
      <text x="148" y="53" text-anchor="middle" fill="#92400e">ShadowPass</text>

      <rect x="198" y="38" width="84" height="22" fill="#ffffff" stroke="#92400e"/>
      <text x="240" y="53" text-anchor="middle" fill="#92400e">LightingPass</text>

      <rect x="290" y="38" width="76" height="22" fill="#ffffff" stroke="#92400e"/>
      <text x="328" y="53" text-anchor="middle" fill="#92400e">PostFXPass</text>

      <rect x="14" y="68" width="84" height="22" fill="#ffffff" stroke="#92400e"/>
      <text x="56" y="83" text-anchor="middle" fill="#92400e">SkyPass</text>

      <rect x="106" y="68" width="84" height="22" fill="#ffffff" stroke="#92400e"/>
      <text x="148" y="83" text-anchor="middle" fill="#92400e">CloudsPass</text>

      <rect x="198" y="68" width="84" height="22" fill="#ffffff" stroke="#92400e"/>
      <text x="240" y="83" text-anchor="middle" fill="#92400e">…</text>

      <rect x="290" y="68" width="76" height="22" fill="#ffffff" stroke="#92400e"/>
      <text x="328" y="83" text-anchor="middle" fill="#92400e">CompositePass</text>
    </g>

    <text x="190" y="110" text-anchor="middle" font-size="11" font-style="italic" fill="#92400e">pass.execute(encoder, ctx)</text>
  </g>

  <line x1="620" y1="160" x2="650" y2="160" stroke="#374151" stroke-width="1.6" marker-end="url(#fcArr)"/>

  <!-- 3. encoder.finish() → command buffer -->
  <g transform="translate(650, 120)">
    <rect width="160" height="80" fill="#dcfce7" stroke="#166534" stroke-width="1.4" rx="6"/>
    <text x="80" y="22" text-anchor="middle" font-weight="700" fill="#166534" font-size="12">Finish</text>
    <text x="80" y="46" text-anchor="middle" font-family="ui-monospace, Consolas, monospace" font-size="10" fill="#166534">encoder.finish()</text>
    <text x="80" y="64" text-anchor="middle" font-size="11" fill="#166534" font-style="italic">→ GPUCommandBuffer</text>
  </g>

  <!-- Arrow down to GPU -->
  <line x1="730" y1="200" x2="730" y2="262" stroke="#374151" stroke-width="2" marker-end="url(#fcArr)"/>
  <text x="740" y="240" font-size="11" font-family="ui-monospace, Consolas, monospace" fill="#374151">queue.submit([cb])</text>

  <!-- GPU side rectangle (bottom) -->
  <g>
    <rect x="20" y="270" width="880" height="80" fill="#fce7f3" stroke="#9d174d" stroke-width="1.4" rx="6"/>
    <text x="34" y="288" font-weight="700" fill="#9d174d" font-size="11">GPU (executes asynchronously)</text>

    <!-- GPU executes the command buffer -->
    <g transform="translate(560, 300)">
      <text x="0" y="14" font-weight="600" fill="#9d174d">Reads command buffer →</text>
      <text x="0" y="32" fill="#9d174d">draws triangles, runs compute, writes pixels</text>
    </g>

    <!-- Visual: output / display -->
    <g transform="translate(50, 290)">
      <rect width="120" height="50" fill="#ffffff" stroke="#9d174d" stroke-width="1.4"/>
      <text x="60" y="20" text-anchor="middle" font-weight="700" fill="#9d174d" font-size="12">Final image</text>
      <text x="60" y="38" text-anchor="middle" font-size="11" fill="#9d174d" font-style="italic">presented to canvas</text>
    </g>
  </g>

  <!-- Bottom note -->
  <text x="460" y="370" text-anchor="middle" font-size="12" fill="#6b7280" font-style="italic">One encoder per frame, shared by every pass — a single submit() call sends the whole frame to the GPU.</text>
</svg>
