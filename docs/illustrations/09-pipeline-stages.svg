<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 920 480" font-family="system-ui, -apple-system, sans-serif" font-size="13">
  <rect width="920" height="480" fill="#ffffff"/>
  <text x="460" y="26" text-anchor="middle" font-size="16" font-weight="600" fill="#111827">GPU Particle Pipeline: Five GPU Stages, Zero CPU Readback</text>

  <defs>
    <marker id="ppArr" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="9" markerHeight="9" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#374151"/>
    </marker>
    <marker id="ppArrR" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="9" markerHeight="9" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#dc2626"/>
    </marker>
    <marker id="ppArrB" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="9" markerHeight="9" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#2563eb"/>
    </marker>
  </defs>

  <!-- 5 stage boxes, each 160 wide × 80 tall, x at 20, 200, 380, 560, 740 -->

  <!-- Stage 1: SPAWN -->
  <g transform="translate(20, 70)">
    <rect x="0" y="0" width="160" height="80" fill="#fef2f2" stroke="#dc2626" stroke-width="1.4" rx="6"/>
    <rect x="0" y="0" width="160" height="22" fill="#fee2e2"/>
    <text x="80" y="16" text-anchor="middle" font-size="11" font-weight="700" fill="#7f1d1d">1 · SPAWN</text>

    <text x="80" y="40" text-anchor="middle" font-size="11" font-weight="700" fill="#7f1d1d">compute</text>
    <text x="80" y="56" text-anchor="middle" font-size="10" fill="#7f1d1d">N threads, one per</text>
    <text x="80" y="70" text-anchor="middle" font-size="10" fill="#7f1d1d">new particle</text>
  </g>

  <line x1="180" y1="110" x2="200" y2="110" stroke="#374151" stroke-width="1.4" marker-end="url(#ppArr)"/>

  <!-- Stage 2: UPDATE -->
  <g transform="translate(200, 70)">
    <rect x="0" y="0" width="160" height="80" fill="#fef2f2" stroke="#dc2626" stroke-width="1.4" rx="6"/>
    <rect x="0" y="0" width="160" height="22" fill="#fee2e2"/>
    <text x="80" y="16" text-anchor="middle" font-size="11" font-weight="700" fill="#7f1d1d">2 · UPDATE</text>

    <text x="80" y="40" text-anchor="middle" font-size="11" font-weight="700" fill="#7f1d1d">compute</text>
    <text x="80" y="56" text-anchor="middle" font-size="10" fill="#7f1d1d">apply modifiers,</text>
    <text x="80" y="70" text-anchor="middle" font-size="10" fill="#7f1d1d">tick life, kill on death</text>
  </g>

  <line x1="360" y1="110" x2="380" y2="110" stroke="#374151" stroke-width="1.4" marker-end="url(#ppArr)"/>

  <!-- Stage 3: COMPACT -->
  <g transform="translate(380, 70)">
    <rect x="0" y="0" width="160" height="80" fill="#fef2f2" stroke="#dc2626" stroke-width="1.4" rx="6"/>
    <rect x="0" y="0" width="160" height="22" fill="#fee2e2"/>
    <text x="80" y="16" text-anchor="middle" font-size="11" font-weight="700" fill="#7f1d1d">3 · COMPACT</text>

    <text x="80" y="40" text-anchor="middle" font-size="11" font-weight="700" fill="#7f1d1d">compute</text>
    <text x="80" y="56" text-anchor="middle" font-size="10" fill="#7f1d1d">atomicAdd to build</text>
    <text x="80" y="70" text-anchor="middle" font-size="10" fill="#7f1d1d">dense alive_list</text>
  </g>

  <line x1="540" y1="110" x2="560" y2="110" stroke="#374151" stroke-width="1.4" marker-end="url(#ppArr)"/>

  <!-- Stage 4: INDIRECT WRITE -->
  <g transform="translate(560, 70)">
    <rect x="0" y="0" width="160" height="80" fill="#fef2f2" stroke="#dc2626" stroke-width="1.4" rx="6"/>
    <rect x="0" y="0" width="160" height="22" fill="#fee2e2"/>
    <text x="80" y="16" text-anchor="middle" font-size="11" font-weight="700" fill="#7f1d1d">4 · INDIRECT</text>

    <text x="80" y="40" text-anchor="middle" font-size="11" font-weight="700" fill="#7f1d1d">compute</text>
    <text x="80" y="56" text-anchor="middle" font-size="10" fill="#7f1d1d">copy counter into</text>
    <text x="80" y="70" text-anchor="middle" font-size="10" fill="#7f1d1d">indirect.instanceCount</text>
  </g>

  <line x1="720" y1="110" x2="740" y2="110" stroke="#374151" stroke-width="1.4" marker-end="url(#ppArr)"/>

  <!-- Stage 5: RENDER -->
  <g transform="translate(740, 70)">
    <rect x="0" y="0" width="160" height="80" fill="#dbeafe" stroke="#2563eb" stroke-width="1.4" rx="6"/>
    <rect x="0" y="0" width="160" height="22" fill="#bfdbfe"/>
    <text x="80" y="16" text-anchor="middle" font-size="11" font-weight="700" fill="#1e3a8a">5 · RENDER</text>

    <text x="80" y="40" text-anchor="middle" font-size="11" font-weight="700" fill="#1e3a8a">drawIndirect</text>
    <text x="80" y="56" text-anchor="middle" font-size="10" fill="#1e3a8a">billboard quads,</text>
    <text x="80" y="70" text-anchor="middle" font-size="10" fill="#1e3a8a">count from indirect buf</text>
  </g>

  <!-- ===== GPU BUFFERS row (below stages) ===== -->
  <g transform="translate(20, 192)">
    <text x="14" y="0" font-size="11" font-weight="700" fill="#374151">GPU buffers (none ever read by CPU)</text>

    <!-- 4 buffer chips, each 200 wide × 56 tall, gap 20. 4*200 + 3*20 = 860 wide. Fits in 880. -->
    <g transform="translate(0, 14)">
      <rect x="0"   y="0" width="200" height="56" fill="#fef3c7" stroke="#a16207" stroke-width="1.2" rx="4"/>
      <text x="100" y="20" text-anchor="middle" font-weight="700" fill="#713f12">particleBuffer</text>
      <text x="100" y="36" text-anchor="middle" font-size="10" font-family="ui-monospace, Consolas, monospace" fill="#713f12">N × 64 bytes</text>
      <text x="100" y="50" text-anchor="middle" font-size="10" font-style="italic" fill="#713f12">struct array</text>

      <rect x="220" y="0" width="200" height="56" fill="#fef3c7" stroke="#a16207" stroke-width="1.2" rx="4"/>
      <text x="320" y="20" text-anchor="middle" font-weight="700" fill="#713f12">aliveList</text>
      <text x="320" y="36" text-anchor="middle" font-size="10" font-family="ui-monospace, Consolas, monospace" fill="#713f12">N × u32</text>
      <text x="320" y="50" text-anchor="middle" font-size="10" font-style="italic" fill="#713f12">indices of live slots</text>

      <rect x="440" y="0" width="200" height="56" fill="#fef3c7" stroke="#a16207" stroke-width="1.2" rx="4"/>
      <text x="540" y="20" text-anchor="middle" font-weight="700" fill="#713f12">counterBuffer</text>
      <text x="540" y="36" text-anchor="middle" font-size="10" font-family="ui-monospace, Consolas, monospace" fill="#713f12">atomic&lt;u32&gt;</text>
      <text x="540" y="50" text-anchor="middle" font-size="10" font-style="italic" fill="#713f12">live count, reset / frame</text>

      <rect x="660" y="0" width="200" height="56" fill="#fef3c7" stroke="#a16207" stroke-width="1.2" rx="4"/>
      <text x="760" y="20" text-anchor="middle" font-weight="700" fill="#713f12">indirectBuffer</text>
      <text x="760" y="36" text-anchor="middle" font-size="10" font-family="ui-monospace, Consolas, monospace" fill="#713f12">[6, count, 0, 0]</text>
      <text x="760" y="50" text-anchor="middle" font-size="10" font-style="italic" fill="#713f12">drawIndirect args</text>
    </g>
  </g>

  <!-- ===== Stage → Buffer access lines (R = read, W = write) ===== -->
  <g transform="translate(20, 282)">
    <text x="14" y="0" font-size="11" font-weight="700" fill="#374151">Read / write matrix</text>

    <g transform="translate(0, 14)">
      <rect width="880" height="100" fill="#f9fafb" stroke="#9ca3af" stroke-width="1" rx="4"/>

      <!-- Header row — columns aligned with the buffer chips above -->
      <g font-size="11" fill="#374151" font-weight="700">
        <text x="14"  y="22">Stage</text>
        <text x="100" y="22" text-anchor="middle">particleBuffer</text>
        <text x="320" y="22" text-anchor="middle">aliveList</text>
        <text x="540" y="22" text-anchor="middle">counter</text>
        <text x="760" y="22" text-anchor="middle">indirect</text>
      </g>
      <line x1="10" y1="30" x2="870" y2="30" stroke="#d1d5db" stroke-width="0.8"/>

      <!-- Rows -->
      <g font-size="11" fill="#374151">
        <text x="14"  y="46">Spawn</text>
        <text x="100" y="46" text-anchor="middle"><tspan fill="#dc2626" font-weight="700">W</tspan></text>

        <text x="14"  y="62">Update</text>
        <text x="100" y="62" text-anchor="middle"><tspan fill="#7c3aed" font-weight="700">RW</tspan></text>

        <text x="14"  y="78">Compact</text>
        <text x="100" y="78" text-anchor="middle"><tspan fill="#2563eb" font-weight="700">R</tspan></text>
        <text x="320" y="78" text-anchor="middle"><tspan fill="#dc2626" font-weight="700">W</tspan></text>
        <text x="540" y="78" text-anchor="middle"><tspan fill="#7c3aed" font-weight="700">RW</tspan></text>

        <text x="14"  y="94">Indirect</text>
        <text x="540" y="94" text-anchor="middle"><tspan fill="#2563eb" font-weight="700">R</tspan></text>
        <text x="760" y="94" text-anchor="middle"><tspan fill="#dc2626" font-weight="700">W</tspan></text>
      </g>
    </g>
  </g>

  <!-- Bottom note -->
  <g transform="translate(20, 416)">
    <rect width="880" height="50" fill="#eff6ff" stroke="#2563eb" stroke-width="1" rx="6"/>
    <text x="14" y="22" font-weight="700" fill="#1e3a8a">CPU per frame:</text>
    <text x="14" y="40" font-size="11" fill="#1e3a8a">writeBuffer(computeUniforms) · writeBuffer(counter ← 0) · writeBuffer(cameraUniforms) — that's it.</text>
  </g>
</svg>
