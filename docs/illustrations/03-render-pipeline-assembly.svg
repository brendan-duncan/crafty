<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 460" font-family="system-ui, -apple-system, sans-serif" font-size="13">
  <rect width="880" height="460" fill="#ffffff"/>
  <text x="440" y="26" text-anchor="middle" font-size="16" font-weight="600" fill="#111827">GPURenderPipeline: All State Baked Into One Object</text>

  <defs>
    <marker id="rpArr" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="9" markerHeight="9" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#374151"/>
    </marker>
  </defs>

  <!-- 6 input boxes on the left, all funnel into one pipeline box on the right -->

  <!-- Inputs (left column) -->
  <g font-size="12">
    <!-- Vertex shader -->
    <g transform="translate(40, 60)">
      <rect width="240" height="50" fill="#dbeafe" stroke="#1e40af" stroke-width="1.4" rx="4"/>
      <text x="14" y="22" font-weight="700" fill="#1e40af">Vertex shader</text>
      <text x="14" y="40" font-family="ui-monospace, Consolas, monospace" font-size="11" fill="#1e40af">module + entryPoint</text>
    </g>

    <!-- Fragment shader -->
    <g transform="translate(40, 120)">
      <rect width="240" height="50" fill="#dbeafe" stroke="#1e40af" stroke-width="1.4" rx="4"/>
      <text x="14" y="22" font-weight="700" fill="#1e40af">Fragment shader</text>
      <text x="14" y="40" font-family="ui-monospace, Consolas, monospace" font-size="11" fill="#1e40af">module + entryPoint</text>
    </g>

    <!-- Vertex buffer layout -->
    <g transform="translate(40, 180)">
      <rect width="240" height="50" fill="#fef3c7" stroke="#92400e" stroke-width="1.4" rx="4"/>
      <text x="14" y="22" font-weight="700" fill="#92400e">Vertex buffer layout</text>
      <text x="14" y="40" font-family="ui-monospace, Consolas, monospace" font-size="11" fill="#92400e">arrayStride · attributes</text>
    </g>

    <!-- Fragment targets -->
    <g transform="translate(40, 240)">
      <rect width="240" height="50" fill="#fce7f3" stroke="#9d174d" stroke-width="1.4" rx="4"/>
      <text x="14" y="22" font-weight="700" fill="#9d174d">Fragment targets</text>
      <text x="14" y="40" font-family="ui-monospace, Consolas, monospace" font-size="11" fill="#9d174d">format · blend · writeMask</text>
    </g>

    <!-- Depth/stencil -->
    <g transform="translate(40, 300)">
      <rect width="240" height="50" fill="#dcfce7" stroke="#166534" stroke-width="1.4" rx="4"/>
      <text x="14" y="22" font-weight="700" fill="#166534">Depth / stencil state</text>
      <text x="14" y="40" font-family="ui-monospace, Consolas, monospace" font-size="11" fill="#166534">format · depthCompare · write</text>
    </g>

    <!-- Primitive state -->
    <g transform="translate(40, 360)">
      <rect width="240" height="50" fill="#ede9fe" stroke="#5b21b6" stroke-width="1.4" rx="4"/>
      <text x="14" y="22" font-weight="700" fill="#5b21b6">Primitive state</text>
      <text x="14" y="40" font-family="ui-monospace, Consolas, monospace" font-size="11" fill="#5b21b6">topology · cullMode · winding</text>
    </g>

    <!-- Pipeline layout (bind group layouts) -->
    <g transform="translate(40, 420)">
      <rect width="240" height="32" fill="#f3f4f6" stroke="#374151" stroke-width="1.2" rx="4"/>
      <text x="14" y="14" font-weight="700" fill="#111827" font-size="11">Pipeline layout</text>
      <text x="14" y="28" font-family="ui-monospace, Consolas, monospace" font-size="10" fill="#374151">bindGroupLayouts: [ … ]</text>
    </g>
  </g>

  <!-- Six funnel arrows from each input toward the pipeline box -->
  <g stroke="#374151" stroke-width="1.5" fill="none">
    <path d="M 280,85  C 380,85, 460,200, 560,220" marker-end="url(#rpArr)"/>
    <path d="M 280,145 C 380,145, 460,210, 560,230" marker-end="url(#rpArr)"/>
    <path d="M 280,205 C 380,205, 480,220, 560,240" marker-end="url(#rpArr)"/>
    <path d="M 280,265 C 380,265, 480,250, 560,250" marker-end="url(#rpArr)"/>
    <path d="M 280,325 C 380,325, 480,290, 560,260" marker-end="url(#rpArr)"/>
    <path d="M 280,385 C 380,385, 480,320, 560,270" marker-end="url(#rpArr)"/>
    <path d="M 280,436 C 380,436, 480,360, 560,280" marker-end="url(#rpArr)"/>
  </g>

  <!-- Pipeline output box (right) -->
  <g transform="translate(560, 200)">
    <rect width="280" height="100" fill="#fde68a" stroke="#92400e" stroke-width="2.5" rx="8"/>
    <text x="140" y="32" text-anchor="middle" font-weight="700" fill="#92400e" font-family="ui-monospace, Consolas, monospace" font-size="14">GPURenderPipeline</text>
    <text x="140" y="56" text-anchor="middle" font-size="12" fill="#92400e" font-style="italic">immutable, compiled</text>
    <text x="140" y="78" text-anchor="middle" font-size="11" fill="#92400e">created once, reused per draw</text>
  </g>

  <!-- Cache note -->
  <g transform="translate(560, 320)">
    <rect width="280" height="100" fill="#f9fafb" stroke="#9ca3af" stroke-width="1.2" rx="6"/>
    <text x="140" y="22" text-anchor="middle" font-weight="600" fill="#111827">Cached per material</text>
    <text x="14" y="44" font-size="11" fill="#374151">Compilation can take tens of</text>
    <text x="14" y="60" font-size="11" fill="#374151">milliseconds — Crafty caches</text>
    <text x="14" y="76" font-size="11" fill="#374151">pipelines in a Map keyed by</text>
    <text x="14" y="92" font-size="11" font-family="ui-monospace, Consolas, monospace" fill="#111827">material.shaderId</text>
  </g>
</svg>
