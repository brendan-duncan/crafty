<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 380" font-family="system-ui, -apple-system, sans-serif" font-size="13">
  <rect width="880" height="380" fill="#ffffff"/>
  <text x="440" y="26" text-anchor="middle" font-size="16" font-weight="600" fill="#111827">Depth of Field: Circle of Confusion (CoC)</text>

  <!-- TOP: lens diagram -->
  <g transform="translate(40, 60)">
    <!-- Lens (vertical ellipse) at x=120 -->
    <ellipse cx="120" cy="110" rx="14" ry="80" fill="#dbeafe" stroke="#1e40af" stroke-width="1.5"/>
    <text x="120" y="208" text-anchor="middle" font-size="11" fill="#1e40af" font-weight="600">lens</text>

    <!-- Optical axis -->
    <line x1="0" y1="110" x2="800" y2="110" stroke="#9ca3af" stroke-width="1" stroke-dasharray="3,3"/>

    <!-- Focal plane (vertical green dashed at x=480) -->
    <line x1="480" y1="20" x2="480" y2="200" stroke="#16a34a" stroke-width="1.5" stroke-dasharray="5,3"/>
    <text x="480" y="14" text-anchor="middle" font-size="11" font-weight="700" fill="#16a34a">focal plane</text>

    <!-- Sensor plane (right side at x=20) -->
    <line x1="20" y1="40" x2="20" y2="180" stroke="#374151" stroke-width="2"/>
    <text x="20" y="34" text-anchor="middle" font-size="11" fill="#374151" font-weight="600">sensor</text>

    <!-- Three subjects: foreground (close to camera), in-focus, background -->

    <!-- Foreground subject (closer than focal plane) at x=320 -->
    <circle cx="320" cy="110" r="6" fill="#dc2626"/>
    <text x="320" y="220" text-anchor="middle" font-size="11" font-weight="600" fill="#dc2626">foreground</text>
    <text x="320" y="234" text-anchor="middle" font-size="11" fill="#dc2626" font-style="italic">(in front of focus)</text>

    <!-- In-focus subject at x=480 (on focal plane) -->
    <circle cx="480" cy="110" r="6" fill="#16a34a"/>
    <text x="480" y="220" text-anchor="middle" font-size="11" font-weight="600" fill="#16a34a">in focus</text>
    <text x="480" y="234" text-anchor="middle" font-size="11" fill="#16a34a" font-style="italic">(on focal plane)</text>

    <!-- Background subject at x=680 -->
    <circle cx="680" cy="110" r="6" fill="#7c3aed"/>
    <text x="680" y="220" text-anchor="middle" font-size="11" font-weight="600" fill="#7c3aed">background</text>
    <text x="680" y="234" text-anchor="middle" font-size="11" fill="#7c3aed" font-style="italic">(beyond focus)</text>

    <!-- Light cones from each subject through lens to sensor -->
    <!-- For in-focus: rays converge to a single point on sensor -->
    <g stroke="#16a34a" stroke-width="1" opacity="0.8">
      <line x1="480" y1="110" x2="120" y2="40"/>
      <line x1="480" y1="110" x2="120" y2="180"/>
      <line x1="120" y1="40" x2="20" y2="110"/>
      <line x1="120" y1="180" x2="20" y2="110"/>
    </g>
    <!-- Sharp dot on sensor for in-focus -->
    <circle cx="20" cy="110" r="3" fill="#16a34a"/>

    <!-- For foreground: rays converge BEYOND sensor → spread out on sensor -->
    <g stroke="#dc2626" stroke-width="1" opacity="0.7">
      <line x1="320" y1="110" x2="120" y2="50"/>
      <line x1="320" y1="110" x2="120" y2="170"/>
      <!-- Beyond lens, rays would converge further than sensor; we show them hitting sensor at offset positions -->
      <line x1="120" y1="50" x2="20" y2="135"/>
      <line x1="120" y1="170" x2="20" y2="85"/>
    </g>
    <!-- Larger blur disk on sensor for foreground -->
    <line x1="20" y1="85" x2="20" y2="135" stroke="#dc2626" stroke-width="6" stroke-linecap="round" opacity="0.8"/>

    <!-- For background: rays converge BEFORE sensor → spread out -->
    <g stroke="#7c3aed" stroke-width="1" opacity="0.7">
      <line x1="680" y1="110" x2="120" y2="55"/>
      <line x1="680" y1="110" x2="120" y2="165"/>
      <line x1="120" y1="55" x2="20" y2="125"/>
      <line x1="120" y1="165" x2="20" y2="95"/>
    </g>
    <!-- Background blur disk -->
    <line x1="20" y1="95" x2="20" y2="125" stroke="#7c3aed" stroke-width="6" stroke-linecap="round" opacity="0.8"/>

    <!-- Annotations on the sensor side -->
    <g font-size="10" fill="#374151" font-style="italic">
      <text x="-10" y="138" text-anchor="end" fill="#dc2626">large CoC</text>
      <text x="-10" y="115" text-anchor="end" fill="#16a34a">point</text>
      <text x="-10" y="92" text-anchor="end" fill="#7c3aed">medium CoC</text>
    </g>
  </g>

  <!-- BOTTOM: CoC vs depth plot -->
  <g transform="translate(80, 270)">
    <text x="320" y="0" text-anchor="middle" font-weight="700" fill="#111827">CoC = |depth − focalDepth| × cocScale, capped at maxCocRadius</text>

    <!-- Plot area -->
    <line x1="0" y1="60" x2="640" y2="60" stroke="#374151" stroke-width="1.5"/>
    <line x1="320" y1="20" x2="320" y2="100" stroke="#16a34a" stroke-width="1.5" stroke-dasharray="4,3"/>

    <!-- V-shape CoC curve, capped -->
    <polyline points="0,40 120,40 320,80 520,40 640,40" fill="none" stroke="#374151" stroke-width="2"/>

    <!-- Cap lines -->
    <line x1="0" y1="40" x2="120" y2="40" stroke="#dc2626" stroke-width="2.5"/>
    <line x1="520" y1="40" x2="640" y2="40" stroke="#7c3aed" stroke-width="2.5"/>

    <text x="320" y="98" text-anchor="middle" font-size="11" fill="#16a34a" font-weight="600">focalDepth (CoC = 0)</text>
    <text x="60" y="34" text-anchor="middle" font-size="11" fill="#dc2626" font-weight="600">max foreground CoC</text>
    <text x="580" y="34" text-anchor="middle" font-size="11" fill="#7c3aed" font-weight="600">max background CoC</text>

    <!-- Axis labels -->
    <text x="320" y="76" text-anchor="middle" font-size="10" fill="#374151">|</text>
    <text x="0" y="76" font-size="10" fill="#374151">near</text>
    <text x="640" y="76" text-anchor="end" font-size="10" fill="#374151">far</text>
  </g>
</svg>
