<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 560 360" font-family="system-ui, -apple-system, sans-serif" font-size="13">
  <rect width="560" height="360" fill="#ffffff"/>
  <text x="280" y="26" text-anchor="middle" font-size="16" font-weight="600" fill="#111827">Quaternion as Axis-Angle Rotation</text>

  <defs>
    <marker id="qAxis" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#7c3aed"/>
    </marker>
    <marker id="qArc" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#dc2626"/>
    </marker>
    <marker id="qPoint" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#374151"/>
    </marker>
  </defs>

  <g transform="translate(220, 200)">
    <!-- Plane perpendicular to axis (ellipse for perspective) -->
    <ellipse cx="0" cy="0" rx="120" ry="36" fill="#ede9fe" stroke="#a78bfa" stroke-width="1.2" opacity="0.6"/>

    <!-- Axis (going up, the vector part of q) -->
    <line x1="0" y1="80" x2="0" y2="-130" stroke="#7c3aed" stroke-width="2.5" marker-end="url(#qAxis)"/>
    <text x="10" y="-132" fill="#7c3aed" font-weight="700">axis n̂</text>
    <text x="10" y="-114" fill="#7c3aed" font-size="11" font-style="italic">= (x, y, z) / sin(θ/2)</text>

    <!-- Origin -->
    <circle cx="0" cy="0" r="3.5" fill="#111827"/>

    <!-- Original point p (on the ellipse, right side) -->
    <line x1="0" y1="0" x2="110" y2="-12" stroke="#374151" stroke-width="1.5" marker-end="url(#qPoint)"/>
    <circle cx="110" cy="-12" r="4" fill="#374151"/>
    <text x="118" y="-16" fill="#374151" font-weight="600">p</text>

    <!-- Rotation arc (on the ellipse, going around the axis) -->
    <path d="M 110,-12 A 120,36 0 0 1 -54,-32" fill="none" stroke="#dc2626" stroke-width="2" marker-end="url(#qArc)"/>

    <!-- Rotated point p' -->
    <line x1="0" y1="0" x2="-54" y2="-32" stroke="#374151" stroke-width="1.5" marker-end="url(#qPoint)" stroke-dasharray="3,3"/>
    <circle cx="-54" cy="-32" r="4" fill="#dc2626"/>
    <text x="-66" y="-36" fill="#dc2626" font-weight="600" text-anchor="end">p′</text>

    <!-- Angle θ label on the arc -->
    <text x="40" y="-44" fill="#dc2626" font-weight="600" font-style="italic">θ</text>
  </g>

  <!-- Components box -->
  <g transform="translate(380, 110)">
    <rect x="0" y="0" width="160" height="170" fill="#f9fafb" stroke="#9ca3af" rx="4"/>
    <text x="80" y="24" text-anchor="middle" font-weight="600" fill="#111827">q = (x, y, z, w)</text>

    <text x="14" y="56" fill="#374151">x = nₓ · sin(θ/2)</text>
    <text x="14" y="78" fill="#374151">y = nᵧ · sin(θ/2)</text>
    <text x="14" y="100" fill="#374151">z = n_z · sin(θ/2)</text>
    <text x="14" y="124" fill="#374151" font-weight="600">w = cos(θ/2)</text>

    <text x="80" y="156" text-anchor="middle" fill="#6b7280" font-size="11" font-style="italic">identity = (0,0,0,1)</text>
  </g>
</svg>
