<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 920 500" font-family="system-ui, -apple-system, sans-serif" font-size="13">
  <rect width="920" height="500" fill="#ffffff"/>
  <text x="460" y="26" text-anchor="middle" font-size="16" font-weight="600" fill="#111827">PCSS Pipeline: Blocker Search → Penumbra Estimation → Variable PCF</text>

  <defs>
    <marker id="pcArr" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="9" markerHeight="9" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#374151"/>
    </marker>
  </defs>

  <!-- ===== COLUMN 1: Blocker Search ===== -->
  <g transform="translate(40, 56)">
    <!-- Step badge -->
    <rect x="0" y="0" width="270" height="28" fill="#fee2e2" stroke="#dc2626" stroke-width="1.2" rx="4"/>
    <text x="135" y="19" text-anchor="middle" font-weight="700" fill="#7f1d1d">Step 1: Blocker Search</text>

    <!-- Shadow map grid (7×7 cells, 22px each = 154×154) -->
    <rect x="58" y="42" width="154" height="154" fill="#f3f4f6" stroke="#9ca3af" stroke-width="1.2"/>
    <g stroke="#d1d5db" stroke-width="0.5">
      <line x1="80"  y1="42" x2="80"  y2="196"/>
      <line x1="102" y1="42" x2="102" y2="196"/>
      <line x1="124" y1="42" x2="124" y2="196"/>
      <line x1="146" y1="42" x2="146" y2="196"/>
      <line x1="168" y1="42" x2="168" y2="196"/>
      <line x1="190" y1="42" x2="190" y2="196"/>
      <line x1="58"  y1="64" x2="212" y2="64"/>
      <line x1="58"  y1="86" x2="212" y2="86"/>
      <line x1="58"  y1="108" x2="212" y2="108"/>
      <line x1="58"  y1="130" x2="212" y2="130"/>
      <line x1="58"  y1="152" x2="212" y2="152"/>
      <line x1="58"  y1="174" x2="212" y2="174"/>
    </g>

    <!-- Depth gradient in the grid (darker near light = smaller depth) -->
    <rect x="58" y="42" width="22" height="22" fill="#0f172a" opacity="0.4"/>
    <rect x="80" y="42" width="22" height="22" fill="#0f172a" opacity="0.35"/>
    <rect x="102" y="42" width="22" height="22" fill="#1e293b" opacity="0.3"/>
    <rect x="124" y="42" width="22" height="22" fill="#334155" opacity="0.25"/>
    <rect x="58" y="64" width="22" height="22" fill="#1e293b" opacity="0.35"/>
    <rect x="80" y="64" width="22" height="22" fill="#334155" opacity="0.3"/>
    <rect x="102" y="64" width="22" height="22" fill="#475569" opacity="0.2"/>
    <rect x="124" y="64" width="22" height="22" fill="#64748b" opacity="0.15"/>
    <rect x="58" y="86" width="22" height="22" fill="#334155" opacity="0.25"/>
    <rect x="80" y="86" width="22" height="22" fill="#475569" opacity="0.2"/>
    <rect x="102" y="86" width="22" height="22" fill="#64748b" opacity="0.15"/>
    <rect x="124" y="86" width="22" height="22" fill="#94a3b8" opacity="0.1"/>
    <rect x="58" y="108" width="22" height="22" fill="#475569" opacity="0.2"/>
    <rect x="80" y="108" width="22" height="22" fill="#64748b" opacity="0.15"/>
    <rect x="102" y="108" width="22" height="22" fill="#94a3b8" opacity="0.1"/>
    <rect x="124" y="108" width="22" height="22" fill="#cbd5e1" opacity="0.05"/>

    <!-- Search radius circle (centered on fragment at 135, 119, r=40) -->
    <circle cx="135" cy="119" r="40" fill="none" stroke="#dc2626" stroke-width="1.4" stroke-dasharray="4,3"/>
    <text x="135" y="72" text-anchor="middle" font-size="10" font-weight="700" fill="#dc2626">search radius</text>

    <!-- Fragment marker at center -->
    <circle cx="135" cy="119" r="5" fill="#dc2626"/>
    <text x="176" y="125" font-size="10" font-weight="700" fill="#dc2626">fragment</text>

    <!-- Blocker texels (darker cells within the search radius) -->
    <g fill="#b91c1c" stroke="#7f1d1d" stroke-width="0.8">
      <rect x="102" y="86" width="22" height="22" fill="none" stroke-width="1.5"/>
      <rect x="124" y="86" width="22" height="22" fill="none" stroke-width="1.5"/>
      <rect x="80" y="108" width="22" height="22" fill="none" stroke-width="1.5"/>
      <rect x="102" y="108" width="22" height="22" fill="none" stroke-width="1.5"/>
      <rect x="124" y="108" width="22" height="22" fill="none" stroke-width="1.5"/>
      <rect x="80" y="130" width="22" height="22" fill="none" stroke-width="1.5"/>
      <rect x="102" y="130" width="22" height="22" fill="none" stroke-width="1.5"/>
    </g>

    <!-- Label below grid -->
    <text x="135" y="218" text-anchor="middle" font-size="11" font-style="italic" fill="#6b7280">8-tap Poisson-disk search</text>
    <text x="135" y="234" text-anchor="middle" font-size="11" fill="#374151">average depth of blockers only</text>

    <!-- Code snippet -->
    <g transform="translate(0, 252)">
      <rect x="0" y="0" width="270" height="65" fill="#f9fafb" stroke="#d1d5db" stroke-width="1" rx="4"/>
      <g font-family="ui-monospace, Consolas, monospace" font-size="10" fill="#374151" transform="translate(10, 12)">
        <text x="0" y="0">fn blocker_search(sc, r) {</text>
        <text x="0" y="16">  for 8 taps: if (d&lt;sc.z) total+=d</text>
        <text x="0" y="32">  return count==0 ? -1 : total/count;</text>
        <text x="0" y="48">}</text>
      </g>
    </g>
  </g>

  <!-- Arrow 1→2 -->
  <g stroke="#374151" stroke-width="1.6" fill="none">
    <line x1="310" y1="160" x2="330" y2="160" marker-end="url(#pcArr)"/>
  </g>

  <!-- ===== COLUMN 2: Penumbra Estimation ===== -->
  <g transform="translate(340, 56)">
    <!-- Step badge -->
    <rect x="0" y="0" width="240" height="28" fill="#fef9c3" stroke="#ca8a04" stroke-width="1.2" rx="4"/>
    <text x="120" y="19" text-anchor="middle" font-weight="700" fill="#713f12">Step 2: Penumbra Estimate</text>

    <!-- Cross-section diagram -->
    <!-- Light source at top -->
    <rect x="95" y="44" width="50" height="30" rx="6" fill="#fef3c7" stroke="#a16207" stroke-width="1.5"/>
    <text x="120" y="63" text-anchor="middle" font-size="10" font-weight="700" fill="#713f12">light</text>

    <!-- Light rays -->
    <g stroke="#fbbf24" stroke-width="1" stroke-dasharray="3,2" opacity="0.5">
      <line x1="100" y1="78" x2="40"  y2="180"/>
      <line x1="120" y1="78" x2="120" y2="180"/>
      <line x1="140" y1="78" x2="200" y2="180"/>
    </g>

    <!-- Occluder (blocker) -->
    <rect x="80" y="100" width="80" height="24" fill="#475569" stroke="#1f2937" stroke-width="1.2"/>
    <text x="120" y="116" text-anchor="middle" font-size="10" fill="#f3f4f6" font-weight="600">occluder</text>

    <!-- Receiver surface -->
    <rect x="20" y="170" width="200" height="20" fill="#64748b" stroke="#1f2937" stroke-width="1"/>
    <text x="120" y="184" text-anchor="middle" font-size="10" fill="#e5e7eb">receiver (surface point)</text>

    <!-- Distance annotation (vertical double arrow between occluder and receiver) -->
    <line x1="210" y1="124" x2="228" y2="124" stroke="#dc2626" stroke-width="1.2"/>
    <line x1="228" y1="124" x2="228" y2="170" stroke="#dc2626" stroke-width="1.2"/>
    <line x1="210" y1="170" x2="228" y2="170" stroke="#dc2626" stroke-width="1.2"/>
    <text x="234" y="151" font-size="10" fill="#dc2626" font-weight="600">dₒcₒ·</text>

    <!-- Penumbra annotation at ground level -->
    <line x1="20" y1="196" x2="120" y2="196" stroke="#2563eb" stroke-width="2"/>
    <line x1="120" y1="196" x2="220" y2="196" stroke="#2563eb" stroke-width="2"/>
    <line x1="20" y1="202" x2="20" y2="192" stroke="#2563eb" stroke-width="1.5"/>
    <line x1="220" y1="202" x2="220" y2="192" stroke="#2563eb" stroke-width="1.5"/>
    <text x="70" y="210" text-anchor="middle" font-size="10" fill="#2563eb" font-weight="600">fully lit</text>
    <text x="170" y="210" text-anchor="middle" font-size="10" fill="#2563eb" font-weight="600">penumbra</text>

    <!-- Formula -->
    <rect x="0" y="228" width="240" height="60" fill="#f9fafb" stroke="#d1d5db" stroke-width="1" rx="4"/>
    <g font-family="ui-monospace, Consolas, monospace" font-size="11" fill="#374151" transform="translate(12, 242)">
      <text x="0" y="0">penumbra_world = min(</text>
      <text x="0" y="18">  shadowSoftness * dₒcₒ,</text>
      <text x="0" y="36">  KERNEL_MAX_WORLD)</text>
    </g>

    <!-- Convert to texels -->
    <rect x="0" y="302" width="240" height="50" fill="#f9fafb" stroke="#d1d5db" stroke-width="1" rx="4"/>
    <g font-family="ui-monospace, Consolas, monospace" font-size="11" fill="#374151" transform="translate(12, 312)">
      <text x="0" y="0">// Convert to per-cascade texels</text>
      <text x="0" y="18">kernel = clamp(penumbra /</text>
      <text x="0" y="36">  texel_world, 1.0, 16.0)</text>
    </g>
  </g>

  <!-- Arrow 2→3 -->
  <g stroke="#374151" stroke-width="1.6" fill="none">
    <line x1="580" y1="160" x2="600" y2="160" marker-end="url(#pcArr)"/>
  </g>

  <!-- ===== COLUMN 3: Variable-Kernel PCF ===== -->
  <g transform="translate(610, 56)">
    <!-- Step badge -->
    <rect x="0" y="0" width="270" height="28" fill="#dcfce7" stroke="#15803d" stroke-width="1.2" rx="4"/>
    <text x="135" y="19" text-anchor="middle" font-weight="700" fill="#14532d">Step 3: Variable-Kernel PCF</text>

    <!-- Shadow map grid (smaller: 5×5 cells, 26px each = 130×130) -->
    <rect x="70" y="42" width="130" height="130" fill="#f3f4f6" stroke="#9ca3af" stroke-width="1.2"/>
    <g stroke="#d1d5db" stroke-width="0.5">
      <line x1="96"  y1="42" x2="96"  y2="172"/>
      <line x1="122" y1="42" x2="122" y2="172"/>
      <line x1="148" y1="42" x2="148" y2="172"/>
      <line x1="174" y1="42" x2="174" y2="172"/>
      <line x1="70"  y1="68" x2="200" y2="68"/>
      <line x1="70"  y1="94" x2="200" y2="94"/>
      <line x1="70"  y1="120" x2="200" y2="120"/>
      <line x1="70"  y1="146" x2="200" y2="146"/>
    </g>

    <!-- Depth gradient -->
    <rect x="70" y="42" width="26" height="26" fill="#0f172a" opacity="0.35"/>
    <rect x="96" y="42" width="26" height="26" fill="#1e293b" opacity="0.3"/>
    <rect x="70" y="68" width="26" height="26" fill="#1e293b" opacity="0.3"/>
    <rect x="96" y="68" width="26" height="26" fill="#334155" opacity="0.25"/>
    <rect x="122" y="42" width="26" height="26" fill="#334155" opacity="0.25"/>
    <rect x="148" y="42" width="26" height="26" fill="#475569" opacity="0.2"/>
    <rect x="70" y="94" width="26" height="26" fill="#334155" opacity="0.2"/>
    <rect x="96" y="94" width="26" height="26" fill="#475569" opacity="0.15"/>
    <rect x="122" y="68" width="26" height="26" fill="#475569" opacity="0.2"/>
    <rect x="148" y="68" width="26" height="26" fill="#64748b" opacity="0.15"/>

    <!-- Variable kernel circle (radius proportional to penumbra) -->
    <circle cx="135" cy="107" r="50" fill="none" stroke="#15803d" stroke-width="1.6" stroke-dasharray="4,3"/>
    <text x="135" y="50" text-anchor="middle" font-size="10" font-weight="700" fill="#15803d">kernel radius = penumbra</text>

    <!-- Fragment marker -->
    <circle cx="135" cy="107" r="4" fill="#15803d"/>

    <!-- Poisson disk samples inside the kernel (16 taps) -->
    <!-- Lit (upper region) -->
    <g fill="#86efac" stroke="#14532d" stroke-width="0.6">
      <circle cx="108" cy="72"  r="3.5"/>
      <circle cx="142" cy="80"  r="3.5"/>
      <circle cx="164" cy="90"  r="3.5"/>
      <circle cx="98"  cy="96"  r="3.5"/>
      <circle cx="120" cy="92"  r="3.5"/>
      <circle cx="155" cy="104" r="3.5"/>
      <circle cx="90"  cy="118" r="3.5"/>
      <circle cx="110" cy="112" r="3.5"/>
    </g>
    <!-- Shadowed (lower region) -->
    <g fill="#14532d" stroke="#86efac" stroke-width="0.6">
      <circle cx="130" cy="124" r="3.5"/>
      <circle cx="155" cy="130" r="3.5"/>
      <circle cx="170" cy="126" r="3.5"/>
      <circle cx="105" cy="140" r="3.5"/>
      <circle cx="124" cy="141" r="3.5"/>
      <circle cx="142" cy="142" r="3.5"/>
      <circle cx="160" cy="150" r="3.5"/>
      <circle cx="95"  cy="128" r="3.5"/>
    </g>

    <text x="135" y="196" text-anchor="middle" font-size="11" font-style="italic" fill="#6b7280">PCF with 16-tap Poisson disk</text>
    <text x="135" y="212" text-anchor="middle" font-size="11" fill="#374151">kernel scaled by penumbra estimate</text>

    <!-- Code snippet -->
    <rect x="0" y="228" width="270" height="68" fill="#f9fafb" stroke="#d1d5db" stroke-width="1" rx="4"/>
    <g font-family="ui-monospace, Consolas, monospace" font-size="10" fill="#374151" transform="translate(10, 240)">
      <text x="0" y="0">let kernel = penumbra / texel_world;</text>
      <text x="0" y="16">for 16 taps with Poisson-disk:</text>
      <text x="0" y="32">  s += textureSampleCompare(</text>
      <text x="0" y="48">    shadowMap, cmp, uv+offset, depth)</text>
    </g>
  </g>

  <!-- ===== BOTTOM: summary ===== -->
  <g transform="translate(40, 430)">
    <rect width="840" height="52" fill="#f9fafb" stroke="#9ca3af" stroke-width="1" rx="6"/>
    <text x="14" y="22" font-weight="700" fill="#111827">Why PCSS?</text>
    <text x="14" y="40" font-size="12" fill="#374151">Shadows are sharper near the occluder and softer farther away. PCSS approximates this per-fragment — no fixed kernel radius can match it.</text>
  </g>
</svg>
