<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 920 500" font-family="system-ui, -apple-system, sans-serif" font-size="13">
  <rect width="920" height="500" fill="#ffffff"/>
  <text x="460" y="26" text-anchor="middle" font-size="16" font-weight="600" fill="#111827">Volumetric Clouds: Raymarch through 3D Noise</text>

  <defs>
    <marker id="rmArr" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="9" markerHeight="9" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#374151"/>
    </marker>
    <radialGradient id="cloudBlob1" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0%" stop-color="#f3f4f6" stop-opacity="0.95"/>
      <stop offset="100%" stop-color="#9ca3af" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="cloudBlob2" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0%" stop-color="#e5e7eb" stop-opacity="0.85"/>
      <stop offset="100%" stop-color="#9ca3af" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- ===== TOP: side view of camera ray through clouds ===== -->
  <g transform="translate(40, 60)">
    <text x="420" y="0" text-anchor="middle" font-weight="700" fill="#111827">View ray steps through the cloud volume</text>

    <!-- Sky background -->
    <rect x="0" y="14" width="840" height="180" fill="#1e3a8a"/>

    <!-- Cloud volume bounds (dashed) -->
    <rect x="180" y="40" width="540" height="100" fill="none" stroke="#94a3b8" stroke-width="1" stroke-dasharray="5,3"/>
    <text x="180" y="32" font-size="10" fill="#cbd5e1">cloud volume (3D noise)</text>

    <!-- Cloud blobs inside the volume -->
    <ellipse cx="280" cy="92" rx="60" ry="32" fill="url(#cloudBlob1)"/>
    <ellipse cx="380" cy="86" rx="80" ry="38" fill="url(#cloudBlob1)"/>
    <ellipse cx="500" cy="100" rx="70" ry="34" fill="url(#cloudBlob2)"/>
    <ellipse cx="630" cy="88" rx="60" ry="28" fill="url(#cloudBlob1)"/>

    <!-- Camera origin (left) -->
    <circle cx="20" cy="160" r="6" fill="#fef3c7" stroke="#fbbf24" stroke-width="1.4"/>
    <text x="20" y="180" text-anchor="middle" font-size="10" fill="#fde68a">camera</text>

    <!-- Ray: 14 sample points stepping forward into the volume -->
    <line x1="20" y1="160" x2="780" y2="60" stroke="#fbbf24" stroke-width="1.4" opacity="0.6" stroke-dasharray="3,3"/>
    <line x1="20" y1="160" x2="780" y2="60" stroke="#fbbf24" stroke-width="1.4" opacity="0.6" marker-end="url(#rmArr)"/>

    <!-- Sample dots — first 4 outside cloud (low density, hollow), then dense inside -->
    <g>
      <!-- Outside / before cloud -->
      <circle cx="80"  cy="152" r="3" fill="#1e3a8a" stroke="#fde68a" stroke-width="1"/>
      <circle cx="140" cy="144" r="3" fill="#1e3a8a" stroke="#fde68a" stroke-width="1"/>

      <!-- In cloud (filled, growing as density grows) -->
      <circle cx="200" cy="136" r="3.5" fill="#fde68a"/>
      <circle cx="260" cy="128" r="4.5" fill="#fde68a"/>
      <circle cx="320" cy="120" r="5.5" fill="#fbbf24"/>
      <circle cx="380" cy="112" r="6"   fill="#fbbf24"/>
      <circle cx="440" cy="104" r="5"   fill="#fbbf24"/>
      <circle cx="500" cy="96"  r="6"   fill="#dc2626"/>
      <circle cx="560" cy="88"  r="5.5" fill="#fbbf24"/>
      <circle cx="620" cy="80"  r="5"   fill="#fbbf24"/>
      <circle cx="680" cy="72"  r="3.5" fill="#fde68a"/>
      <circle cx="740" cy="64"  r="3"   fill="#fde68a"/>
    </g>

    <!-- Step interval indicator -->
    <g transform="translate(560, 162)">
      <line x1="0" y1="0" x2="60" y2="0" stroke="#cbd5e1" stroke-width="1"/>
      <line x1="0" y1="-4" x2="0" y2="4" stroke="#cbd5e1" stroke-width="1"/>
      <line x1="60" y1="-4" x2="60" y2="4" stroke="#cbd5e1" stroke-width="1"/>
      <text x="30" y="14" text-anchor="middle" font-size="10" fill="#cbd5e1">step Δt</text>
    </g>

    <!-- Caption -->
    <text x="420" y="216" text-anchor="middle" font-size="11" font-style="italic" fill="#6b7280">at each step: sample density, accumulate color × transmittance</text>
  </g>

  <!-- ===== BOTTOM-LEFT: density per step bar chart ===== -->
  <g transform="translate(40, 300)">
    <text x="200" y="0" text-anchor="middle" font-weight="700" fill="#111827">Density per step</text>

    <rect x="0" y="14" width="400" height="120" fill="#f9fafb" stroke="#9ca3af" stroke-width="1"/>

    <!-- Baseline -->
    <line x1="14" y1="120" x2="386" y2="120" stroke="#9ca3af" stroke-width="0.8"/>

    <!-- Bars: 12 columns, width 26, gap 4. Heights mirror the dot sizes above. -->
    <g fill="#3b82f6" stroke="#1e3a8a" stroke-width="0.6">
      <rect x="20"  y="116" width="26" height="4"/>
      <rect x="50"  y="112" width="26" height="8"/>
      <rect x="80"  y="98"  width="26" height="22"/>
      <rect x="110" y="84"  width="26" height="36"/>
      <rect x="140" y="68"  width="26" height="52"/>
      <rect x="170" y="58"  width="26" height="62"/>
      <rect x="200" y="64"  width="26" height="56"/>
      <rect x="230" y="46"  width="26" height="74"/>
      <rect x="260" y="58"  width="26" height="62"/>
      <rect x="290" y="68"  width="26" height="52"/>
      <rect x="320" y="92"  width="26" height="28"/>
      <rect x="350" y="108" width="26" height="12"/>
    </g>

    <text x="200" y="152" text-anchor="middle" font-size="11" font-style="italic" fill="#6b7280">density = smoothstep(threshold, 1, octaveSum)</text>
  </g>

  <!-- ===== BOTTOM-RIGHT: transmittance curve ===== -->
  <g transform="translate(480, 300)">
    <text x="200" y="0" text-anchor="middle" font-weight="700" fill="#111827">Transmittance T (1 → 0)</text>

    <rect x="0" y="14" width="400" height="120" fill="#f9fafb" stroke="#9ca3af" stroke-width="1"/>

    <!-- Axes -->
    <line x1="14" y1="120" x2="386" y2="120" stroke="#9ca3af" stroke-width="0.8"/>
    <line x1="14" y1="20"  x2="14"  y2="120" stroke="#9ca3af" stroke-width="0.8"/>

    <!-- Y axis label -->
    <text x="6" y="22"   text-anchor="end" font-size="10" font-family="ui-monospace, Consolas, monospace" fill="#6b7280">1</text>
    <text x="6" y="120"  text-anchor="end" font-size="10" font-family="ui-monospace, Consolas, monospace" fill="#6b7280">0</text>

    <!-- T = exp(−Σ density·Δt) — drops slowly outside cloud, fast inside -->
    <path d="M 14 24 L 50 26 L 80 30 L 110 38 L 140 54 L 170 76 L 200 92 L 230 104 L 260 112 L 290 116 L 320 118 L 350 119 L 386 120"
          fill="none" stroke="#dc2626" stroke-width="2.4"/>

    <!-- Annotation: light gets blocked once density takes over -->
    <text x="240" y="50" font-size="10" fill="#7f1d1d" font-style="italic">T → 0:</text>
    <text x="240" y="64" font-size="10" fill="#7f1d1d" font-style="italic">opaque cloud,</text>
    <text x="240" y="78" font-size="10" fill="#7f1d1d" font-style="italic">stop marching</text>

    <text x="200" y="152" text-anchor="middle" font-size="11" font-style="italic" fill="#6b7280">color += T · cloudColor · density · Δt   then   T *= exp(−density·Δt)</text>
  </g>
</svg>
