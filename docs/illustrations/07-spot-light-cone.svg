<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 440" font-family="system-ui, -apple-system, sans-serif" font-size="13">
  <rect width="880" height="440" fill="#ffffff"/>
  <text x="440" y="26" text-anchor="middle" font-size="16" font-weight="600" fill="#111827">Spot Light: Inner / Outer Cone &amp; Smoothstep Falloff</text>

  <!-- ===== LEFT: cone geometry ===== -->
  <g transform="translate(40, 70)">
    <text x="180" y="0" text-anchor="middle" font-weight="700" fill="#111827">Two cone angles</text>

    <!-- Spot light fixture at top center -->
    <g transform="translate(180, 50)">
      <polygon points="-18,-14 18,-14 22,4 -22,4" fill="#ddd6fe" stroke="#7c3aed" stroke-width="1.5"/>
      <ellipse cx="0" cy="6" rx="18" ry="5" fill="#fef3c7" stroke="#7c3aed" stroke-width="1.2"/>
    </g>

    <!-- Outer cone (faded purple) -->
    <polygon points="180,62 320,302 40,302" fill="#ddd6fe" stroke="#7c3aed" stroke-width="1.4" stroke-dasharray="4,3" opacity="0.55"/>

    <!-- Inner cone (solid bright purple) -->
    <polygon points="180,62 252,302 108,302" fill="#a78bfa" stroke="#7c3aed" stroke-width="1.6" opacity="0.85"/>

    <!-- Light direction axis -->
    <line x1="180" y1="62" x2="180" y2="302" stroke="#374151" stroke-width="1.2" stroke-dasharray="3,2"/>
    <text x="186" y="186" font-size="11" fill="#374151" font-style="italic">direction</text>

    <!-- Inner angle arc -->
    <path d="M 180,108 A 46,46 0 0 0 162,142" fill="none" stroke="#16a34a" stroke-width="1.6"/>
    <text x="148" y="120" text-anchor="end" font-size="11" font-weight="700" fill="#16a34a">θ_inner</text>

    <!-- Outer angle arc — drawn larger -->
    <path d="M 180,158 A 96,96 0 0 0 132,228" fill="none" stroke="#dc2626" stroke-width="1.6"/>
    <text x="118" y="156" text-anchor="end" font-size="11" font-weight="700" fill="#dc2626">θ_outer</text>

    <!-- Ground -->
    <line x1="20" y1="316" x2="340" y2="316" stroke="#374151" stroke-width="2"/>
    <g stroke="#9ca3af" stroke-width="0.8">
      <line x1="40"  y1="316" x2="60"  y2="334"/>
      <line x1="80"  y1="316" x2="100" y2="334"/>
      <line x1="120" y1="316" x2="140" y2="334"/>
      <line x1="160" y1="316" x2="180" y2="334"/>
      <line x1="200" y1="316" x2="220" y2="334"/>
      <line x1="240" y1="316" x2="260" y2="334"/>
      <line x1="280" y1="316" x2="300" y2="334"/>
    </g>

    <!-- Region labels OUTSIDE the cones (below the ground) -->
    <text x="180" y="354" text-anchor="middle" font-size="11" font-weight="600" fill="#7c3aed">full bright</text>
    <text x="60"  y="354" text-anchor="middle" font-size="11" font-weight="600" fill="#7c3aed">falloff</text>
    <text x="300" y="354" text-anchor="middle" font-size="11" font-weight="600" fill="#7c3aed">falloff</text>
  </g>

  <!-- ===== RIGHT: smoothstep falloff plot ===== -->
  <g transform="translate(460, 70)">
    <text x="200" y="0" text-anchor="middle" font-weight="700" fill="#111827">Falloff: smoothstep(cosOuter, cosInner, cos θ)</text>

    <!-- Plot area: x from 30 to 380 (350 wide), y from 40 to 240 (200 tall) -->
    <!-- X: cos angle, range cos(outer) to cos(inner). Use 0..1 mapped to plot -->
    <!-- Mark cos(outer)=0 at x=30, cos(inner)=1 at x=380 -->

    <!-- Grid -->
    <g stroke="#e5e7eb" stroke-width="1">
      <line x1="30"  y1="240" x2="380" y2="240"/> <!-- y=0 -->
      <line x1="30"  y1="190" x2="380" y2="190"/> <!-- y=0.25 -->
      <line x1="30"  y1="140" x2="380" y2="140"/> <!-- y=0.5 -->
      <line x1="30"  y1="90"  x2="380" y2="90"/>  <!-- y=0.75 -->
      <line x1="30"  y1="40"  x2="380" y2="40"/>  <!-- y=1 -->

      <line x1="30"  y1="40" x2="30"  y2="240"/>
      <line x1="120" y1="40" x2="120" y2="240"/>
      <line x1="205" y1="40" x2="205" y2="240"/>
      <line x1="295" y1="40" x2="295" y2="240"/>
      <line x1="380" y1="40" x2="380" y2="240"/>
    </g>

    <!-- Axes -->
    <line x1="30" y1="240" x2="380" y2="240" stroke="#374151" stroke-width="1.5"/>
    <line x1="30" y1="40"  x2="30"  y2="240" stroke="#374151" stroke-width="1.5"/>

    <!-- Y labels -->
    <g font-size="10" fill="#6b7280" text-anchor="end">
      <text x="24" y="244">0</text>
      <text x="24" y="44">1</text>
      <text x="-160" y="14" transform="rotate(-90, -160, 14)" text-anchor="middle" font-style="italic" font-size="11">spot factor</text>
    </g>

    <!-- Vertical reference lines for cos(outer) and cos(inner) -->
    <line x1="80"  y1="40" x2="80"  y2="240" stroke="#dc2626" stroke-width="1.4" stroke-dasharray="4,3"/>
    <line x1="320" y1="40" x2="320" y2="240" stroke="#16a34a" stroke-width="1.4" stroke-dasharray="4,3"/>

    <!-- Smoothstep curve: 0 below x=80, smooth rise to 1 by x=320 -->
    <!-- 5 sample points along smoothstep -->
    <!-- t = (x-80)/240; y = t² * (3-2t); y_pix = 240 - 200*y -->
    <!-- t=0 → y=0 → (80, 240)
         t=0.25 → y=0.156 → (140, 209)
         t=0.5 → y=0.5 → (200, 140)
         t=0.75 → y=0.844 → (260, 71)
         t=1 → y=1 → (320, 40) -->

    <path d="M 30,240 L 80,240 C 110,238 130,222 200,140 C 270,58 290,42 320,40 L 380,40"
          fill="none" stroke="#7c3aed" stroke-width="2.8"/>

    <!-- Axis labels for the two reference lines (placed BELOW the plot, away from the curve) -->
    <text x="80"  y="258" text-anchor="middle" font-size="11" font-weight="700" fill="#dc2626">cos(θ_outer)</text>
    <text x="320" y="258" text-anchor="middle" font-size="11" font-weight="700" fill="#16a34a">cos(θ_inner)</text>

    <!-- X axis title -->
    <text x="205" y="282" text-anchor="middle" font-size="11" font-style="italic" fill="#6b7280">cos(angle from spot direction)</text>

    <!-- Labels above the plot for the regions (placed in the grid area, away from the curve where curve is flat) -->
    <text x="50"  y="60" font-size="10" fill="#dc2626" text-anchor="middle" font-style="italic">outside</text>
    <text x="50"  y="74" font-size="10" fill="#dc2626" text-anchor="middle" font-style="italic">(0)</text>
    <text x="350" y="60" font-size="10" fill="#16a34a" text-anchor="middle" font-style="italic">inside inner</text>
    <text x="350" y="74" font-size="10" fill="#16a34a" text-anchor="middle" font-style="italic">(1)</text>
  </g>

  <!-- Bottom note -->
  <g transform="translate(40, 388)">
    <rect width="800" height="40" fill="#f9fafb" stroke="#9ca3af" stroke-width="1" rx="4"/>
    <text x="14" y="18" font-size="11" font-family="ui-monospace, Consolas, monospace" fill="#374151">spotFactor = smoothstep(cos(outer), cos(inner), dot(spotDir, toLight))</text>
    <text x="14" y="32" font-size="11" font-style="italic" fill="#6b7280">Multiplied by the standard 1/r² distance attenuation to give the final intensity.</text>
  </g>
</svg>
