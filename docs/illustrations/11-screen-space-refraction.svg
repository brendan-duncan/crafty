<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 360" font-family="system-ui, -apple-system, sans-serif" font-size="13">
  <rect width="800" height="360" fill="#ffffff"/>
  <text x="400" y="28" text-anchor="middle" font-size="16" font-weight="600" fill="#111827">Screen-Space Refraction: UV Distortion</text>

  <!-- ===== TOP: Pipeline Overview ===== -->
  <g transform="translate(30, 50)">
    <!-- Step 1: Render scene -->
    <g>
      <rect x="0" y="0" width="165" height="70" fill="#fef3c7" stroke="#f59e0b" stroke-width="1.4" rx="4"/>
      <text x="12" y="16" font-weight="600" fill="#92400e" font-size="11">1. Render Full Scene</text>
      <text x="12" y="32" font-size="9" fill="#b45309">Deferred lighting + opaque geometry</text>
      <text x="12" y="44" font-size="9" fill="#b45309">writes to HDR texture</text>
      <text x="12" y="58" font-size="8.5" font-family="ui-monospace, Consolas, monospace" fill="#92400e">hdrTexture (RGBA16F)</text>
    </g>
    
    <!-- Arrow to step 2 -->
    <g stroke="#6b7280" stroke-width="1.5" fill="none" transform="translate(173, 35)">
      <line x1="0" y1="0" x2="20" y2="0"/>
      <path d="M 20 0 L 14 -4 M 20 0 L 14 4"/>
    </g>
    
    <!-- Step 2: Copy to refractionTex BEFORE water -->
    <g transform="translate(201, 0)">
      <rect x="0" y="0" width="188" height="70" fill="#dbeafe" stroke="#3b82f6" stroke-width="1.4" rx="4"/>
      <text x="12" y="16" font-weight="600" fill="#1e40af" font-size="11">2. Copy → refractionTex</text>
      <text x="12" y="32" font-size="9" fill="#1e3a8a">Copy HDR texture BEFORE rendering</text>
      <text x="12" y="44" font-size="9" fill="#1e3a8a">water — this is "underwater" scene</text>
      <text x="12" y="58" font-size="8.5" font-family="ui-monospace, Consolas, monospace" fill="#3730a3">copyTextureToTexture(hdr, refraction)</text>
    </g>
    
    <!-- Arrow to step 3 -->
    <g stroke="#6b7280" stroke-width="1.5" fill="none" transform="translate(389, 35)">
      <line x1="0" y1="0" x2="20" y2="0"/>
      <path d="M 20 0 L 14 -4 M 20 0 L 14 4"/>
    </g>
    
    <!-- Step 3: Water pass samples with distorted UV -->
    <g transform="translate(417, 0)">
      <rect x="0" y="0" width="190" height="70" fill="#ecfdf5" stroke="#10b981" stroke-width="1.4" rx="4"/>
      <text x="12" y="16" font-weight="600" fill="#065f46" font-size="11">3. Water Pass: Sample with DUDV</text>
      <text x="12" y="32" font-size="9" fill="#047857">DUDV map distorts screen UV</text>
      <text x="12" y="44" font-size="9" fill="#047857">Sample refractionTex at distorted UV</text>
      <text x="12" y="58" font-size="8.5" font-family="ui-monospace, Consolas, monospace" fill="#065f46">ref_uv = screen_uv + distortion</text>
    </g>
  </g>

  <!-- ===== BOTTOM: Visual Example ===== -->
  <g transform="translate(30, 140)">
    <text x="365" y="0" text-anchor="middle" font-weight="700" fill="#6b21a8">UV Distortion Visual</text>
    
    <!-- LEFT: Original UV (undistorted) -->
    <g>
      <rect x="0" y="15" width="220" height="160" fill="#fafafa" stroke="#9ca3af" stroke-width="1.2" rx="4"/>
      <text x="110" y="32" text-anchor="middle" font-weight="600" fill="#374151" font-size="11">Undistorted UV (screen_uv)</text>
      
      <!-- Grid representing screen UV -->
      <g stroke="#d1d5db" stroke-width="0.8" transform="translate(10, 45)">
        <line x1="0" y1="0" x2="200" y2="0"/>
        <line x1="0" y1="35" x2="200" y2="35"/>
        <line x1="0" y1="70" x2="200" y2="70"/>
        <line x1="0" y1="105" x2="200" y2="105"/>
        <line x1="0" y1="0" x2="0" y2="105"/>
        <line x1="50" y1="0" x2="50" y2="105"/>
        <line x1="100" y1="0" x2="100" y2="105"/>
        <line x1="150" y1="0" x2="150" y2="105"/>
        <line x1="200" y1="0" x2="200" y2="105"/>
      </g>
      
      <!-- A pixel's UV -->
      <g transform="translate(10, 45)">
        <rect x="90" y="30" width="20" height="40" fill="#3b82f6" fill-opacity="0.3" stroke="#1d4ed8" stroke-width="1.5"/>
        <text x="100" y="22" text-anchor="middle" font-size="8" fill="#1d4ed8">fragment UV</text>
      </g>
      
      <text x="110" y="150" text-anchor="middle" font-size="9" fill="#374151">Samples directly from refractionTex</text>
    </g>
    
    <!-- Arrow -->
    <g stroke="#6b7280" stroke-width="1.5" fill="none" transform="translate(240, 100)">
      <line x1="0" y1="0" x2="30" y2="0"/>
      <path d="M 30 0 L 24 -4 M 30 0 L 24 4"/>
    </g>
    <text x="255" y="85" text-anchor="middle" font-size="9" fill="#6b21a8">+ DUDV</text>
    
    <!-- RIGHT: Distorted UV -->
    <g transform="translate(290, 0)">
      <rect x="0" y="15" width="220" height="160" fill="#faf5ff" stroke="#a78bfa" stroke-width="1.2" rx="4"/>
      <text x="110" y="32" text-anchor="middle" font-weight="600" fill="#6b21a8" font-size="11">Distorted UV (screen_uv + DUDV)</text>
      
      <!-- Wavy grid -->
      <g stroke="#c4b5fd" stroke-width="0.8" transform="translate(10, 45)">
        <path d="M 0 0 Q 50 5, 100 0 T 200 0"/>
        <path d="M 0 35 Q 50 30, 100 35 T 200 35"/>
        <path d="M 0 70 Q 50 75, 100 70 T 200 70"/>
        <path d="M 0 105 Q 50 100, 100 105 T 200 105"/>
        <path d="M 0 0 Q 5 50, 0 105"/>
        <path d="M 50 0 Q 45 50, 50 105"/>
        <path d="M 100 0 Q 105 50, 100 105"/>
        <path d="M 150 0 Q 145 50, 150 105"/>
        <path d="M 200 0 Q 205 50, 200 105"/>
      </g>
      
      <!-- Same pixel, shifted UV -->
      <g transform="translate(10, 45)">
        <rect x="90" y="30" width="20" height="40" fill="none" stroke="#6b7280" stroke-width="1" stroke-dasharray="3,2"/>
        <text x="100" y="22" text-anchor="middle" font-size="8" fill="#6b7280">original</text>
        
        <rect x="102" y="42" width="20" height="40" fill="#3b82f6" fill-opacity="0.3" stroke="#8b5cf6" stroke-width="1.5"/>
        <text x="112" y="34" text-anchor="middle" font-size="8" fill="#7c3aed">distorted</text>
      </g>
      
      <text x="110" y="160" text-anchor="middle" font-size="9" fill="#6b21a8">Samples different pixel = refraction!</text>
    </g>
  </g>

  <!-- ===== BOTTOM: DUDV 2-pass explanation ===== -->
  <g transform="translate(30, 315)">
    <rect width="740" height="32" fill="#f0f9ff" stroke="#0ea5e9" stroke-width="1" rx="4"/>
    <text x="16" y="21" font-size="9.5" fill="#0369a1">
      <tspan font-weight="600">2-pass DUDV:</tspan>
      <tspan>  d1 = sample(dudv, base_uv + (time*0.02, 0))  ·  d2_uv = d1 + (d1.x, d1.y + time*0.02)  ·  distortion = (sample(dudv, d2_uv).rg*2-1) * 0.02</tspan>
    </text>
  </g>
</svg>
