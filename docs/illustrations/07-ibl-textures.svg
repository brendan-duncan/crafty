<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 920 480" font-family="system-ui, -apple-system, sans-serif" font-size="13">
  <rect width="920" height="480" fill="#ffffff"/>
  <text x="460" y="26" text-anchor="middle" font-size="16" font-weight="600" fill="#111827">Image-Based Lighting: Three Precomputed Textures</text>

  <defs>
    <marker id="ibArr" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="9" markerHeight="9" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#374151"/>
    </marker>

    <!-- Sky cubemap (very colorful) -->
    <linearGradient id="ibSky" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#fef3c7"/>
      <stop offset="50%" stop-color="#7dd3fc"/>
      <stop offset="100%" stop-color="#1e3a8a"/>
    </linearGradient>

    <!-- Irradiance map (very blurred = soft gradient) -->
    <radialGradient id="ibIrradiance" cx="0.5" cy="0.4" r="0.7">
      <stop offset="0%" stop-color="#fde68a"/>
      <stop offset="100%" stop-color="#3b82f6"/>
    </radialGradient>

    <!-- Prefilter mip levels: progressively blurrier -->
    <linearGradient id="ibPre0" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#fef3c7"/>
      <stop offset="50%" stop-color="#7dd3fc"/>
      <stop offset="100%" stop-color="#1e3a8a"/>
    </linearGradient>
    <linearGradient id="ibPre1" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#fde68a"/>
      <stop offset="100%" stop-color="#3b82f6"/>
    </linearGradient>

    <!-- BRDF LUT: 2D texture, R=scale, G=bias. Use a green/red gradient -->
    <linearGradient id="ibLut" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#dc2626"/>
      <stop offset="50%" stop-color="#fbbf24"/>
      <stop offset="100%" stop-color="#16a34a"/>
    </linearGradient>
  </defs>

  <!-- ===== TOP ROW: source HDR sky cubemap ===== -->
  <g transform="translate(360, 60)">
    <text x="100" y="0" text-anchor="middle" font-weight="700" fill="#111827">HDR sky cubemap (source)</text>
    <rect x="0" y="14" width="200" height="60" fill="url(#ibSky)" stroke="#374151" stroke-width="1.5"/>
    <text x="100" y="92" text-anchor="middle" font-size="11" font-style="italic" fill="#6b7280">captured/baked once at startup</text>
  </g>

  <!-- Three branching arrows from the sky to the three derived textures -->
  <g stroke="#374151" stroke-width="1.5" fill="none">
    <path d="M 410,160 C 410,180, 180,180, 180,200" marker-end="url(#ibArr)"/>
    <path d="M 460,160 C 460,180, 460,180, 460,200" marker-end="url(#ibArr)"/>
    <path d="M 510,160 C 510,180, 740,180, 740,200" marker-end="url(#ibArr)"/>
  </g>

  <!-- ===== MIDDLE ROW: three derived textures ===== -->

  <!-- 1. Irradiance map -->
  <g transform="translate(60, 200)">
    <text x="120" y="0" text-anchor="middle" font-weight="700" fill="#1e40af">Irradiance map</text>
    <text x="120" y="16" text-anchor="middle" font-size="11" font-style="italic" fill="#1e40af">heavily blurred — diffuse</text>

    <rect x="40" y="28" width="160" height="100" fill="url(#ibIrradiance)" stroke="#1e40af" stroke-width="1.4"/>

    <!-- Sample expression below -->
    <text x="120" y="148" text-anchor="middle" font-size="11" font-family="ui-monospace, Consolas, monospace" fill="#374151">sample by N̂</text>

    <!-- Description below sample -->
    <g transform="translate(0, 168)" font-size="11" fill="#6b7280" font-style="italic" text-anchor="middle">
      <text x="120" y="0">low-frequency lighting from</text>
      <text x="120" y="14">the entire hemisphere</text>
    </g>
  </g>

  <!-- 2. Prefilter mip chain -->
  <g transform="translate(340, 200)">
    <text x="120" y="0" text-anchor="middle" font-weight="700" fill="#7c3aed">Prefilter map</text>
    <text x="120" y="16" text-anchor="middle" font-size="11" font-style="italic" fill="#7c3aed">mipmapped — specular</text>

    <!-- Five mip thumbnails of decreasing size, stacked left-to-right -->
    <!-- Each level is more blurred = simpler gradient. Sizes: 80, 56, 40, 28, 20 -->
    <!-- Centered vertically around y=78 -->
    <g>
      <rect x="14" y="38" width="80" height="80" fill="url(#ibPre0)" stroke="#7c3aed" stroke-width="1.2"/>
      <rect x="100" y="50" width="56" height="56" fill="url(#ibPre1)" stroke="#7c3aed" stroke-width="1.2"/>
      <rect x="162" y="58" width="40" height="40" fill="url(#ibIrradiance)" stroke="#7c3aed" stroke-width="1.2"/>
      <rect x="208" y="64" width="28" height="28" fill="url(#ibIrradiance)" stroke="#7c3aed" stroke-width="1.2"/>
      <rect x="240" y="68" width="20" height="20" fill="url(#ibIrradiance)" stroke="#7c3aed" stroke-width="1.2"/>
    </g>

    <!-- Mip labels (above the rectangles to avoid covering them) -->
    <g font-size="10" fill="#7c3aed" text-anchor="middle">
      <text x="54"  y="32">mip 0</text>
      <text x="128" y="32">mip 1</text>
      <text x="182" y="32">mip 2</text>
      <text x="222" y="32">mip 3</text>
      <text x="250" y="32">mip 4</text>
    </g>

    <!-- Roughness scale below -->
    <line x1="14" y1="132" x2="260" y2="132" stroke="#374151" stroke-width="1"/>
    <text x="14"  y="148" font-size="10" fill="#374151">smooth (rough=0)</text>
    <text x="260" y="148" text-anchor="end" font-size="10" fill="#374151">rough (rough=1)</text>

    <text x="120" y="168" text-anchor="middle" font-size="11" font-family="ui-monospace, Consolas, monospace" fill="#374151">sample by R̂, mip = roughness</text>
  </g>

  <!-- 3. BRDF LUT -->
  <g transform="translate(700, 200)">
    <text x="100" y="0" text-anchor="middle" font-weight="700" fill="#9d174d">BRDF LUT (2D)</text>
    <text x="100" y="16" text-anchor="middle" font-size="11" font-style="italic" fill="#9d174d">Fresnel scale + bias</text>

    <rect x="40" y="28" width="120" height="120" fill="url(#ibLut)" stroke="#9d174d" stroke-width="1.4"/>

    <!-- Axis labels OUTSIDE the texture -->
    <text x="100" y="166" text-anchor="middle" font-size="11" font-family="ui-monospace, Consolas, monospace" fill="#374151">N · V →</text>
    <text x="32"  y="92"  text-anchor="end"    font-size="11" font-family="ui-monospace, Consolas, monospace" fill="#374151">rough ↑</text>

    <text x="100" y="186" text-anchor="middle" font-size="11" font-family="ui-monospace, Consolas, monospace" fill="#374151">→ (scale, bias)</text>
  </g>

  <!-- ===== BOTTOM: how they combine ===== -->
  <g transform="translate(40, 388)">
    <rect width="840" height="76" fill="#f9fafb" stroke="#9ca3af" stroke-width="1" rx="6"/>
    <text x="14" y="22" font-weight="700" fill="#111827">Final IBL contribution per fragment</text>

    <g font-family="ui-monospace, Consolas, monospace" font-size="12" fill="#374151" transform="translate(14, 0)">
      <text x="0" y="46">diffuseIBL  = <tspan fill="#1e40af">irradiance(N̂)</tspan> · albedo</text>
      <text x="0" y="64">specularIBL = <tspan fill="#7c3aed">prefilter(R̂, roughness)</tspan> · (F0 · <tspan fill="#9d174d">brdf.r</tspan> + <tspan fill="#9d174d">brdf.g</tspan>)</text>

      <text x="500" y="46">ibl = (1 − metallic) · diffuseIBL</text>
      <text x="500" y="64">    + specularIBL</text>
    </g>
  </g>
</svg>
