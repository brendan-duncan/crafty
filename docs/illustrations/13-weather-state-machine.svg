<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 920 480" font-family="system-ui, -apple-system, sans-serif" font-size="13">
  <rect width="920" height="480" fill="#ffffff"/>
  <text x="460" y="26" text-anchor="middle" font-size="16" font-weight="600" fill="#111827">Weather State Machine: 7 Types, Timer-Driven Transitions</text>

  <defs>
    <marker id="wsArr" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="9" markerHeight="9" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#374151"/>
    </marker>
  </defs>

  <!-- ===== TOP: 7 weather chips in a row, with weight bars ===== -->
  <g transform="translate(40, 60)">
    <text x="0" y="0" font-weight="700" fill="#111827">Seven weather types · selection weight shown below each</text>

    <!-- 7 chips, each 116 wide, gap 8. Total = 7*116 + 6*8 = 860. Spans x=0..860. -->
    <g font-size="11" text-anchor="middle">
      <!-- Sunny -->
      <rect x="0"   y="14" width="116" height="56" fill="#fef3c7" stroke="#ca8a04" stroke-width="1.4" rx="4"/>
      <text x="58"  y="36" font-weight="700" fill="#713f12">Sunny</text>
      <text x="58"  y="54" font-size="10" fill="#713f12">cov 0.10</text>

      <!-- Cloudy -->
      <rect x="124" y="14" width="116" height="56" fill="#e5e7eb" stroke="#6b7280" stroke-width="1.4" rx="4"/>
      <text x="182" y="36" font-weight="700" fill="#374151">Cloudy</text>
      <text x="182" y="54" font-size="10" fill="#374151">cov 0.55</text>

      <!-- Overcast -->
      <rect x="248" y="14" width="116" height="56" fill="#9ca3af" stroke="#374151" stroke-width="1.4" rx="4"/>
      <text x="306" y="36" font-weight="700" fill="#111827">Overcast</text>
      <text x="306" y="54" font-size="10" fill="#111827">cov 0.90</text>

      <!-- LightRain -->
      <rect x="372" y="14" width="116" height="56" fill="#bfdbfe" stroke="#2563eb" stroke-width="1.4" rx="4"/>
      <text x="430" y="36" font-weight="700" fill="#1e3a8a">LightRain</text>
      <text x="430" y="54" font-size="10" fill="#1e3a8a">cov 0.70</text>

      <!-- HeavyRain -->
      <rect x="496" y="14" width="116" height="56" fill="#60a5fa" stroke="#1e3a8a" stroke-width="1.4" rx="4"/>
      <text x="554" y="36" font-weight="700" fill="#fff">HeavyRain</text>
      <text x="554" y="54" font-size="10" fill="#fff">cov 0.90</text>

      <!-- LightSnow -->
      <rect x="620" y="14" width="116" height="56" fill="#e0f2fe" stroke="#0891b2" stroke-width="1.4" rx="4"/>
      <text x="678" y="36" font-weight="700" fill="#155e75">LightSnow</text>
      <text x="678" y="54" font-size="10" fill="#155e75">cov 0.80</text>

      <!-- HeavySnow -->
      <rect x="744" y="14" width="116" height="56" fill="#7dd3fc" stroke="#155e75" stroke-width="1.4" rx="4"/>
      <text x="802" y="36" font-weight="700" fill="#0c4a6e">HeavySnow</text>
      <text x="802" y="54" font-size="10" fill="#0c4a6e">cov 0.95</text>
    </g>

    <!-- Weight bars below chips (max weight 5 → bar height 40) -->
    <!-- Sunny=5, Cloudy=4, Overcast=2, LightRain=2, HeavyRain=1, LightSnow=2, HeavySnow=1 -->
    <g font-size="10" font-family="ui-monospace, Consolas, monospace" text-anchor="middle">
      <!-- baseline at y=130 (relative to group) -->
      <line x1="-4" y1="130" x2="864" y2="130" stroke="#9ca3af" stroke-width="0.6"/>

      <rect x="20"  y="90"  width="76" height="40" fill="#fde68a" stroke="#ca8a04"/><text x="58"  y="146" fill="#713f12">w 5</text>
      <rect x="144" y="98"  width="76" height="32" fill="#d1d5db" stroke="#6b7280"/><text x="182" y="146" fill="#374151">w 4</text>
      <rect x="268" y="114" width="76" height="16" fill="#d1d5db" stroke="#6b7280"/><text x="306" y="146" fill="#374151">w 2</text>
      <rect x="392" y="114" width="76" height="16" fill="#bfdbfe" stroke="#2563eb"/><text x="430" y="146" fill="#1e3a8a">w 2</text>
      <rect x="516" y="122" width="76" height="8"  fill="#60a5fa" stroke="#1e3a8a"/><text x="554" y="146" fill="#1e3a8a">w 1</text>
      <rect x="640" y="114" width="76" height="16" fill="#e0f2fe" stroke="#0891b2"/><text x="678" y="146" fill="#155e75">w 2</text>
      <rect x="764" y="122" width="76" height="8"  fill="#7dd3fc" stroke="#155e75"/><text x="802" y="146" fill="#0c4a6e">w 1</text>
    </g>
  </g>

  <!-- ===== MIDDLE: timer → pick → transition ===== -->
  <g transform="translate(40, 246)">
    <text x="0" y="0" font-weight="700" fill="#111827">Per-frame: timer counts down · on zero, roll a new weather from the biome's allowed set</text>

    <!-- Timer box -->
    <rect x="0" y="14" width="200" height="80" fill="#eff6ff" stroke="#2563eb" stroke-width="1.4" rx="6"/>
    <text x="100" y="38" text-anchor="middle" font-weight="700" fill="#1e3a8a">timer</text>
    <text x="100" y="56" text-anchor="middle" font-size="11" font-family="ui-monospace, Consolas, monospace" fill="#1e3a8a">timer −= dt</text>
    <text x="100" y="80" text-anchor="middle" font-size="10" font-style="italic" fill="#1e3a8a">reset to 30..120 s</text>

    <!-- Arrow timer → pick -->
    <line x1="200" y1="54" x2="240" y2="54" stroke="#374151" stroke-width="1.4" marker-end="url(#wsArr)"/>
    <text x="220" y="44" text-anchor="middle" font-size="10" fill="#374151">≤ 0</text>

    <!-- Pick box -->
    <rect x="240" y="14" width="280" height="80" fill="#fef3c7" stroke="#a16207" stroke-width="1.4" rx="6"/>
    <text x="380" y="36" text-anchor="middle" font-weight="700" fill="#713f12">pickRandomWeather(biome)</text>
    <text x="380" y="54" text-anchor="middle" font-size="11" fill="#713f12">cumulative of weights, roll r ∈ [0, total)</text>
    <text x="380" y="78" text-anchor="middle" font-size="10" font-style="italic" fill="#713f12">→ first w with cumulative &gt; r</text>

    <!-- Arrow pick → result -->
    <line x1="520" y1="54" x2="560" y2="54" stroke="#374151" stroke-width="1.4" marker-end="url(#wsArr)"/>

    <!-- Result box -->
    <rect x="560" y="14" width="300" height="80" fill="#ede9fe" stroke="#7c3aed" stroke-width="1.4" rx="6"/>
    <text x="710" y="36" text-anchor="middle" font-weight="700" fill="#4c1d95">apply transition</text>
    <text x="710" y="54" text-anchor="middle" font-size="11" fill="#4c1d95">if effect changes → rebuildRenderTargets()</text>
    <text x="710" y="74" text-anchor="middle" font-size="11" fill="#4c1d95">else if intensity changes → setSpawnRate()</text>
  </g>

  <!-- Loop-back arrow from result → timer (curved under) -->
  <path d="M 750 354 L 750 386 L 140 386 L 140 354" fill="none" stroke="#374151" stroke-width="1.4" marker-end="url(#wsArr)"/>
  <text x="446" y="380" text-anchor="middle" font-size="10" fill="#374151">↻ reset timer to 30..120 s, repeat</text>

  <!-- ===== Bottom note ===== -->
  <g transform="translate(40, 412)">
    <rect width="840" height="50" fill="#f9fafb" stroke="#9ca3af" stroke-width="1" rx="6"/>
    <text x="14" y="22" font-weight="700" fill="#111827">No fixed transition graph — every weather change is an independent biome-weighted draw</text>
    <text x="14" y="40" font-size="11" fill="#374151">Sunny → Sunny is allowed (and likely, since Sunny carries weight 5).</text>
  </g>
</svg>
