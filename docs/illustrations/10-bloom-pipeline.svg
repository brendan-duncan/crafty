<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 920 400" font-family="system-ui, -apple-system, sans-serif" font-size="13">
  <rect width="920" height="400" fill="#ffffff"/>
  <text x="460" y="26" text-anchor="middle" font-size="16" font-weight="600" fill="#111827">Bloom: Prefilter → Separable Blur → Composite</text>

  <defs>
    <marker id="bArr" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="9" markerHeight="9" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#374151"/>
    </marker>

    <radialGradient id="hdrSceneA" cx="0.7" cy="0.4" r="0.25">
      <stop offset="0%" stop-color="#fef3c7"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </radialGradient>
    <radialGradient id="brightOnly" cx="0.7" cy="0.4" r="0.25">
      <stop offset="0%" stop-color="#fef3c7"/>
      <stop offset="50%" stop-color="#fbbf24"/>
      <stop offset="100%" stop-color="#000000"/>
    </radialGradient>
    <radialGradient id="bloomBlur" cx="0.7" cy="0.4" r="0.45">
      <stop offset="0%" stop-color="#fef3c7" stop-opacity="0.95"/>
      <stop offset="60%" stop-color="#fbbf24" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#000000" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="finalBloom" cx="0.7" cy="0.4" r="0.45">
      <stop offset="0%" stop-color="#fef3c7"/>
      <stop offset="40%" stop-color="#fbbf24" stop-opacity="0.7"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </radialGradient>
  </defs>

  <!-- 4 thumbnails across the top, each 140 wide × 90 tall, with arrows in the gaps -->
  <!-- Tweaked layout to give arrow labels room above the line -->

  <!-- 1. HDR target -->
  <g transform="translate(40, 80)">
    <rect width="140" height="90" fill="url(#hdrSceneA)" stroke="#374151" stroke-width="1.2"/>
    <text x="70" y="112" text-anchor="middle" font-weight="700" fill="#111827">HDR target</text>
    <text x="70" y="128" text-anchor="middle" font-size="11" font-style="italic" fill="#6b7280">scene with a bright spot</text>
  </g>

  <!-- arrow 1: prefilter (label above) -->
  <text x="200" y="116" text-anchor="middle" font-size="11" fill="#374151">prefilter</text>
  <line x1="180" y1="125" x2="220" y2="125" stroke="#374151" stroke-width="1.6" marker-end="url(#bArr)"/>

  <!-- 2. Bright pass -->
  <g transform="translate(220, 80)">
    <rect width="140" height="90" fill="url(#brightOnly)" stroke="#374151" stroke-width="1.2"/>
    <text x="70" y="112" text-anchor="middle" font-weight="700" fill="#111827">Bright pass</text>
    <text x="70" y="128" text-anchor="middle" font-size="11" font-style="italic" fill="#6b7280">half-res, knee-thresholded</text>
  </g>

  <!-- arrow 2: H + V blur (label above on its own line) -->
  <text x="380" y="116" text-anchor="middle" font-size="11" fill="#374151">H + V blur</text>
  <line x1="360" y1="125" x2="400" y2="125" stroke="#374151" stroke-width="1.6" marker-end="url(#bArr)"/>

  <!-- 3. Blurred bloom -->
  <g transform="translate(400, 80)">
    <rect width="140" height="90" fill="url(#bloomBlur)" stroke="#374151" stroke-width="1.2"/>
    <text x="70" y="112" text-anchor="middle" font-weight="700" fill="#111827">Blurred bloom</text>
    <text x="70" y="128" text-anchor="middle" font-size="11" font-style="italic" fill="#6b7280">separable Gaussian</text>
  </g>

  <!-- arrow 3: + HDR -->
  <text x="570" y="116" text-anchor="middle" font-size="11" fill="#374151">+ HDR</text>
  <line x1="540" y1="125" x2="600" y2="125" stroke="#374151" stroke-width="1.6" marker-end="url(#bArr)"/>

  <!-- 4. Final HDR + bloom -->
  <g transform="translate(600, 80)">
    <rect width="140" height="90" fill="url(#finalBloom)" stroke="#374151" stroke-width="1.2"/>
    <text x="70" y="112" text-anchor="middle" font-weight="700" fill="#111827">HDR + bloom</text>
    <text x="70" y="128" text-anchor="middle" font-size="11" font-style="italic" fill="#6b7280">soft glow added back</text>
  </g>

  <!-- ===== Lower panel: explanation on the LEFT, kernel chart on the RIGHT ===== -->
  <!-- Explanation: x=40..440 (400 wide). Kernel: x=460..880 (420 wide). -->

  <!-- Left: explanation -->
  <g transform="translate(40, 220)">
    <rect width="400" height="150" fill="#f9fafb" stroke="#9ca3af" stroke-width="1" rx="6"/>
    <text x="14" y="24" font-weight="700" fill="#111827">Why separable?</text>

    <text x="14" y="50" font-size="12" fill="#374151">A 9×9 2D Gaussian needs</text>
    <text x="14" y="68" font-size="12" fill="#374151">81 texture samples per pixel.</text>

    <text x="14" y="92" font-size="12" fill="#374151">Splitting into two 1D passes</text>
    <text x="14" y="110" font-size="12" fill="#374151">(horizontal × vertical) gives the</text>
    <text x="14" y="128" font-size="12" fill="#374151">same result with <tspan font-weight="700">9 + 9 = 18 samples</tspan>.</text>
  </g>

  <!-- Right: kernel weights chart -->
  <g transform="translate(460, 220)">
    <rect width="420" height="150" fill="#f9fafb" stroke="#9ca3af" stroke-width="1" rx="6"/>
    <text x="14" y="24" font-weight="700" fill="#111827">9-tap Gaussian kernel</text>
    <text x="14" y="40" font-size="11" font-style="italic" fill="#6b7280">applied separately along each axis</text>

    <!-- Bars: each 36 wide, 4 gap, 9 bars total = 9*36 + 8*4 = 356 wide. Center within 420. -->
    <!-- Start at x=32, base at y=130 -->
    <g font-family="ui-monospace, Consolas, monospace" font-size="10" text-anchor="middle">
      <!-- weights (normalized): tap heights -->
      <!-- 0.06, 0.12, 0.18, 0.24, 0.20, 0.24, 0.18, 0.12, 0.06 (illustrative) -->
      <!-- Use heights proportional to weight × 200 -->
      <rect x="32"  y="118" width="36" height="12" fill="#dbeafe" stroke="#1e40af"/><text x="50" y="148" fill="#1e40af">.06</text>
      <rect x="72"  y="106" width="36" height="24" fill="#bfdbfe" stroke="#1e40af"/><text x="90" y="148" fill="#1e40af">.12</text>
      <rect x="112" y="94"  width="36" height="36" fill="#93c5fd" stroke="#1e40af"/><text x="130" y="148" fill="#1e40af">.18</text>
      <rect x="152" y="82"  width="36" height="48" fill="#60a5fa" stroke="#1e40af"/><text x="170" y="148" fill="#1e40af">.24</text>
      <rect x="192" y="74"  width="36" height="56" fill="#3b82f6" stroke="#1e40af"/><text x="210" y="148" fill="#1e40af">.28</text>
      <rect x="232" y="82"  width="36" height="48" fill="#60a5fa" stroke="#1e40af"/><text x="250" y="148" fill="#1e40af">.24</text>
      <rect x="272" y="94"  width="36" height="36" fill="#93c5fd" stroke="#1e40af"/><text x="290" y="148" fill="#1e40af">.18</text>
      <rect x="312" y="106" width="36" height="24" fill="#bfdbfe" stroke="#1e40af"/><text x="330" y="148" fill="#1e40af">.12</text>
      <rect x="352" y="118" width="36" height="12" fill="#dbeafe" stroke="#1e40af"/><text x="370" y="148" fill="#1e40af">.06</text>
    </g>
  </g>

  <text x="460" y="390" text-anchor="middle" font-size="11" fill="#6b7280" font-style="italic">Crafty's BloomPass: prefilter + ping-pong horizontal/vertical blurs at half resolution + additive composite.</text>
</svg>
