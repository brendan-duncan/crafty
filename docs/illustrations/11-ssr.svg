<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 380" font-family="system-ui, -apple-system, sans-serif" font-size="13">
  <rect width="800" height="380" fill="#ffffff"/>
  <text x="400" y="28" text-anchor="middle" font-size="16" font-weight="600" fill="#111827">Screen-Space Reflection: Ray March + Sky Fallback</text>

  <!-- ===== LEFT: Side View Ray March Diagram ===== -->
  <g transform="translate(30, 55)">
    <text x="170" y="0" text-anchor="middle" font-weight="700" fill="#0369a1">View-Space Ray March</text>
    
    <g transform="translate(0, 20)">
      <rect x="0" y="0" width="340" height="160" fill="#eff6ff" stroke="#3b82f6" stroke-width="1.4" rx="4"/>
      
      <!-- Camera (left side, view space looking right) -->
      <circle cx="40" cy="80" r="10" fill="#f59e0b" stroke="#d97706" stroke-width="1.5"/>
      <text x="40" y="62" text-anchor="middle" font-size="10" font-weight="600" fill="#92400e">camera</text>
      
      <!-- Near plane -->
      <line x1="80" y1="20" x2="80" y2="140" stroke="#9ca3af" stroke-width="1.5"/>
      <text x="80" y="155" text-anchor="middle" font-size="9" fill="#6b7280">near</text>
      
      <!-- Scene geometry: a block at some distance -->
      <rect x="240" y="90" width="50" height="40" fill="#92400e" fill-opacity="0.7" stroke="#78350f" stroke-width="1.2" rx="2"/>
      <text x="265" y="145" text-anchor="middle" font-size="9" fill="#78350f">scene geometry</text>
      
      <!-- Water surface -->
      <line x1="140" y1="100" x2="210" y2="100" stroke="#3b82f6" stroke-width="2.5"/>
      <text x="175" y="92" text-anchor="middle" font-size="9" font-weight="600" fill="#1d4ed8">water surface</text>
      
      <!-- View direction to water -->
      <g stroke="#6b7280" stroke-width="1.5" stroke-dasharray="2,2">
        <line x1="50" y1="80" x2="175" y2="100"/>
      </g>
      <text x="105" y="76" font-size="8" fill="#6b7280">view_dir</text>
      
      <!-- Reflection ray -->
      <g stroke="#16a34a" stroke-width="2">
        <line x1="175" y1="100" x2="250" y2="60"/>
        <path d="M 250 60 L 240 62 M 250 60 L 246 52"/>
      </g>
      <text x="220" y="70" font-size="9" font-weight="600" fill="#166534">reflect_dir</text>
      
      <!-- Ray march steps along reflection -->
      <g>
        <!-- Step 1 -->
        <circle cx="192" cy="86" r="3" fill="#60a5fa"/>
        <text x="192" y="78" text-anchor="middle" font-size="8" fill="#1d4ed8">1</text>
        
        <!-- Step 2 -->
        <circle cx="210" cy="72" r="3" fill="#60a5fa"/>
        <text x="210" y="64" text-anchor="middle" font-size="8" fill="#1d4ed8">2</text>
        
        <!-- Step 3 (HIT!) -->
        <circle cx="230" cy="56" r="4" fill="#16a34a" stroke="#166534" stroke-width="1.5"/>
        <text x="230" y="46" text-anchor="middle" font-size="8" font-weight="600" fill="#166534">3 (hit)</text>
        
        <!-- Depth comparison line showing stored depth vs ray depth -->
        <g stroke="#dc2626" stroke-width="1" stroke-dasharray="2,2">
          <line x1="230" y1="56" x2="230" y2="130"/>
        </g>
        <text x="242" y="95" font-size="8" fill="#991b1b">stored_depth</text>
        <text x="242" y="110" font-size="8" fill="#991b1b">≈ ray.z</text>
        <text x="242" y="122" font-size="7" fill="#b91c1c">→ HIT!</text>
      </g>
      
      <!-- Labels -->
      <text x="175" y="178" text-anchor="middle" font-size="10" fill="#374151">
        <tspan font-weight="600">32 steps</tspan> · max 50 units · <tspan font-weight="600">THICKNESS = 1.5</tspan>
      </text>
    </g>
  </g>

  <!-- Divider -->
  <line x1="400" y1="55" x2="400" y2="340" stroke="#d1d5db" stroke-width="1" stroke-dasharray="4,3"/>

  <!-- ===== RIGHT: Miss + Sky Fallback ===== -->
  <g transform="translate(440, 55)">
    <text x="170" y="0" text-anchor="middle" font-weight="700" fill="#7c3aed">Miss + Sky Fallback</text>
    
    <g transform="translate(0, 20)">
      <!-- Side view of miss -->
      <rect x="0" y="0" width="340" height="110" fill="#faf5ff" stroke="#a78bfa" stroke-width="1.4" rx="4"/>
      
      <!-- Camera -->
      <circle cx="40" cy="55" r="10" fill="#f59e0b" stroke="#d97706" stroke-width="1.5"/>
      
      <!-- Water surface -->
      <line x1="120" y1="70" x2="200" y2="70" stroke="#3b82f6" stroke-width="2.5"/>
      
      <!-- Reflection ray going UP, misses scene -->
      <g stroke="#dc2626" stroke-width="2">
        <line x1="160" y1="70" x2="280" y2="15"/>
        <path d="M 280 15 L 270 18 M 280 15 L 276 8"/>
      </g>
      <text x="250" y="45" font-size="9" font-weight="600" fill="#991b1b">ray leaves screen</text>
      
      <!-- Or goes to sky -->
      <circle cx="300" cy="20" r="12" fill="#fcd34d" stroke="#f59e0b" stroke-width="1.5"/>
      <text x="300" y="10" text-anchor="middle" font-size="8" fill="#92400e">sun</text>
      
      <text x="170" y="100" text-anchor="middle" font-size="10" fill="#6b21a8">
        <tspan font-weight="600">On miss:</tspan> use equirectangular HDR sky texture
      </text>
    </g>
    
    <!-- Equirect sampling -->
    <g transform="translate(0, 140)">
      <rect x="0" y="0" width="340" height="75" fill="#fffbeb" stroke="#f59e0b" stroke-width="1.2" rx="4"/>
      <text x="12" y="16" font-weight="600" fill="#92400e" font-size="11">Equirectangular UV from Reflection Direction</text>
      <text x="12" y="34" font-size="9" font-family="ui-monospace, Consolas, monospace" fill="#b45309">u = 0.5 + atan2(dir.z, dir.x) / (2.0 * PI)</text>
      <text x="12" y="48" font-size="9" font-family="ui-monospace, Consolas, monospace" fill="#b45309">v = 0.5 - asin(clamp(dir.y, -1, 1)) / PI</text>
      <text x="12" y="66" font-size="9" fill="#92400e">
        <tspan font-weight="600">Confidence blend:</tspan> reflection = mix(sky_color, ssr_color, ssr_confidence)
      </text>
    </g>
  </g>

  <!-- ===== BOTTOM: Edge Fade + Fresnel ===== -->
  <g transform="translate(30, 335)">
    <rect width="740" height="32" fill="#f0fdf4" stroke="#16a34a" stroke-width="1" rx="4"/>
    <text x="16" y="21" font-size="11" fill="#166534">
      <tspan font-weight="600">Edge Fade:</tspan>
      <tspan>  confidence = min(uv.x, 1-uv.x, uv.y, 1-uv.y) * 8  →  hide discontinuities at screen edges</tspan>
    </text>
  </g>
</svg>
