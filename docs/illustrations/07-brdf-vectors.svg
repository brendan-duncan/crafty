<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 460" font-family="system-ui, -apple-system, sans-serif" font-size="13">
  <rect width="800" height="460" fill="#ffffff"/>
  <text x="400" y="26" text-anchor="middle" font-size="16" font-weight="600" fill="#111827">BRDF Vectors at a Surface Point</text>

  <defs>
    <marker id="vN" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="9" markerHeight="9" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#16a34a"/>
    </marker>
    <marker id="vV" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="9" markerHeight="9" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#2563eb"/>
    </marker>
    <marker id="vL" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="9" markerHeight="9" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#ca8a04"/>
    </marker>
    <marker id="vH" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="9" markerHeight="9" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#9d174d"/>
    </marker>
  </defs>

  <!-- ===== Diagram on the left ===== -->
  <!-- Surface line at y=340 -->
  <line x1="40" y1="340" x2="540" y2="340" stroke="#374151" stroke-width="2.2"/>
  <!-- Hatch fill below surface -->
  <g stroke="#9ca3af" stroke-width="0.8">
    <line x1="50"  y1="340" x2="70"  y2="368"/>
    <line x1="90"  y1="340" x2="110" y2="368"/>
    <line x1="130" y1="340" x2="150" y2="368"/>
    <line x1="170" y1="340" x2="190" y2="368"/>
    <line x1="210" y1="340" x2="230" y2="368"/>
    <line x1="250" y1="340" x2="270" y2="368"/>
    <line x1="290" y1="340" x2="310" y2="368"/>
    <line x1="330" y1="340" x2="350" y2="368"/>
    <line x1="370" y1="340" x2="390" y2="368"/>
    <line x1="410" y1="340" x2="430" y2="368"/>
    <line x1="450" y1="340" x2="470" y2="368"/>
    <line x1="490" y1="340" x2="510" y2="368"/>
  </g>
  <text x="50" y="382" font-size="11" font-style="italic" fill="#6b7280">surface</text>

  <!-- Vectors emanate from origin P at (290, 340), all length 140 -->
  <!-- L direction (-0.866, -0.5): endpoint (290-121, 340-70) = (169, 270)
       V direction ( 0.5, -0.866): endpoint (290+ 70, 340-121) = (360, 219)
       N direction ( 0,    -1):     endpoint (290,      340-140) = (290, 200)
       H direction (-0.259, -0.966) length 140: endpoint (290-36, 340-135) = (254, 205) -->

  <!-- Light source icon at L endpoint -->
  <g transform="translate(169, 270)">
    <circle cx="0" cy="0" r="9" fill="#fef3c7" stroke="#ca8a04" stroke-width="1.5"/>
    <g stroke="#ca8a04" stroke-width="1.4">
      <line x1="-14" y1="0" x2="-20" y2="0"/>
      <line x1="14"  y1="0" x2="20"  y2="0"/>
      <line x1="0"   y1="-14" x2="0" y2="-20"/>
      <line x1="-10" y1="-10" x2="-15" y2="-15"/>
      <line x1="10"  y1="-10" x2="15"  y2="-15"/>
      <line x1="-10" y1="10"  x2="-15" y2="15"/>
    </g>
  </g>

  <!-- Eye icon at V endpoint -->
  <g transform="translate(360, 219)">
    <ellipse cx="0" cy="0" rx="14" ry="8" fill="#dbeafe" stroke="#2563eb" stroke-width="1.5"/>
    <circle cx="0" cy="0" r="4" fill="#2563eb"/>
  </g>

  <!-- L vector: from P (290,340) to (169,270) -->
  <line x1="290" y1="340" x2="178" y2="276" stroke="#ca8a04" stroke-width="2.5" marker-end="url(#vL)"/>

  <!-- V vector: P to (360,219) -->
  <line x1="290" y1="340" x2="354" y2="225" stroke="#2563eb" stroke-width="2.5" marker-end="url(#vV)"/>

  <!-- N vector: P to (290,200) -->
  <line x1="290" y1="340" x2="290" y2="200" stroke="#16a34a" stroke-width="2.5" marker-end="url(#vN)"/>

  <!-- H vector: P to (254, 205) — drawn dashed to suggest "derived" -->
  <line x1="290" y1="340" x2="259" y2="207" stroke="#9d174d" stroke-width="2.2" stroke-dasharray="5,3" marker-end="url(#vH)"/>

  <!-- Vector LABELS — positioned in clear whitespace away from arrowheads -->
  <!-- N label: top-right of its arrow tip (290, 200) -->
  <text x="300" y="194" font-size="14" font-weight="700" fill="#16a34a">N̂</text>
  <text x="300" y="208" font-size="11" font-style="italic" fill="#16a34a">surface normal</text>

  <!-- H label: above-left of H tip (254, 205) -->
  <text x="226" y="194" font-size="14" font-weight="700" fill="#9d174d" text-anchor="end">Ĥ</text>
  <text x="226" y="208" font-size="11" font-style="italic" fill="#9d174d" text-anchor="end">half-vector</text>

  <!-- V label: below-right of eye (360, 219) -->
  <text x="384" y="240" font-size="14" font-weight="700" fill="#2563eb">V̂</text>
  <text x="384" y="254" font-size="11" font-style="italic" fill="#2563eb">to viewer</text>

  <!-- L label: below-left of light (169, 270) -->
  <text x="146" y="294" font-size="14" font-weight="700" fill="#ca8a04" text-anchor="end">L̂</text>
  <text x="146" y="308" font-size="11" font-style="italic" fill="#ca8a04" text-anchor="end">to light</text>

  <!-- Surface point P -->
  <circle cx="290" cy="340" r="5" fill="#dc2626"/>
  <text x="304" y="358" font-size="12" font-weight="700" fill="#dc2626">P</text>

  <!-- ===== Right-side legend ===== -->
  <g transform="translate(580, 60)">
    <rect width="200" height="320" fill="#f9fafb" stroke="#9ca3af" stroke-width="1" rx="6"/>
    <text x="14" y="22" font-weight="700" fill="#111827">Used in the BRDF</text>

    <!-- Each entry: legend swatch line + label, padded -->
    <g transform="translate(14, 40)">
      <line x1="0" y1="10" x2="22" y2="10" stroke="#16a34a" stroke-width="2.5"/>
      <text x="32" y="14" font-family="ui-monospace, Consolas, monospace" font-size="12" fill="#374151">N · V</text>
      <text x="100" y="14" font-size="11" fill="#6b7280" font-style="italic">view angle</text>
    </g>

    <g transform="translate(14, 70)">
      <line x1="0" y1="10" x2="22" y2="10" stroke="#16a34a" stroke-width="2.5"/>
      <text x="32" y="14" font-family="ui-monospace, Consolas, monospace" font-size="12" fill="#374151">N · L</text>
      <text x="100" y="14" font-size="11" fill="#6b7280" font-style="italic">light angle</text>
    </g>

    <g transform="translate(14, 100)">
      <line x1="0" y1="10" x2="22" y2="10" stroke="#16a34a" stroke-width="2.5"/>
      <text x="32" y="14" font-family="ui-monospace, Consolas, monospace" font-size="12" fill="#374151">N · H</text>
      <text x="100" y="14" font-size="11" fill="#6b7280" font-style="italic">D term</text>
    </g>

    <g transform="translate(14, 130)">
      <line x1="0" y1="10" x2="22" y2="10" stroke="#16a34a" stroke-width="2.5"/>
      <text x="32" y="14" font-family="ui-monospace, Consolas, monospace" font-size="12" fill="#374151">H · V</text>
      <text x="100" y="14" font-size="11" fill="#6b7280" font-style="italic">F term</text>
    </g>

    <!-- Half-vector definition -->
    <g transform="translate(14, 174)">
      <text x="0" y="0" font-weight="700" fill="#9d174d" font-size="12">Halfway vector</text>
      <text x="0" y="20" font-family="ui-monospace, Consolas, monospace" font-size="12" fill="#374151">Ĥ = normalize(L̂ + V̂)</text>
      <text x="0" y="38" font-size="11" font-style="italic" fill="#6b7280">microfacets aligned with H</text>
      <text x="0" y="52" font-size="11" font-style="italic" fill="#6b7280">contribute to the highlight</text>
    </g>

    <!-- BRDF terms summary -->
    <g transform="translate(14, 240)">
      <text x="0" y="0" font-weight="700" fill="#111827" font-size="12">Cook-Torrance terms</text>
      <text x="0" y="20" font-family="ui-monospace, Consolas, monospace" font-size="11" fill="#374151"><tspan font-weight="700">D</tspan>(N·H) — distribution</text>
      <text x="0" y="36" font-family="ui-monospace, Consolas, monospace" font-size="11" fill="#374151"><tspan font-weight="700">G</tspan>(N·V, N·L) — masking</text>
      <text x="0" y="52" font-family="ui-monospace, Consolas, monospace" font-size="11" fill="#374151"><tspan font-weight="700">F</tspan>(H·V) — Fresnel</text>
    </g>
  </g>

  <!-- Bottom note -->
  <text x="290" y="410" text-anchor="middle" font-size="11" font-style="italic" fill="#6b7280">All vectors emanate from the surface point P. H bisects L and V — the more it aligns with N, the brighter the specular.</text>
</svg>
