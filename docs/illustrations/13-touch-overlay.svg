<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 920 600" font-family="system-ui, -apple-system, sans-serif" font-size="13">
  <rect width="920" height="600" fill="#ffffff"/>
  <text x="460" y="26" text-anchor="middle" font-size="16" font-weight="600" fill="#111827">Touch Overlay: DOM-Based Controls Above the WebGPU Canvas</text>

  <defs>
    <marker id="toArr" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="9" markerHeight="9" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#374151"/>
    </marker>
  </defs>

  <!-- ===== Phone mockup centered ===== -->
  <g transform="translate(220, 60)">
    <!-- Phone bezel -->
    <rect x="0" y="0" width="480" height="380" fill="#1f2937" stroke="#111827" stroke-width="2" rx="14"/>
    <!-- Inner screen (canvas) -->
    <rect x="10" y="10" width="460" height="360" fill="#0f172a" stroke="#374151" stroke-width="1"/>

    <!-- Right-half look area (subtle hatch) -->
    <rect x="240" y="10" width="230" height="360" fill="#1e293b" opacity="0.4"/>
    <text x="355" y="170" text-anchor="middle" font-size="11" font-style="italic" fill="#94a3b8">touch + drag = look</text>
    <text x="355" y="186" text-anchor="middle" font-size="10" font-style="italic" fill="#64748b">double-tap = toggle free-cam</text>

    <!-- Menu button (top-right) -->
    <g transform="translate(434, 22)">
      <circle cx="14" cy="14" r="14" fill="#111827" stroke="#fff" stroke-width="1.4"/>
      <text x="14" y="18" text-anchor="middle" font-size="14" fill="#fff">☰</text>
    </g>

    <!-- 3x2 action buttons bottom-right -->
    <!-- Top row: Mine / Place / Flashlight at y=200; label tucked just under button -->
    <g transform="translate(294, 200)">
      <circle cx="22" cy="22" r="22" fill="rgb(220,80,80,0.45)" stroke="#fff" stroke-width="1.4" opacity="0.9"/>
      <text x="22" y="28" text-anchor="middle" font-size="20" fill="#fff">⛏</text>
      <text x="22" y="56" text-anchor="middle" font-size="9" fill="#fca5a5">Mine</text>
    </g>
    <g transform="translate(354, 200)">
      <circle cx="22" cy="22" r="22" fill="rgb(80,180,90,0.45)" stroke="#fff" stroke-width="1.4" opacity="0.9"/>
      <text x="22" y="28" text-anchor="middle" font-size="20" fill="#fff">▣</text>
      <text x="22" y="56" text-anchor="middle" font-size="9" fill="#bbf7d0">Place</text>
    </g>
    <g transform="translate(414, 200)">
      <circle cx="22" cy="22" r="22" fill="rgb(200,200,80,0.25)" stroke="#fff" stroke-width="1.4" opacity="0.9"/>
      <text x="22" y="28" text-anchor="middle" font-size="18" fill="#fff">💡</text>
      <text x="22" y="56" text-anchor="middle" font-size="9" fill="#fde68a">Flash</text>
    </g>

    <!-- Bottom row: Sneak / Run / Jump at y=270 -->
    <g transform="translate(294, 270)">
      <circle cx="22" cy="22" r="22" fill="rgba(255,255,255,0.10)" stroke="#fff" stroke-width="1.4" opacity="0.9"/>
      <text x="22" y="28" text-anchor="middle" font-size="20" fill="#fff">⤓</text>
      <text x="22" y="56" text-anchor="middle" font-size="9" fill="#cbd5e1">Sneak</text>
    </g>
    <g transform="translate(354, 270)">
      <circle cx="22" cy="22" r="22" fill="rgba(100,200,100,0.25)" stroke="#fff" stroke-width="1.4" opacity="0.9"/>
      <text x="22" y="28" text-anchor="middle" font-size="16" fill="#fff">»</text>
      <text x="22" y="56" text-anchor="middle" font-size="9" fill="#bbf7d0">Run</text>
    </g>
    <g transform="translate(414, 270)">
      <circle cx="22" cy="22" r="22" fill="rgba(255,255,255,0.18)" stroke="#fff" stroke-width="1.4" opacity="0.9"/>
      <text x="22" y="28" text-anchor="middle" font-size="20" fill="#fff">⤒</text>
      <text x="22" y="56" text-anchor="middle" font-size="9" fill="#cbd5e1">Jump</text>
    </g>

    <!-- Joystick (bottom-left), vertically centred between the two button rows -->
    <g transform="translate(36, 222)">
      <circle cx="40" cy="40" r="40" fill="rgba(255,255,255,0.10)" stroke="rgba(255,255,255,0.30)" stroke-width="2"/>
      <circle cx="40" cy="40" r="18" fill="rgba(255,255,255,0.30)" stroke="rgba(255,255,255,0.50)" stroke-width="1.6"/>
      <text x="40" y="96"  text-anchor="middle" font-size="10" fill="#cbd5e1">virtual joystick</text>
      <text x="40" y="110" text-anchor="middle" font-size="9"  fill="#94a3b8">→ inputForward, inputStrafe</text>
    </g>

    <!-- Hotbar strip across bottom -->
    <rect x="50" y="356" width="380" height="14" fill="#1e293b" stroke="#475569" stroke-width="0.6"/>
    <text x="240" y="367" text-anchor="middle" font-size="9" fill="#94a3b8">hotbar (44 px high) — overlay leaves 70 px clearance above it</text>
  </g>

  <!-- ===== Side annotations (right of phone) ===== -->
  <g transform="translate(720, 60)">
    <text x="0" y="20" font-weight="700" fill="#111827">Lazy bootstrap</text>
    <text x="0" y="40" font-size="11" fill="#374151">no overlay until first</text>
    <text x="0" y="54" font-size="11" fill="#374151">real touchstart fires</text>

    <text x="0" y="164" font-weight="700" fill="#14532d">Run = toggle</text>
    <text x="0" y="184" font-size="11" fill="#374151">tap once → sprint on,</text>
    <text x="0" y="198" font-size="11" fill="#374151">tap again → sprint off</text>

    <text x="0" y="236" font-weight="700" fill="#1e3a8a">Jump / Sneak = hold</text>
    <text x="0" y="256" font-size="11" fill="#374151">touchstart → press,</text>
    <text x="0" y="270" font-size="11" fill="#374151">touchend → release</text>
  </g>

  <!-- ===== Side annotations (left of phone) ===== -->
  <g transform="translate(20, 60)">
    <text x="0" y="20" font-weight="700" fill="#111827">Detection</text>
    <text x="0" y="40" font-size="11" fill="#374151">isTouchDevice() tries</text>
    <text x="0" y="54" font-size="11" fill="#374151">maxTouchPoints,</text>
    <text x="0" y="68" font-size="11" fill="#374151">ontouchstart, media</text>
    <text x="0" y="82" font-size="11" fill="#374151">queries — falls through</text>
    <text x="0" y="96" font-size="11" fill="#374151">to a real touchstart.</text>

    <text x="0" y="134" font-weight="700" fill="#7c3aed">Pointer-lock off</text>
    <text x="0" y="154" font-size="11" fill="#374151">disabled on player &amp;</text>
    <text x="0" y="168" font-size="11" fill="#374151">camera when overlay</text>
    <text x="0" y="182" font-size="11" fill="#374151">initialises (it would</text>
    <text x="0" y="196" font-size="11" fill="#374151">fight touch handlers).</text>
  </g>

  <!-- ===== Bottom note ===== -->
  <g transform="translate(40, 480)">
    <rect width="840" height="100" fill="#f9fafb" stroke="#9ca3af" stroke-width="1" rx="6"/>
    <text x="14" y="22" font-weight="700" fill="#111827">Two coordinate systems on the same canvas</text>

    <text x="14" y="46" font-size="11" fill="#374151">The DOM overlay (z-index above the WebGPU canvas) catches touch events for buttons and joystick.</text>
    <text x="14" y="64" font-size="11" fill="#374151">Touches that miss every overlay element fall through to the canvas, which interprets them as look-drag</text>
    <text x="14" y="82" font-size="11" fill="#374151">on the right half of the screen. The two systems share state through PlayerController.input* fields.</text>
  </g>
</svg>
