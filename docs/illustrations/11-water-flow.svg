<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 360" font-family="system-ui, -apple-system, sans-serif" font-size="13">
  <rect width="800" height="360" fill="#ffffff"/>
  <text x="400" y="28" text-anchor="middle" font-size="16" font-weight="600" fill="#111827">Water Propagation: Flow Priority Rules</text>

  <!-- ===== LEFT: Rule 1 - Flow Down First ===== -->
  <g transform="translate(40, 55)">
    <text x="100" y="0" text-anchor="middle" font-weight="700" fill="#0369a1">1. Flow Down First</text>
    
    <g transform="translate(0, 20)">
      <g fill="#92400e" fill-opacity="0.8">
        <rect x="20" y="108" width="36" height="36"/>
        <rect x="56" y="108" width="36" height="36"/>
        <rect x="20" y="144" width="36" height="36"/>
        <rect x="56" y="144" width="36" height="36"/>
      </g>
      <g stroke="#d1d5db" stroke-width="0.5" fill="none">
        <rect x="20" y="36" width="36" height="36"/><rect x="56" y="36" width="36" height="36"/>
        <rect x="20" y="72" width="36" height="36"/><rect x="56" y="72" width="36" height="36"/>
      </g>
      <rect x="56" y="36" width="36" height="36" fill="#3b82f6" fill-opacity="0.7" stroke="#1d4ed8" stroke-width="1.5"/>
      
      <g stroke="#1d4ed8" stroke-width="2" fill="none" transform="translate(74, 72)">
        <line x1="0" y1="0" x2="0" y2="20"/>
        <path d="M 0 20 L -5 12 M 0 20 L 5 12"/>
      </g>
      
      <g transform="translate(120, 0)">
        <text x="16" y="-8" text-anchor="middle" font-size="11" fill="#6b7280">after</text>
        <g fill="#92400e" fill-opacity="0.8">
          <rect x="20" y="108" width="36" height="36"/>
          <rect x="56" y="108" width="36" height="36"/>
          <rect x="20" y="144" width="36" height="36"/>
          <rect x="56" y="144" width="36" height="36"/>
        </g>
        <g stroke="#d1d5db" stroke-width="0.5" fill="none">
          <rect x="20" y="36" width="36" height="36"/><rect x="56" y="36" width="36" height="36"/>
          <rect x="20" y="72" width="36" height="36"/><rect x="56" y="72" width="36" height="36"/>
        </g>
        <rect x="56" y="72" width="36" height="36" fill="#3b82f6" fill-opacity="0.7" stroke="#1d4ed8" stroke-width="1.5"/>
      </g>
    </g>
    <text x="100" y="215" text-anchor="middle" font-size="11" fill="#374151">Water moves down if the cell below is empty</text>
  </g>

  <!-- Divider -->
  <line x1="260" y1="55" x2="260" y2="310" stroke="#d1d5db" stroke-width="1" stroke-dasharray="4,3"/>

  <!-- ===== MIDDLE: Rule 2 - Support Check ===== -->
  <g transform="translate(300, 55)">
    <text x="100" y="0" text-anchor="middle" font-weight="700" fill="#7c3aed">2. Support Check</text>
    
    <g transform="translate(0, 20)">
      <text x="36" y="0" text-anchor="middle" font-size="11" font-weight="600" fill="#16a34a">Supported</text>
      <g transform="translate(0, 12)">
        <rect x="18" y="108" width="36" height="36" fill="#92400e" fill-opacity="0.8"/>
        <rect x="18" y="144" width="36" height="36" fill="#92400e" fill-opacity="0.8"/>
        <rect x="18" y="72" width="36" height="36" fill="#3b82f6" fill-opacity="0.7" stroke="#16a34a" stroke-width="1.5"/>
        <text x="36" y="190" text-anchor="middle" font-size="9" fill="#166534">solid below</text>
        <g stroke="#1d4ed8" stroke-width="1.5" fill="none" transform="translate(36, 90)">
          <line x1="-22" y1="0" x2="-30" y2="0"/>
          <line x1="22" y1="0" x2="30" y2="0"/>
        </g>
      </g>
      
      <g transform="translate(90, 0)">
        <text x="36" y="0" text-anchor="middle" font-size="11" font-weight="600" fill="#dc2626">Floating</text>
        <g transform="translate(0, 12)">
          <rect x="0" y="144" width="36" height="36" fill="#92400e" fill-opacity="0.8"/>
          <rect x="72" y="144" width="36" height="36" fill="#92400e" fill-opacity="0.8"/>
          <rect x="36" y="36" width="36" height="36" fill="#3b82f6" fill-opacity="0.7" stroke="#dc2626" stroke-width="1.5"/>
          <text x="54" y="190" text-anchor="middle" font-size="9" fill="#991b1b">no support below</text>
        </g>
      </g>
    </g>
    <text x="100" y="245" text-anchor="middle" font-size="11" fill="#374151">Solid within 4 blocks → full horizontal spread</text>
  </g>

  <!-- Divider -->
  <line x1="530" y1="55" x2="530" y2="310" stroke="#d1d5db" stroke-width="1" stroke-dasharray="4,3"/>

  <!-- ===== RIGHT: Rule 3 - Tick-based Horizontal Spread ===== -->
  <g transform="translate(570, 55)">
    <text x="100" y="0" text-anchor="middle" font-weight="700" fill="#059669">3. Tick-based Spread</text>
    
    <g transform="translate(20, 25)">
      <g>
        <text x="18" y="-10" text-anchor="middle" font-size="10" font-weight="600" fill="#374151">Tick 0</text>
        <g stroke="#d1d5db" stroke-width="0.5" fill="none">
          <rect x="0" y="0" width="36" height="36"/><rect x="36" y="0" width="36" height="36"/>
          <rect x="0" y="36" width="36" height="36"/><rect x="36" y="36" width="36" height="36"/>
        </g>
        <rect x="18" y="18" width="36" height="36" fill="#3b82f6" fill-opacity="0.7" stroke="#1d4ed8" stroke-width="1.5"/>
      </g>
      
      <g transform="translate(80, 0)">
        <text x="18" y="-10" text-anchor="middle" font-size="10" font-weight="600" fill="#374151">Tick 1</text>
        <g stroke="#d1d5db" stroke-width="0.5" fill="none">
          <rect x="0" y="0" width="36" height="36"/><rect x="36" y="0" width="36" height="36"/>
          <rect x="0" y="36" width="36" height="36"/><rect x="36" y="36" width="36" height="36"/>
        </g>
        <rect x="0" y="18" width="36" height="36" fill="#3b82f6" fill-opacity="0.5" stroke="#60a5fa" stroke-width="1"/>
        <rect x="18" y="18" width="36" height="36" fill="#3b82f6" fill-opacity="0.7" stroke="#1d4ed8" stroke-width="1.5"/>
      </g>
      
      <g transform="translate(0, 85)">
        <text x="18" y="-3" text-anchor="middle" font-size="10" font-weight="600" fill="#374151">Tick 2</text>
        <g stroke="#d1d5db" stroke-width="0.5" fill="none">
          <rect x="0" y="0" width="36" height="36"/><rect x="36" y="0" width="36" height="36"/>
          <rect x="0" y="36" width="36" height="36"/><rect x="36" y="36" width="36" height="36"/>
        </g>
        <rect x="18" y="0" width="36" height="36" fill="#3b82f6" fill-opacity="0.5" stroke="#60a5fa" stroke-width="1"/>
        <rect x="0" y="18" width="36" height="36" fill="#3b82f6" fill-opacity="0.7" stroke="#1d4ed8" stroke-width="1.5"/>
        <rect x="18" y="18" width="36" height="36" fill="#3b82f6" fill-opacity="0.7" stroke="#1d4ed8" stroke-width="1.5"/>
      </g>
      
      <g transform="translate(80, 85)">
        <text x="18" y="-3" text-anchor="middle" font-size="10" font-weight="600" fill="#374151">Tick 3</text>
        <g stroke="#d1d5db" stroke-width="0.5" fill="none">
          <rect x="0" y="0" width="36" height="36"/><rect x="36" y="0" width="36" height="36"/>
          <rect x="0" y="36" width="36" height="36"/><rect x="36" y="36" width="36" height="36"/>
        </g>
        <rect x="18" y="0" width="36" height="36" fill="#3b82f6" fill-opacity="0.7" stroke="#1d4ed8" stroke-width="1.5"/>
        <rect x="0" y="18" width="36" height="36" fill="#3b82f6" fill-opacity="0.7" stroke="#1d4ed8" stroke-width="1.5"/>
        <rect x="18" y="18" width="36" height="36" fill="#3b82f6" fill-opacity="0.7" stroke="#1d4ed8" stroke-width="1.5"/>
        <rect x="36" y="18" width="36" height="36" fill="#3b82f6" fill-opacity="0.5" stroke="#60a5fa" stroke-width="1"/>
      </g>
    </g>
    <text x="100" y="195" text-anchor="middle" font-size="11" fill="#374151">Only 1 direction per tick — prevents flooding</text>
  </g>

  <!-- ===== BOTTOM: Performance ===== -->
  <g transform="translate(40, 310)">
    <rect width="720" height="38" fill="#f0f9ff" stroke="#0ea5e9" stroke-width="1" rx="4"/>
    <g font-size="11" fill="#374151">
      <text x="20" y="24"><tspan font-weight="600" fill="#0369a1">Optimizations:</tspan> View-distance radius · Early chunk skip (waterBlocks counter) · Batched re-meshes</text>
    </g>
  </g>
</svg>
