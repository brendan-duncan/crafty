<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 920 480" font-family="system-ui, -apple-system, sans-serif" font-size="13">
  <rect width="920" height="480" fill="#ffffff"/>
  <text x="460" y="26" text-anchor="middle" font-size="16" font-weight="600" fill="#111827">Server Architecture: One Process, Many WorldRooms</text>

  <defs>
    <marker id="srArr" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="9" markerHeight="9" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#374151"/>
    </marker>
  </defs>

  <!-- ===== Server outer container ===== -->
  <g transform="translate(40, 60)">
    <rect x="0" y="0" width="600" height="380" fill="#fef2f2" stroke="#dc2626" stroke-width="1.6" rx="8"/>
    <text x="14" y="22" font-weight="700" fill="#7f1d1d">Server (Node.js + ws)</text>

    <!-- Lobby connection layer -->
    <g transform="translate(20, 40)">
      <rect x="0" y="0" width="560" height="44" fill="#fee2e2" stroke="#dc2626" stroke-width="1" rx="4"/>
      <text x="14" y="20" font-weight="700" fill="#7f1d1d">LobbyConn — accepts connections, dispatches to worlds</text>
      <text x="14" y="36" font-size="11" font-family="ui-monospace, Consolas, monospace" fill="#7f1d1d">onConnection(ws) → wait for "join_world" → route to room</text>
    </g>

    <!-- Three world rooms -->
    <!-- Each room: 178 wide × 220 tall -->
    <g transform="translate(20, 100)">
      <!-- Room 1 -->
      <g>
        <rect x="0" y="0" width="178" height="240" fill="#fff" stroke="#dc2626" stroke-width="1.4" rx="6"/>
        <rect x="0" y="0" width="178" height="28" fill="#fee2e2"/>
        <text x="89" y="20" text-anchor="middle" font-weight="700" fill="#7f1d1d">WorldRoom "alpha"</text>

        <text x="14" y="46" font-size="11" font-weight="700" fill="#7f1d1d">players</text>
        <g font-size="11" font-family="ui-monospace, Consolas, monospace" fill="#374151">
          <text x="14" y="62">· 1 alex</text>
          <text x="14" y="76">· 2 sam</text>
          <text x="14" y="90">· 3 jamie</text>
        </g>

        <text x="14" y="116" font-size="11" font-weight="700" fill="#7f1d1d">world (server copy)</text>
        <text x="14" y="132" font-size="10" fill="#374151">authoritative chunks</text>
        <text x="14" y="146" font-size="10" fill="#374151">+ pendingBlockUpdates</text>

        <text x="14" y="172" font-size="11" font-weight="700" fill="#7f1d1d">tick @ 20 Hz</text>
        <text x="14" y="188" font-size="10" fill="#374151">snapshot() broadcasts</text>
        <text x="14" y="202" font-size="10" fill="#374151">all positions + edits</text>
        <text x="14" y="226" font-size="10" font-style="italic" fill="#a16207">isolated from others</text>
      </g>

      <!-- Room 2 -->
      <g transform="translate(190, 0)">
        <rect x="0" y="0" width="178" height="240" fill="#fff" stroke="#dc2626" stroke-width="1.4" rx="6"/>
        <rect x="0" y="0" width="178" height="28" fill="#fee2e2"/>
        <text x="89" y="20" text-anchor="middle" font-weight="700" fill="#7f1d1d">WorldRoom "beta"</text>

        <text x="14" y="46" font-size="11" font-weight="700" fill="#7f1d1d">players</text>
        <g font-size="11" font-family="ui-monospace, Consolas, monospace" fill="#374151">
          <text x="14" y="62">· 4 robin</text>
          <text x="14" y="76">· 5 leo</text>
        </g>

        <text x="14" y="116" font-size="11" font-weight="700" fill="#7f1d1d">world (server copy)</text>
        <text x="14" y="132" font-size="10" fill="#374151">different seed,</text>
        <text x="14" y="146" font-size="10" fill="#374151">independent edits</text>

        <text x="14" y="172" font-size="11" font-weight="700" fill="#7f1d1d">tick @ 20 Hz</text>
        <text x="14" y="188" font-size="10" fill="#374151">own snapshot loop</text>
        <text x="14" y="226" font-size="10" font-style="italic" fill="#a16207">isolated from others</text>
      </g>

      <!-- Room 3 -->
      <g transform="translate(380, 0)">
        <rect x="0" y="0" width="178" height="240" fill="#fff" stroke="#dc2626" stroke-width="1.4" rx="6" stroke-dasharray="4,3"/>
        <rect x="0" y="0" width="178" height="28" fill="#fef9c3"/>
        <text x="89" y="20" text-anchor="middle" font-weight="700" fill="#713f12">WorldRoom "gamma"</text>

        <text x="89" y="74" text-anchor="middle" font-size="11" fill="#a16207" font-style="italic">no players</text>
        <text x="89" y="92" text-anchor="middle" font-size="10" fill="#a16207" font-style="italic">— sleeping —</text>

        <text x="14" y="172" font-size="11" font-weight="700" fill="#a16207">tick @ 0 Hz</text>
        <text x="14" y="188" font-size="10" fill="#374151">no snapshot work</text>
        <text x="14" y="226" font-size="10" font-style="italic" fill="#6b7280">spun up on first join</text>
      </g>
    </g>
  </g>

  <!-- ===== RIGHT: persistence ===== -->
  <g transform="translate(660, 60)">
    <text x="120" y="0" text-anchor="middle" font-weight="700" fill="#111827">Persistence</text>

    <rect x="0" y="14" width="240" height="380" fill="#f9fafb" stroke="#9ca3af" stroke-width="1" rx="6"/>

    <text x="14" y="40" font-weight="700" fill="#111827">WorldRepository</text>

    <g font-size="11" fill="#374151" transform="translate(14, 0)">
      <text x="0" y="62">save(name, dirtyChunks)</text>
      <text x="0" y="78" font-size="10" fill="#6b7280">writes only modified chunks</text>

      <text x="0" y="106">load(name)</text>
      <text x="0" y="122" font-size="10" fill="#6b7280">on first join to a room</text>

      <text x="0" y="158" font-weight="700" fill="#16a34a">auto-save</text>
      <text x="0" y="176" font-size="11">every 30 s + on shutdown</text>

      <text x="0" y="210" font-weight="700" fill="#dc2626">single-player</text>
      <text x="0" y="228" font-size="11">same shape, IndexedDB instead</text>
      <text x="0" y="244" font-size="11">of disk; the client embeds the</text>
      <text x="0" y="260" font-size="11">"server" in-process.</text>

      <text x="0" y="296" font-weight="700" fill="#111827">format</text>
      <text x="0" y="314" font-size="11">JSON for prototyping,</text>
      <text x="0" y="330" font-size="11">binary planned for scale</text>
    </g>
  </g>
</svg>
