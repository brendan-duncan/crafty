<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cascade Shadow Test</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      width: 100vw;
      height: 100vh;
      overflow: hidden;
      background: #000;
      font-family: monospace;
    }
    canvas {
      width: 100%;
      height: 100%;
      display: block;
    }
    #info {
      position: absolute;
      top: 10px;
      left: 10px;
      color: white;
      background: rgba(0, 0, 0, 0.7);
      padding: 10px;
      font-size: 12px;
      line-height: 1.5;
      pointer-events: none;
    }
  </style>
</head>
<body>
  <canvas id="canvas"></canvas>
  <div id="info">
    <div id="fps">FPS: --</div>
    <div>WASD: Move | Mouse: Look | Scroll: Speed</div>
    <div>C: Toggle Cascade Debug</div>
  </div>
  <script type="module" src="./cascade_shadow_test.ts"></script>
</body>
</html>
