<svg viewBox="0 0 260 260" role="img" xmlns="http://www.w3.org/2000/svg">
  <title>Crafty favicon — light background</title>

  <defs>
    <clipPath id="l-clip">
      <rect x="0" y="0" width="260" height="260" rx="58"/>
    </clipPath>

    <linearGradient id="l-sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#dbeafe"/>
      <stop offset="55%"  stop-color="#bfdbfe"/>
      <stop offset="100%" stop-color="#93c5fd"/>
    </linearGradient>

    <radialGradient id="l-cloud" cx="30%" cy="35%" r="45%">
      <stop offset="0%"   stop-color="#ffffff" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>

    <linearGradient id="l-top" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%"   stop-color="#a3f0c8"/>
      <stop offset="40%"  stop-color="#34d399"/>
      <stop offset="100%" stop-color="#059669"/>
    </linearGradient>

    <linearGradient id="l-right" x1="0" y1="0" x2="0.2" y2="1">
      <stop offset="0%"   stop-color="#064e3b"/>
      <stop offset="100%" stop-color="#022c22"/>
    </linearGradient>

    <linearGradient id="l-left" x1="1" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#2563a8"/>
      <stop offset="100%" stop-color="#0f3060"/>
    </linearGradient>

    <linearGradient id="l-dirtR" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#3b1a08"/>
      <stop offset="100%" stop-color="#1c0d04"/>
    </linearGradient>

    <linearGradient id="l-dirtL" x1="1" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#7c4a1e"/>
      <stop offset="100%" stop-color="#3d2410"/>
    </linearGradient>

    <radialGradient id="l-spec" cx="25%" cy="22%" r="52%">
      <stop offset="0%"   stop-color="#ffffff" stop-opacity="0.65"/>
      <stop offset="50%"  stop-color="#ffffff" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>

    <radialGradient id="l-ao" cx="50%" cy="50%" r="50%">
      <stop offset="0%"   stop-color="#000000" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#000000" stop-opacity="0"/>
    </radialGradient>

    <linearGradient id="l-ground" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#6ee7a0"/>
      <stop offset="100%" stop-color="#34d399"/>
    </linearGradient>

    <pattern id="l-stone" x="0" y="0" width="18" height="18" patternUnits="userSpaceOnUse">
      <rect width="18" height="18" fill="none"/>
      <rect x="1" y="1" width="7" height="7" fill="#ffffff" opacity="0.025"/>
      <rect x="10" y="10" width="6" height="6" fill="#ffffff" opacity="0.02"/>
      <rect x="1" y="10" width="5" height="5" fill="#000000" opacity="0.04"/>
    </pattern>
  </defs>

  <!-- Background -->
  <rect x="0" y="0" width="260" height="260" rx="58" fill="url(#l-sky)"/>
  <rect x="0" y="0" width="260" height="260" rx="58" fill="url(#l-cloud)"/>

  <g clip-path="url(#l-clip)">
    <!-- Ground -->
    <rect x="0" y="218" width="260" height="42" fill="url(#l-ground)"/>

    <!-- AO -->
    <ellipse cx="130" cy="248" rx="108" ry="12" fill="url(#l-ao)"/>

    <!-- RIGHT FACE -->
    <polygon points="206,112 206,228 130,270 130,154" fill="url(#l-right)"/>
    <polygon points="206,112 206,228 130,270 130,154" fill="url(#l-stone)" opacity="0.5"/>

    <!-- LEFT FACE -->
    <polygon points="54,112 130,154 130,270 54,228" fill="url(#l-left)"/>
    <polygon points="54,112 130,154 130,270 54,228" fill="url(#l-stone)" opacity="0.4"/>

    <!-- Dirt bands -->
    <polygon points="206,168 206,200 130,242 130,210" fill="url(#l-dirtR)"/>
    <polygon points="54,168 130,210 130,242 54,200" fill="url(#l-dirtL)"/>
    <polyline points="54,168 130,210 206,168" fill="none" stroke="#1a0a02" stroke-width="1.2" opacity="0.6"/>

    <!-- TOP FACE -->
    <polygon points="130,54 206,96 130,138 54,96" fill="url(#l-top)"/>
    <!-- Grass blades -->
    <line x1="98"  y1="74"  x2="104" y2="100" stroke="#065f46" stroke-width="1" opacity="0.4"/>
    <line x1="114" y1="67"  x2="120" y2="93"  stroke="#065f46" stroke-width="1" opacity="0.35"/>
    <line x1="130" y1="63"  x2="136" y2="89"  stroke="#065f46" stroke-width="1" opacity="0.35"/>
    <line x1="146" y1="67"  x2="152" y2="93"  stroke="#065f46" stroke-width="1" opacity="0.35"/>
    <line x1="162" y1="74"  x2="168" y2="100" stroke="#065f46" stroke-width="1" opacity="0.4"/>
    <!-- Specular -->
    <polygon points="130,54 206,96 130,138 54,96" fill="url(#l-spec)"/>

    <!-- Sun rim highlight -->
    <line x1="54" y1="96" x2="130" y2="54" stroke="#ffffff" stroke-width="2" opacity="0.6"/>
    <!-- SSS rim -->
    <polygon points="130,138 54,96 54,112 130,154" fill="#a3f0c8" opacity="0.15"/>

    <!-- Edges -->
    <polyline points="130,54 206,96 206,228 130,270 54,228 54,96 130,54"
      fill="none" stroke="#012515" stroke-width="1.8" stroke-linejoin="round" opacity="0.85"/>
    <line x1="130" y1="138" x2="130" y2="270" stroke="#012515" stroke-width="1.2" opacity="0.6"/>
    <line x1="130" y1="138" x2="206" y2="96"  stroke="#012515" stroke-width="1"   opacity="0.4"/>
    <line x1="130" y1="138" x2="54"  y2="96"  stroke="#012515" stroke-width="1"   opacity="0.5"/>
  </g>

  <!-- Icon rim -->
  <rect x="0" y="0" width="260" height="260" rx="58" fill="none" stroke="#93c5fd" stroke-width="1.5" opacity="0.5"/>
  <rect x="0" y="0" width="260" height="260" rx="58" fill="none" stroke="#ffffff" stroke-width="0.8" opacity="0.4"/>
</svg>
