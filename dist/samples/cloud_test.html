<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Crafty — Cloud Test</title>
  <link rel="icon" href="../assets/favicon-Bjfj1BJY.svg" type="image/svg+xml">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { width: 100vw; height: 100vh; overflow: hidden; background: #000; font-family: monospace; }
    canvas { width: 100%; height: 100%; display: block; }
    #info {
      position: absolute; top: 10px; left: 10px;
      color: white; background: rgba(0,0,0,0.7); padding: 10px;
      font-size: 12px; line-height: 1.5; pointer-events: none;
    }
    #panel {
      position: fixed; top: 12px; right: 12px;
      display: flex; flex-direction: column; gap: 6px;
      font-family: ui-monospace,monospace; font-size: 13px; user-select: none;
    }
    #sun-control {
      position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%);
      display: flex; align-items: center; gap: 12px;
      color: white; font-family: monospace; font-size: 13px;
      background: rgba(0,0,0,0.7); padding: 10px 16px; border-radius: 6px;
    }
    #sun-control input { width: 240px; cursor: pointer; }
    .toggle-btn {
      padding: 5px 10px; border-width: 1px; border-style: solid;
      border-radius: 4px; cursor: pointer; letter-spacing: 0.04em;
    }
    .toggle-btn.on {
      background: #1a2e1a; color: #5f5; border-color: #5f5;
    }
    .toggle-btn.off {
      background: #2e1a1a; color: #f55; border-color: #f55;
    }
  </style>
  <script type="module" crossorigin src="../assets/cloud_test-D8uf4l1B.js"></script>
  <link rel="modulepreload" crossorigin href="../assets/mesh-BZCnqQH3.js">
  <link rel="modulepreload" crossorigin href="../assets/scene-CpT0uvDK.js">
  <link rel="modulepreload" crossorigin href="../assets/shadow-BSGgysNj.js">
  <link rel="modulepreload" crossorigin href="../assets/pbr_material-B7IvQzXk.js">
  <link rel="modulepreload" crossorigin href="../assets/render_graph-Bg-a1vtx.js">
  <link rel="modulepreload" crossorigin href="../assets/geometry_pass-DS4fVDMZ.js">
  <link rel="modulepreload" crossorigin href="../assets/godray_pass-Defn2qMv.js">
  <link rel="modulepreload" crossorigin href="../assets/cloud_noise-Cyc5hEDD.js">
</head>
<body>
  <canvas id="canvas"></canvas>
  <div id="info">
    <div id="fps">FPS: --</div>
    <div id="debug"></div>
    <div>WASD: Move | Mouse: Look | Scroll: Speed</div>
  </div>
  <div id="panel"></div>
  <div id="sun-control">
    <span>SUN</span>
    <input type="range" id="sun-angle" min="0" max="180" value="150" step="1">
    <span id="sun-label">150°</span>
    <span>DENSITY</span>
    <input type="range" id="cloud-density" min="0" max="3" value="0.8" step="0.01">
    <span id="density-label">0.80</span>
    <span>COVERAGE</span>
    <input type="range" id="cloud-coverage" min="0" max="2" value="0.95" step="0.01">
    <span id="coverage-label">0.95</span>
    <span>EXTINCTION</span>
    <input type="range" id="cloud-extinction" min="0" max="2" value="0.6" step="0.01">
    <span id="extinction-label">0.60</span>
  </div>
</body>
</html>
