<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Crafty — Cloud Test</title>
  <link rel="icon" href="../assets/favicon-Bjfj1BJY.svg" type="image/svg+xml">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { width: 100vw; height: 100vh; overflow: hidden; background: #000; font-family: monospace; }
    canvas { width: 100%; height: 100%; display: block; }
    #info {
      position: absolute; top: 10px; left: 10px;
      color: white; background: rgba(0,0,0,0.7); padding: 10px;
      font-size: 12px; line-height: 1.5; pointer-events: none;
    }
    #panel {
      position: fixed; top: 12px; right: 12px;
      display: flex; flex-direction: column; gap: 6px;
      font-family: ui-monospace,monospace; font-size: 13px; user-select: none;
    }
    #sun-control {
      position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%);
      display: flex; flex-direction: column; gap: 8px;
      color: white; font-family: monospace; font-size: 13px;
      background: rgba(0,0,0,0.7); padding: 10px 16px; border-radius: 6px;
    }
    #sun-control .row { display: flex; align-items: center; gap: 12px; }
    #sun-control .row > * { flex-shrink: 0; white-space: nowrap; }
    #sun-control .row > span:not(.value) { min-width: 4.5em; text-align: right; }
    #sun-control .row > span.value { min-width: 3em; }
    #sun-control input { width: 150px; cursor: pointer; }
    .toggle-btn {
      padding: 5px 10px; border-width: 1px; border-style: solid;
      border-radius: 4px; cursor: pointer; letter-spacing: 0.04em;
    }
    .toggle-btn.on {
      background: #1a2e1a; color: #5f5; border-color: #5f5;
    }
    .toggle-btn.off {
      background: #2e1a1a; color: #f55; border-color: #f55;
    }
  </style>
  <script type="module" crossorigin src="../assets/cloud_test-bqcS18OI.js"></script>
  <link rel="modulepreload" crossorigin href="../assets/render_graph-DOejAKJF.js">
  <link rel="modulepreload" crossorigin href="../assets/pass-CMGsmZgn.js">
  <link rel="modulepreload" crossorigin href="../assets/scene-SMMxraDS.js">
  <link rel="modulepreload" crossorigin href="../assets/material-xWpU3U9R.js">
  <link rel="modulepreload" crossorigin href="../assets/pbr_material-D7s7UrC7.js">
  <link rel="modulepreload" crossorigin href="../assets/shadow_pass-CP3zbucd.js">
  <link rel="modulepreload" crossorigin href="../assets/block_type-BgLv47--.js">
  <link rel="modulepreload" crossorigin href="../assets/geometry_pass-B7ItFcmn.js">
  <link rel="modulepreload" crossorigin href="../assets/deferred_lighting_pass-Do7ylKDD.js">
  <link rel="modulepreload" crossorigin href="../assets/godray_pass-C0uj7vt2.js">
  <link rel="modulepreload" crossorigin href="../assets/composite_pass-DTNhv_-t.js">
</head>
<body>
  <canvas id="canvas"></canvas>
  <div id="info">
    <div id="fps">FPS: --</div>
    <div id="debug"></div>
    <div>WASD: Move | Mouse: Look | Scroll: Speed</div>
  </div>
  <div id="panel"></div>
  <div id="sun-control">
    <div class="row">
      <span>SUN</span>
      <input type="range" id="sun-angle" min="0" max="180" value="150" step="1">
      <span class="value" id="sun-label">150°</span>
      <span>DENSITY</span>
      <input type="range" id="cloud-density" min="0" max="3" value="0.8" step="0.01">
      <span class="value" id="density-label">0.80</span>
      <span>COVERAGE</span>
      <input type="range" id="cloud-coverage" min="0" max="2" value="0.95" step="0.01">
      <span class="value" id="coverage-label">0.95</span>
    </div>
    <div class="row">
      <span>EXTINCTION</span>
      <input type="range" id="cloud-extinction" min="0" max="2" value="0.6" step="0.01">
      <span class="value" id="extinction-label">0.60</span>
      <span>MIN H</span>
      <input type="range" id="cloud-min-height" min="0" max="200" value="30" step="1">
      <span class="value" id="min-height-label">30</span>
      <span>MAX H</span>
      <input type="range" id="cloud-max-height" min="0" max="200" value="55" step="1">
      <span class="value" id="max-height-label">55</span>
    </div>
  </div>
</body>
</html>
